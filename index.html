<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Binder</title>

<!--
  ============================================================================
  POKÉMON BINDER — Digitaler Karten-Ordner
  ----------------------------------------------------------------------------
  Eine eigenständige Single-Page-App. Einfach diese Datei im Browser öffnen.
  Kein Server, kein Internet, keine externen Bibliotheken nötig.

  Aufbau dieser Datei:
    1. <style>  — gesamtes Design (Ordner-Optik, Grids, Bank, Modals, Toolbar)
    2. <body>   — minimales HTML-Gerüst, der Inhalt wird per JS erzeugt
    3. <script> — die komplette Logik (State, Rendering, Drag&Drop, Export…)

  Wichtige Konzepte in dieser Version:
    - Jede Karten-Seite ist ein "A4-Blatt": Das Hintergrundbild liegt HINTER
      dem 3x3-Raster (nicht hinter dem ganzen Ordner). Pro Seite eigenes Bild.
    - Unter dem Ordner gibt es eine "Bank" mit 8 Ablageplätzen, um Karten
      zwischenzuparken und so bequem seitenübergreifend umzusortieren.
    - Karten werden über eine LOCATION-ID adressiert:
        "slot:<n>"  = Feld n im Ordner (durchgehend über alle Seiten)
        "bench:<n>" = Platz n auf der Bank
      Dadurch funktioniert Drag&Drop einheitlich in alle Richtungen.

  Speicherung:
    - Bei jeder Änderung wird der Zustand in localStorage gesichert.
    - "Exportieren" lädt alles (inkl. Bilder als Base64) als .json herunter.
    - "Importieren" stellt einen Ordner aus so einer .json wieder her.
  ============================================================================
-->

<style>
  /* ---------- Design-Tokens (Farben, Maße) ---------- */
  :root {
    --card-w: 112px;             /* Kartenbreite im Ordner (Verhältnis 6,3:8,8) */
    --card-h: 156px;             /* 112 * (8.8/6.3) ≈ 156  -> exaktes Kartenformat */
    --grid-gap: 8px;
    --page-pad: 22px;            /* Innenabstand der Seite = "Rand" ums Raster */

    --leather-1: #3a2a1d;
    --leather-2: #241710;
    --page-bg: #efe7d6;          /* heller "Papier"-Ton der Innenseite (wenn kein Bild) */
    --page-bg-2: #e4d8c1;
    --slot-empty: rgba(255,255,255,.14);
    --slot-border: rgba(255,255,255,.35);

    --gold: #c9a24b;
    --accent: #d23b3b;           /* Akzentfarbe (Rot) */
    --ink: #2a2018;
    --toolbar-bg: rgba(20,14,9,.82);
    --shadow: 0 18px 40px rgba(0,0,0,.45);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #f4eede;
    /* Holztisch-Optik hinter dem ganzen Ordner */
    background-color: #6b4a2f;
    background-image:
      repeating-linear-gradient(92deg,
        rgba(0,0,0,.06) 0px, rgba(0,0,0,.06) 2px,
        rgba(255,255,255,.03) 2px, rgba(255,255,255,.03) 4px,
        transparent 4px, transparent 26px),
      repeating-linear-gradient(89deg,
        rgba(0,0,0,.04) 0px, rgba(0,0,0,.04) 3px, transparent 3px, transparent 60px),
      repeating-linear-gradient(0deg,
        rgba(0,0,0,.14) 0px, rgba(0,0,0,.14) 2px, transparent 2px, transparent 140px),
      radial-gradient(120% 100% at 50% 20%, #835835 0%, #6b4a2f 45%, #4a3220 100%);
    overflow: hidden;
  }

  /* ---------- Obere Toolbar ---------- */
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--toolbar-bg);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,.06);
    z-index: 50;
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    font-weight: 700; letter-spacing: .3px; margin-right: 6px;
    white-space: nowrap;
  }
  /* TCG-Emblem: kleines goldgerahmtes Wappen mit Monogramm */
  .emblem {
    width: 22px; height: 22px; border-radius: 6px; flex: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; letter-spacing: .5px; color: #1a130a;
    background: linear-gradient(160deg, #e7c976, #c9a24b 55%, #a07e2f);
    border: 1.5px solid rgba(0,0,0,.35);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.5);
  }
  .brand small { font-weight: 400; opacity: .6; }
  .spacer { flex: 1; }

  .btn {
    appearance: none; border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06); color: #f4eede;
    padding: 8px 12px; border-radius: 9px; font-size: 13px;
    cursor: pointer; white-space: nowrap; transition: .15s;
  }
  .btn:hover { background: rgba(255,255,255,.14); }
  .btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .btn.primary { background: var(--accent); border-color: transparent; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.08); }

  /* cover/contain Umschalter */
  .seg { display: inline-flex; border: 1px solid rgba(255,255,255,.14); border-radius: 9px; overflow: hidden; }
  .seg button { border: 0; background: transparent; color: #f4eede; padding: 8px 11px; font-size: 12px; cursor: pointer; }
  .seg button.active { background: var(--gold); color: #1a130a; font-weight: 700; }

  /* ---------- Bühne / Ordner ---------- */
  .stage {
    height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px;
    padding: 64px 24px 70px;
    overflow: auto;
  }

  .binder {
    display: flex;
    perspective: 2600px;          /* für die Umblätter-Animation */
    position: relative;
    flex: none;
    /* Leder-Korpus, der etwas über die Seiten hinausragt (wie ein echter Ordner) */
    padding: 16px;
    border-radius: 16px;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.02) 0 3px, transparent 3px 7px),
      radial-gradient(140% 160% at 25% 15%, #7a4a2a, #5e3719 55%, #3f240f);
    box-shadow:
      var(--shadow),
      inset 0 0 0 2px rgba(0,0,0,.35),
      inset 0 0 0 3px rgba(201,162,75,.18);
  }
  /* umlaufende Ziernaht des Ledereinbands */
  .binder::before {
    content: ""; position: absolute; inset: 8px; border-radius: 12px;
    border: 2px dashed rgba(228,205,150,.35);
    pointer-events: none; z-index: 30;
  }

  /* Eine Ordnerhälfte (linke oder rechte Seite) */
  .side {
    width: calc(var(--card-w)*3 + var(--grid-gap)*2 + var(--page-pad)*2 + 22px);
    min-height: calc(var(--card-h)*3 + var(--grid-gap)*2 + var(--page-pad)*2);
    padding: var(--page-pad);
    position: relative;
    transform-style: preserve-3d;
    /* cremefarbenes "Papier"; wird von .page-bg-layer überlagert, wenn ein Bild gesetzt ist */
    background:
      linear-gradient(160deg, #fbf6ea, #f0e7d2);
    overflow: hidden;
  }
  /* die rechte Seite bekommt links mehr Rand (für Lochung), umgekehrt links */
  .side.right { padding-left: calc(var(--page-pad) + 22px); }
  .side.left  { padding-right: calc(var(--page-pad) + 22px); }
  .side.left  { border-radius: 8px 0 0 8px; box-shadow: inset -26px 0 36px -24px rgba(90,60,30,.55); }
  .side.right { border-radius: 0 8px 8px 0; box-shadow: inset  26px 0 36px -24px rgba(90,60,30,.55); }
  /* feiner Doppelrahmen auf den Seiten (wie im Referenzbild) */
  .side::before {
    content: ""; position: absolute; inset: 14px; z-index: 1;
    border: 1px solid rgba(120,90,50,.45);
    box-shadow: 0 0 0 3px rgba(120,90,50,.12);
    pointer-events: none; border-radius: 3px;
  }
  /* wenn ein Seiten-Hintergrundbild aktiv ist, Rahmen heller halten */
  .side.has-bg::before { border-color: rgba(255,255,255,.5); box-shadow: 0 0 0 3px rgba(255,255,255,.15); }

  /* gestanzte Lochreihe, durch die die Ringe greifen (am Falz-Rand der Seite) */
  .punch {
    position: absolute; top: 0; bottom: 0; width: 30px; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-around; padding: 30px 0; pointer-events: none;
  }
  .side.right .punch { left: 8px; }
  .side.left  .punch { right: 8px; }
  .hole {
    width: 14px; height: 14px; border-radius: 50%;
    /* gestanztes Loch: dunkle Mitte, leichter Prägerand */
    background: radial-gradient(circle at 50% 40%, #cfc3a8, #ad9f7f 70%, #87795c);
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,.6),
      inset 0 -1px 1px rgba(255,255,255,.5),
      0 1px 0 rgba(255,255,255,.45);
  }

  /* Das Hintergrundbild EINER Seite (liegt hinter dem Raster, innerhalb des "Blatts") */
  .page-bg-layer {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    z-index: 0;
  }
  .page-bg-layer::after {  /* leichte Abdunklung für Kartenkontrast */
    content: ""; position: absolute; inset: 0; background: rgba(0,0,0,.18);
  }

  /* Mittelfalz = silberne Ringmechanik */
  /* ===== Ringmechanik (orientiert am Beispielbild) =====
     Aufbau: schmale silberne Metallschiene in der Mitte (.spine).
     Daran sitzen runde, offene Metallringe (.ring), die nach RECHTS greifen
     und durch die Lochung am linken Rand der rechten Seite gehen. */
  .spine {
    width: 30px; flex: none; position: relative; z-index: 25;
    /* gebürstete, leicht gewölbte Metallschiene */
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, rgba(0,0,0,.05) 1px 2px),
      linear-gradient(90deg,
        #4c4f53 0%, #7e848a 18%, #b6bbc1 38%, #eef1f4 52%,
        #c2c7cd 64%, #888d93 84%, #56595e 100%);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,.35),
      inset 5px 0 8px -6px rgba(0,0,0,.6),
      inset -5px 0 8px -6px rgba(0,0,0,.6);
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-around; padding: 30px 0;
  }
  /* Schrauben oben/unten an der Schiene (wie im Bild) */
  .spine::before, .spine::after {
    content: ""; position: absolute; left: 50%; transform: translateX(-50%);
    width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #f0f2f4, #aab0b6 60%, #6d7378);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.7), inset 0 -1px 2px rgba(0,0,0,.5), 0 1px 2px rgba(0,0,0,.4);
    z-index: 3;
  }
  .spine::before { top: 8px; }
  .spine::after { bottom: 8px; }

  /* ein offener runder Metallring (als SVG gezeichnet), greift über die Lochung */
  .ring {
    width: 54px; height: 54px; position: relative; z-index: 40;
    margin-left: 30px;            /* nach rechts, über den Seitenrand */
    pointer-events: none;
  }
  .ring svg { display: block; width: 100%; height: 100%; overflow: visible; }

  /* Die Leder-Innenseite des Deckels (erste Ansicht, links) */
  .cover-inner {
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.018) 0 2px, transparent 2px 6px),
      radial-gradient(130% 150% at 28% 18%, #6a4324, #4a2f17 55%, #321f0d);
    display: flex; align-items: center; justify-content: center;
    color: #e4cd96;
    box-shadow: inset -26px 0 42px -22px rgba(0,0,0,.75);
  }
  .cover-inner.right { box-shadow: inset 26px 0 42px -22px rgba(0,0,0,.75); }
  /* auf dem Leder-Deckel keinen hellen Papier-Rahmen zeichnen */
  .cover-inner::before { border-color: rgba(228,205,150,.22); box-shadow: none; inset: 18px; }
  .cover-plate {
    text-align: center; padding: 30px;
    border: 1px solid rgba(201,162,75,.4);
    border-radius: 10px;
    background: rgba(0,0,0,.12);
    box-shadow: 0 0 0 6px rgba(201,162,75,.06);
    max-width: 80%;
  }
  .cover-plate .pb { width: 56px; height: 56px; margin: 0 auto 14px; font-size: 20px; border-radius: 12px; }
  .cover-plate h2 {
    margin: 0 0 6px; font-size: 22px; letter-spacing: 3px;
    color: var(--gold); text-transform: uppercase; outline: none;
    min-width: 40px;
  }
  .cover-plate p { margin: 0; font-size: 12px; opacity: .8; letter-spacing: 1px; outline: none; min-width: 40px; }
  /* editierbare Felder: dezenter Hinweis beim Hovern/Fokus */
  .editable:hover { background: rgba(201,162,75,.12); border-radius: 4px; }
  .editable:focus { background: rgba(201,162,75,.18); border-radius: 4px; }
  .cover-hint { margin-top: 16px; font-size: 10px; opacity: .45; letter-spacing: .5px; }
  .cover-plate .line { width: 60%; height: 1px; background: rgba(201,162,75,.4); margin: 14px auto; }

  /* ---------- 3x3 Grid ---------- */
  .grid {
    position: relative; z-index: 2;          /* über page-bg-layer (0) und Rahmen (1) */
    display: grid;
    grid-template-columns: repeat(3, var(--card-w));
    grid-template-rows: repeat(3, var(--card-h));
    gap: var(--grid-gap);
    justify-content: center;
  }
  .page-label {
    position: absolute; bottom: 6px; z-index: 1;
    font-size: 11px; color: #fff; opacity: .7; letter-spacing: .5px;
    text-shadow: 0 1px 3px rgba(0,0,0,.6);
  }
  .side.left  .page-label { left: 14px; }
  .side.right .page-label { right: 14px; }

  /* Einzelnes Kartenfeld */
  .slot {
    width: var(--card-w); height: var(--card-h);
    border-radius: 8px;
    background: var(--slot-empty);
    border: 1.5px dashed var(--slot-border);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden;
    transition: border-color .15s, transform .12s, box-shadow .15s;
  }
  .slot:hover { border-color: var(--gold); }
  .slot .plus { font-size: 26px; color: rgba(255,255,255,.55); font-weight: 300; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
  .slot.filled { border-style: solid; border-color: rgba(0,0,0,.25); cursor: grab; background: #1a1a1a; }
  .slot.filled:active { cursor: grabbing; }
  .slot img {
    width: 100%; height: 100%; display: block;
    object-fit: cover;            /* Standard; per Umschalter -> contain */
    pointer-events: none;
  }
  body.fit-contain .slot img { object-fit: contain; }

  /* Drag-Zustände */
  .slot.dragover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(210,59,59,.35); transform: scale(1.02); }
  .slot.dragging { opacity: .35; }

  /* Lösch-Button (X) erscheint beim Hovern auf belegter Karte */
  .slot .del {
    position: absolute; top: 5px; right: 5px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,.62); color: #fff; border: 0;
    font-size: 14px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    pointer-events: auto; z-index: 4;
  }
  .slot.filled:hover .del { display: flex; }
  .slot .del:hover { background: var(--accent); }

  /* Duplizieren-Knopf (erscheint beim Hovern, neben dem X) */
  .slot .dup {
    position: absolute; top: 5px; right: 31px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,.62); color: #fff; border: 0;
    font-size: 13px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    pointer-events: auto; z-index: 4;
  }
  .slot.filled:hover .dup { display: flex; }
  .slot .dup:hover { background: var(--gold); color: #1a130a; }

  /* ---------- Markier-Modus: farbige Ränder + Umschalt-Knopf ---------- */
  /* Nur sichtbar, wenn der Modus aktiv ist. Sonst KEINE Spuren am Design. */
  .slot.mark.mark-owned   { box-shadow: 0 0 0 3px #36b34a, 0 0 12px rgba(54,179,74,.5); border-color: #36b34a; }
  .slot.mark.mark-missing { box-shadow: 0 0 0 3px #e23b3b, 0 0 12px rgba(226,59,59,.5); border-color: #e23b3b; }
  .mark-toggle {
    position: absolute; top: 5px; left: 5px; z-index: 5;
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid #fff; cursor: pointer;
    font-size: 13px; line-height: 1; color: #fff; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  .mark-toggle.is-owned   { background: #36b34a; }
  .mark-toggle.is-missing { background: #e23b3b; }
  .mark-toggle:hover { transform: scale(1.1); }

  /* Seiten-Werkzeuge oben (Bild setzen / entfernen / als Bild exportieren) */
  .page-tools {
    position: absolute; top: 8px; z-index: 3;
    display: flex; gap: 6px; opacity: 0; transition: opacity .15s;
  }
  .side.left  .page-tools { left: 10px; }
  .side.right .page-tools { right: 10px; }
  .side:hover .page-tools { opacity: 1; }
  .page-tools button {
    font-size: 11px; background: rgba(0,0,0,.6); color: #fff; border: 0;
    padding: 5px 9px; border-radius: 7px; cursor: pointer;
  }
  .page-tools button:hover { background: var(--accent); }

  /* ---------- Ablage-Bank unter dem Ordner ---------- */
  .bench {
    flex: none;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    background: rgba(20,14,9,.55);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px;
    padding: 12px 16px;
    backdrop-filter: blur(6px);
  }
  .bench-title { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; opacity: .6; }
  .bench-row { display: flex; gap: 10px; }
  /* Bank-Plätze: gleiche Proportion wie Karten, aber kleiner */
  .bench .slot {
    width: 72px; height: 100px;   /* 72 * 8.8/6.3 ≈ 100 */
  }
  .bench .slot .plus { font-size: 20px; }

  /* ---------- Seitliche Blätter-Pfeile (neben dem Ordner) ---------- */
  .side-nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 54px; height: 54px; border-radius: 50%;
    background: rgba(20,14,9,.72); color: #f4eede;
    border: 1px solid rgba(201,162,75,.4);
    font-size: 24px; cursor: pointer; z-index: 45;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    transition: background .15s, transform .15s, opacity .15s;
    box-shadow: 0 6px 18px rgba(0,0,0,.4);
  }
  .side-nav:hover:not(:disabled) { background: var(--accent); transform: translateY(-50%) scale(1.08); }
  .side-nav:disabled { opacity: .25; cursor: not-allowed; }
  .side-nav.prev { left: 18px; }
  .side-nav.next { right: 18px; }

  /* ---------- Pagination unten (fix) ---------- */
  .pager {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 12px; background: var(--toolbar-bg);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,.06); z-index: 50;
  }
  .pager .pos { font-size: 13px; opacity: .8; min-width: 150px; text-align: center; cursor: pointer; border-radius: 6px; padding: 4px 8px; }
  .pager .pos:hover { background: rgba(255,255,255,.1); opacity: 1; }
  .jump-input {
    width: 90px; padding: 7px 9px; border-radius: 8px;
    border: 1px solid var(--gold); background: rgba(255,255,255,.1);
    color: #f4eede; font-size: 13px; text-align: center;
  }
  .jump-input:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  .btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ---------- Umblätter-Animation ---------- */
  .flip {
    position: absolute; top: 0; height: 100%;
    width: calc(var(--card-w)*3 + var(--grid-gap)*2 + var(--page-pad)*2);
    background: linear-gradient(160deg, var(--page-bg), var(--page-bg-2));
    z-index: 20; pointer-events: none; backface-visibility: hidden;
  }
  .flip.next { right: 0; transform-origin: left center; border-radius: 0 14px 14px 0;
    animation: flipNext .55s ease-in forwards; box-shadow: -10px 0 30px rgba(0,0,0,.3); }
  .flip.prev { left: 0; transform-origin: right center; border-radius: 14px 0 0 14px;
    animation: flipPrev .55s ease-in forwards; box-shadow: 10px 0 30px rgba(0,0,0,.3); }
  @keyframes flipNext { from { transform: rotateY(0); } to { transform: rotateY(-180deg); } }
  @keyframes flipPrev { from { transform: rotateY(0); } to { transform: rotateY(180deg); } }

  /* ---------- Lightbox / Vorschau ---------- */
  .modal {
    position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.82);
    display: none; align-items: center; justify-content: center; padding: 30px;
  }
  .modal.open { display: flex; }
  .modal img { max-width: min(90vw, 520px); max-height: 88vh; border-radius: 14px; box-shadow: 0 30px 70px rgba(0,0,0,.6); }
  .modal .close {
    position: absolute; top: 18px; right: 22px; width: 40px; height: 40px;
    border-radius: 50%; background: rgba(255,255,255,.12); color: #fff; border: 0;
    font-size: 20px; cursor: pointer;
  }
  .modal .close:hover { background: rgba(255,255,255,.25); }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 70px; transform: translateX(-50%) translateY(20px);
    background: rgba(20,14,9,.95); color: #fff; padding: 10px 16px; border-radius: 10px;
    font-size: 13px; opacity: 0; pointer-events: none; transition: .25s; z-index: 200;
    border: 1px solid rgba(201,162,75,.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) { .flip { animation: none !important; display: none !important; } }
  .hidden { display: none; }
</style>
</head>
<body>

  <!-- ===================== TOOLBAR ===================== -->
  <div class="toolbar">
    <div class="brand">
      <span class="emblem">TCG</span>
      TCG&nbsp;Binder <small>· dein digitaler Ordner</small>
    </div>
    <div class="spacer"></div>
    <div class="seg" title="Wie Bilder ins Kartenfeld eingepasst werden">
      <button id="fitCover" class="active">Füllen</button>
      <button id="fitContain">Ganz zeigen</button>
    </div>
    <button class="btn" id="markBtn" title="Karten als 'habe ich' (grün) oder 'fehlt noch' (rot) markieren">✓ Markieren</button>
    <button class="btn" id="appBgBtn" title="Hintergrund hinter dem Ordner ändern">🌄 Hintergrund</button>
    <button class="btn" id="appBgResetBtn" title="Hintergrund auf Standard-Holz zurücksetzen">↺</button>
    <button class="btn" id="importBtn">Importieren</button>
    <button class="btn primary" id="exportBtn">Exportieren</button>
  </div>

  <!-- ===================== BÜHNE ===================== -->
  <div class="stage">
    <div class="binder" id="binder"><!-- per JS --></div>

    <!-- Ablage-Bank -->
    <div class="bench" id="bench">
      <div class="bench-title">Ablage · zieh Karten hierher, blättere, leg sie woanders ab</div>
      <div class="bench-row" id="benchRow"><!-- per JS --></div>
    </div>
  </div>

  <!-- Seitliche Blätter-Pfeile -->
  <button class="side-nav prev" id="sideNavPrev" title="Zurück blättern" aria-label="Zurück">‹</button>
  <button class="side-nav next" id="sideNavNext" title="Vor blättern" aria-label="Vor">›</button>

  <!-- ===================== PAGINATION ===================== -->
  <div class="pager">
    <button class="btn" id="prevBtn">‹ Zurück</button>
    <span class="pos" id="pos" title="Klicken, um zu einer Seite zu springen">—</span>
    <input type="number" id="jumpInput" class="jump-input hidden" min="1" placeholder="Seite" title="Seitenzahl eingeben und Enter">
    <button class="btn" id="nextBtn">Vor ›</button>
    <button class="btn" id="addPageBtn" title="Zwei neue Seiten anhängen">+ Seite</button>
  </div>

  <!-- ===================== LIGHTBOX ===================== -->
  <div class="modal" id="modal">
    <button class="close" id="modalClose">✕</button>
    <img id="modalImg" alt="Kartenvorschau">
  </div>

  <!-- versteckte File-Inputs -->
  <input type="file" id="cardFile"   class="hidden" accept="image/*">
  <input type="file" id="pageBgFile" class="hidden" accept="image/*">
  <input type="file" id="appBgFile"  class="hidden" accept="image/*">
  <input type="file" id="importFile" class="hidden" accept="application/json,.json">

  <div class="toast" id="toast"></div>

<script>
/* ============================================================================
   DATEN-MODELL & ZUSTAND
   ----------------------------------------------------------------------------
   slots[]    : flaches Array aller Ordner-Felder. 9 pro Seite.
                Eintrag = null (leer) oder Base64-Bild.
   bench[]    : 8 Ablageplätze (gleiche Struktur wie ein Slot).
   pageBg{}   : Objekt  { pageIndex: base64 }  — Hintergrundbild PRO Seite.
   pages      : Anzahl Karten-Seiten (jeweils 3x3). Immer gerade, mind. 2.
   spread     : aktueller Blick. 0 = Deckel + Seite 1.
   fit        : "cover" | "contain".
   coverTitle / coverSub : editierbarer Text auf dem Deckel.

   LOCATION-IDs für Drag&Drop:  "slot:<n>"  oder  "bench:<n>"
   ========================================================================== */

const SLOTS_PER_PAGE = 9;
const BENCH_SIZE = 8;
const STORAGE_KEY = "pokemon-binder-v2";

let state = {
  slots: [],
  bench: new Array(BENCH_SIZE).fill(null),
  pageBg: {},
  pages: 6,
  spread: 0,
  fit: "cover",
  coverTitle: "My Collection",
  coverSub: "Sammler-Ordner",
  // Besitz-Status pro Ordner-Feld: { "<index>": "missing" }.
  // Nicht eingetragen = "owned" (Standard, grün). Nur "missing" wird gespeichert.
  owned: {},
  // Gesamthintergrund hinter dem Ordner: null = Standard-Holz, sonst Base64-Bild.
  appBg: null,
};

// Markier-Modus (nur Ansicht, nicht persistiert): zeigt grüne/rote Ränder
let markMode = false;

/* ---- Laden ---- */
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
  } catch (e) { console.warn("Konnte Stand nicht laden:", e); }
  normalize();
}
function normalize() {
  // slots an Seitenzahl anpassen
  const need = state.pages * SLOTS_PER_PAGE;
  while (state.slots.length < need) state.slots.push(null);
  state.slots.length = need;
  // bench-Größe sichern
  if (!Array.isArray(state.bench)) state.bench = [];
  while (state.bench.length < BENCH_SIZE) state.bench.push(null);
  state.bench.length = BENCH_SIZE;
  if (!state.pageBg || typeof state.pageBg !== "object") state.pageBg = {};
  if (!state.owned || typeof state.owned !== "object") state.owned = {};
}

/* ---- Speichern ---- */
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { toast("Speicher voll – exportiere als JSON, um nichts zu verlieren."); console.warn(e); }
}

/* ---- Karten-Zugriff über LOCATION-ID ---- */
function getCard(loc) {
  const [kind, n] = loc.split(":"); const i = +n;
  return kind === "bench" ? state.bench[i] : state.slots[i];
}
function setCard(loc, val) {
  const [kind, n] = loc.split(":"); const i = +n;
  if (kind === "bench") state.bench[i] = val; else state.slots[i] = val;
}

/* Karte duplizieren: kopiert das Bild in den nächsten freien Platz.
   Suchreihenfolge: Ordner-Felder ab der Quelle -> übrige Ordner-Felder ->
   Bank. Ist alles voll, werden zwei neue Seiten angehängt. */
function duplicateCard(loc) {
  const img = getCard(loc);
  if (!img) return;

  const total = state.pages * SLOTS_PER_PAGE;
  const startIdx = loc.startsWith("slot:") ? (+loc.split(":")[1] + 1) : 0;

  // 1) freier Ordner-Slot ab Quelle, dann umlaufend vom Anfang
  for (let k = 0; k < total; k++) {
    const idx = (startIdx + k) % total;
    if (!state.slots[idx]) { state.slots[idx] = img; save(); render(); toast("Karte dupliziert (Seite " + (Math.floor(idx / SLOTS_PER_PAGE) + 1) + ")."); return; }
  }
  // 2) freier Bank-Platz
  for (let i = 0; i < BENCH_SIZE; i++) {
    if (!state.bench[i]) { state.bench[i] = img; save(); render(); toast("Karte auf die Ablage dupliziert."); return; }
  }
  // 3) alles voll -> zwei neue Seiten, Kopie auf erstes neues Feld
  const firstNew = total;
  state.pages += 2; normalize();
  state.slots[firstNew] = img;
  save(); render();
  toast("Neue Seite angelegt – Karte dupliziert.");
}

/* ============================================================================
   BILD-KOMPRIMIERUNG (max. Breite, JPEG) — hält Speicher klein
   ========================================================================== */
function compressImage(file, maxW = 600, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject; img.src = reader.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

/* ============================================================================
   RENDERING
   ========================================================================== */
const binder = document.getElementById("binder");
const benchRow = document.getElementById("benchRow");

function leftPageIndexForSpread(spread)  { return spread === 0 ? -1 : spread * 2 - 1; }
function rightPageIndexForSpread(spread) { return spread === 0 ? 0  : spread * 2; }

function render() {
  normalize();
  binder.innerHTML = "";

  const leftPage  = leftPageIndexForSpread(state.spread);
  const rightPage = rightPageIndexForSpread(state.spread);

  // linke Hälfte
  binder.appendChild(leftPage === -1 ? makeCoverInner("left") : makePage(leftPage, "left"));
  // Falz mit Ringmechanik (6 offene Metallringe wie im echten Ordner)
  const spine = document.createElement("div"); spine.className = "spine";
  for (let i = 0; i < 6; i++) {
    const ring = document.createElement("div"); ring.className = "ring";
    ring.innerHTML = ringSVG();
    spine.appendChild(ring);
  }
  binder.appendChild(spine);
  // rechte Hälfte
  binder.appendChild(rightPage < state.pages ? makePage(rightPage, "right") : makeCoverInner("right"));

  renderBench();
  updatePager();
  applyFitClass();
}

/* Leder-Innenseite des Deckels mit editierbarem Text */
function makeCoverInner(sideClass) {
  const el = document.createElement("div");
  el.className = "side " + sideClass + " cover-inner";

  // Nur der LINKE Deckel (spread 0) trägt den editierbaren Text.
  if (sideClass === "left") {
    const plate = document.createElement("div");
    plate.className = "cover-plate";

    const pb = document.createElement("div"); pb.className = "emblem pb"; pb.textContent = "TCG"; plate.appendChild(pb);

    const h2 = document.createElement("h2");
    h2.className = "editable"; h2.contentEditable = "true"; h2.spellcheck = false;
    h2.textContent = state.coverTitle || "";
    h2.title = "Klicken zum Bearbeiten";
    h2.addEventListener("blur", () => { state.coverTitle = h2.textContent.trim() || "My Collection"; save(); });
    h2.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); h2.blur(); } });
    plate.appendChild(h2);

    const line = document.createElement("div"); line.className = "line"; plate.appendChild(line);

    const p = document.createElement("p");
    p.className = "editable"; p.contentEditable = "true"; p.spellcheck = false;
    p.textContent = state.coverSub || "";
    p.title = "Klicken zum Bearbeiten";
    p.addEventListener("blur", () => { state.coverSub = p.textContent.trim(); save(); });
    p.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); p.blur(); } });
    plate.appendChild(p);

    const hint = document.createElement("div");
    hint.className = "cover-hint"; hint.textContent = "✎ Text anklicken zum Ändern";
    plate.appendChild(hint);

    el.appendChild(plate);
  }
  return el;
}

/* Offener Metallring als SVG. Eindeutige IDs pro Aufruf, damit mehrere
   Gradienten auf der Seite nicht kollidieren. Die Mitte bleibt transparent,
   sodass die dahinterliegende Lochung/Seite durchscheint. */
let _ringSeq = 0;
function ringSVG() {
  const id = "r" + (++_ringSeq);
  return `
  <svg viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="${id}m" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0"   stop-color="#ffffff"/>
        <stop offset=".35" stop-color="#dfe3e7"/>
        <stop offset=".55" stop-color="#aab0b6"/>
        <stop offset=".8"  stop-color="#7c8187"/>
        <stop offset="1"   stop-color="#54585d"/>
      </linearGradient>
      <linearGradient id="${id}h" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity=".95"/>
        <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <!-- Schlagschatten auf der Seite -->
    <circle cx="27" cy="29" r="20" fill="none" stroke="rgba(0,0,0,.35)" stroke-width="7"/>
    <!-- Metallreif -->
    <circle cx="27" cy="27" r="20" fill="none" stroke="url(#${id}m)" stroke-width="6.5"/>
    <!-- dunkle Innenkante (Tiefe des Drahts) -->
    <circle cx="27" cy="27" r="17" fill="none" stroke="rgba(0,0,0,.35)" stroke-width="1.4"/>
    <!-- heller Glanzbogen oben -->
    <path d="M14 18 A20 20 0 0 1 40 18" fill="none" stroke="url(#${id}h)" stroke-width="2.4" stroke-linecap="round"/>
  </svg>`;
}

/* Lochreihe (6 gestanzte Löcher) am Falz-Rand einer Seite */
function makePunchStrip() {
  const strip = document.createElement("div");
  strip.className = "punch";
  for (let i = 0; i < 6; i++) {
    const h = document.createElement("div"); h.className = "hole";
    strip.appendChild(h);
  }
  return strip;
}

/* Eine Karten-Seite (3x3) mit eigenem Hintergrundbild + Werkzeugen */
function makePage(pageIndex, sideClass) {
  const side = document.createElement("div");
  side.className = "side " + sideClass;

  // Hintergrundbild-Ebene (nur wenn für diese Seite eines gesetzt ist)
  const bg = state.pageBg[pageIndex];
  if (bg) {
    side.classList.add("has-bg");
    const layer = document.createElement("div");
    layer.className = "page-bg-layer";
    layer.style.backgroundImage = `url(${bg})`;
    side.appendChild(layer);
  }

  // gestanzte Lochreihe am Falz-Rand
  side.appendChild(makePunchStrip());

  // Werkzeuge: Seiten-Hintergrund setzen / entfernen / als Bild exportieren
  const tools = document.createElement("div");
  tools.className = "page-tools";

  const bgBtn = document.createElement("button");
  bgBtn.textContent = bg ? "🖼 Bild ändern" : "🖼 Bild";
  bgBtn.title = "Hintergrundbild dieser Seite setzen";
  bgBtn.addEventListener("click", (e) => { e.stopPropagation(); pickPageBg(pageIndex); });
  tools.appendChild(bgBtn);

  if (bg) {
    const clr = document.createElement("button");
    clr.textContent = "✕ Bild";
    clr.title = "Hintergrundbild dieser Seite entfernen";
    clr.addEventListener("click", (e) => { e.stopPropagation(); delete state.pageBg[pageIndex]; save(); render(); });
    tools.appendChild(clr);
  }

  const snap = document.createElement("button");
  snap.textContent = "📸 Export";
  snap.title = "Diese 9er-Seite als quadratisches Bild (1080×1080) exportieren";
  snap.addEventListener("click", (e) => { e.stopPropagation(); exportPageImage(pageIndex); });
  tools.appendChild(snap);

  side.appendChild(tools);

  // Grid
  const grid = document.createElement("div");
  grid.className = "grid";
  const base = pageIndex * SLOTS_PER_PAGE;
  for (let i = 0; i < SLOTS_PER_PAGE; i++) grid.appendChild(makeSlot("slot:" + (base + i)));
  side.appendChild(grid);

  return side;
}

/* Bank rendern */
function renderBench() {
  benchRow.innerHTML = "";
  for (let i = 0; i < BENCH_SIZE; i++) benchRow.appendChild(makeSlot("bench:" + i));
}

/* Ein Feld (Ordner ODER Bank) — adressiert über LOCATION-ID */
function makeSlot(loc) {
  const slot = document.createElement("div");
  slot.className = "slot";
  slot.dataset.loc = loc;

  const isBinderSlot = loc.startsWith("slot:");
  const slotIndex = isBinderSlot ? +loc.split(":")[1] : null;

  // Markier-Modus: nur Ordner-Felder bekommen einen farbigen Status-Rand.
  // Standard = "owned" (grün); explizit als "missing" markierte Felder = rot.
  if (markMode && isBinderSlot) {
    const status = state.owned[slotIndex] === "missing" ? "missing" : "owned";
    slot.classList.add("mark", status === "missing" ? "mark-missing" : "mark-owned");
  }

  const img = getCard(loc);

  if (img) {
    slot.classList.add("filled");
    slot.setAttribute("draggable", "true");

    const im = document.createElement("img"); im.src = img; slot.appendChild(im);

    const del = document.createElement("button");
    del.className = "del"; del.textContent = "✕"; del.title = "Karte entfernen";
    del.addEventListener("click", (e) => { e.stopPropagation(); setCard(loc, null); save(); render(); });
    slot.appendChild(del);

    // Duplizieren: kopiert die Karte in den nächsten freien Platz
    const dup = document.createElement("button");
    dup.className = "dup"; dup.textContent = "⧉"; dup.title = "Karte duplizieren";
    dup.addEventListener("click", (e) => { e.stopPropagation(); duplicateCard(loc); });
    slot.appendChild(dup);

    slot.addEventListener("click", () => openModal(img));
  } else {
    const plus = document.createElement("div"); plus.className = "plus"; plus.textContent = "+";
    slot.appendChild(plus);
    slot.addEventListener("click", () => triggerUpload(loc));
  }

  // Im Markier-Modus: kleiner Umschalt-Knopf auf Ordner-Feldern (grün <-> rot).
  // Erscheint NUR im Modus, damit das normale Design ungestört bleibt.
  if (markMode && isBinderSlot) {
    const toggle = document.createElement("button");
    const isMissing = state.owned[slotIndex] === "missing";
    toggle.className = "mark-toggle " + (isMissing ? "is-missing" : "is-owned");
    toggle.textContent = isMissing ? "✕" : "✓";
    toggle.title = isMissing ? "Als 'habe ich' markieren" : "Als 'fehlt noch' markieren";
    toggle.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isMissing) delete state.owned[slotIndex];   // zurück zu owned (Standard)
      else state.owned[slotIndex] = "missing";
      save(); render();
    });
    slot.appendChild(toggle);
  }

  attachDragAndDrop(slot, loc);
  return slot;
}

/* ============================================================================
   DRAG & DROP  (einheitlich über LOCATION-IDs)
   ----------------------------------------------------------------------------
   - Datei vom Desktop auf ein Feld  -> Upload dorthin
   - Karte von loc A auf loc B        -> Plätze TAUSCHEN (Ordner<->Ordner,
                                          Ordner<->Bank, Bank<->Bank)
   ========================================================================== */
let dragSourceLoc = null;

function attachDragAndDrop(slot, loc) {
  slot.addEventListener("dragstart", (e) => {
    if (!getCard(loc)) return;
    dragSourceLoc = loc;
    slot.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", loc);
  });
  slot.addEventListener("dragend", () => {
    slot.classList.remove("dragging");
    dragSourceLoc = null;
    document.querySelectorAll(".slot.dragover").forEach(s => s.classList.remove("dragover"));
  });
  slot.addEventListener("dragover", (e) => { e.preventDefault(); slot.classList.add("dragover"); });
  slot.addEventListener("dragleave", () => slot.classList.remove("dragover"));

  slot.addEventListener("drop", async (e) => {
    e.preventDefault();
    slot.classList.remove("dragover");

    // Datei vom Desktop?
    if (e.dataTransfer.files && e.dataTransfer.files.length) {
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("image/")) {
        setCard(loc, await compressImage(file)); save(); render();
      }
      return;
    }
    // vorhandene Karte verschieben/tauschen
    const src = dragSourceLoc || e.dataTransfer.getData("text/plain");
    if (src && src !== loc) {
      const a = getCard(src), b = getCard(loc);
      setCard(loc, a); setCard(src, b);     // tauschen
      save(); render();
    }
  });
}

/* ============================================================================
   UPLOAD ÜBER DATEI-DIALOG  (Karten)
   ========================================================================== */
const cardFileInput = document.getElementById("cardFile");
let uploadTargetLoc = null;
function triggerUpload(loc) { uploadTargetLoc = loc; cardFileInput.value = ""; cardFileInput.click(); }
cardFileInput.addEventListener("change", async () => {
  const file = cardFileInput.files[0];
  if (!file || !uploadTargetLoc) return;
  setCard(uploadTargetLoc, await compressImage(file)); save(); render();
});

/* ============================================================================
   SEITEN-HINTERGRUND wählen
   ========================================================================== */
const pageBgInput = document.getElementById("pageBgFile");
let pageBgTarget = null;
function pickPageBg(pageIndex) { pageBgTarget = pageIndex; pageBgInput.value = ""; pageBgInput.click(); }
pageBgInput.addEventListener("change", async () => {
  const file = pageBgInput.files[0];
  if (!file || pageBgTarget === null) return;
  // Hintergrund etwas größer komprimieren (mehr Fläche, schärfer im Export)
  state.pageBg[pageBgTarget] = await compressImage(file, 1400, 0.82);
  save(); render();
});

/* ============================================================================
   LIGHTBOX
   ========================================================================== */
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
function openModal(src) { modalImg.src = src; modal.classList.add("open"); }
function closeModal() { modal.classList.remove("open"); modalImg.src = ""; }
document.getElementById("modalClose").addEventListener("click", closeModal);
modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

/* ============================================================================
   PAGINATION (immer zwei Seiten, mit Animation)
   ========================================================================== */
const posLabel = document.getElementById("pos");
function updatePager() {
  const left = leftPageIndexForSpread(state.spread);
  const right = rightPageIndexForSpread(state.spread);
  let txt;
  if (state.spread === 0) txt = "Deckel · Seite 1";
  else txt = "Seite " + (left + 1) + " · " + (right < state.pages ? "Seite " + (right + 1) : "Rückseite");
  posLabel.textContent = txt;

  const atStart = state.spread === 0;
  const atEnd = leftPageIndexForSpread(state.spread + 1) >= state.pages;
  document.getElementById("prevBtn").disabled = atStart;
  document.getElementById("nextBtn").disabled = atEnd;
  // seitliche Pfeile spiegeln denselben Status
  const sp = document.getElementById("sideNavPrev"), sn = document.getElementById("sideNavNext");
  if (sp) sp.disabled = atStart;
  if (sn) sn.disabled = atEnd;
}

/* Direkt zu einer Seitenzahl springen (1-basiert). Wählt den Spread,
   in dem diese Seite sichtbar ist. */
function goToPage(pageNumber) {
  let p = Math.round(pageNumber);
  if (isNaN(p)) return;
  p = Math.max(1, Math.min(state.pages, p));     // in gültigen Bereich klemmen
  const idx = p - 1;                              // 0-basiert
  // spread 0 zeigt Seite 1 (idx 0). Ab da: linke Seite = 2*spread-1.
  const spread = idx === 0 ? 0 : Math.ceil(idx / 2);
  state.spread = spread;
  save(); render();
  toast("Zu Seite " + p + " gesprungen.");
}

function flip(direction) {
  const target = direction === "next" ? state.spread + 1 : state.spread - 1;
  if (target < 0) return;
  if (direction === "next" && leftPageIndexForSpread(target) >= state.pages) return;

  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduce) { state.spread = target; save(); render(); return; }

  const flipEl = document.createElement("div");
  flipEl.className = "flip " + direction;
  binder.appendChild(flipEl);
  flipEl.addEventListener("animationend", () => { state.spread = target; save(); render(); }, { once: true });
}
document.getElementById("nextBtn").addEventListener("click", () => flip("next"));
document.getElementById("prevBtn").addEventListener("click", () => flip("prev"));
document.getElementById("sideNavNext").addEventListener("click", () => flip("next"));
document.getElementById("sideNavPrev").addEventListener("click", () => flip("prev"));

/* Anklickbare Seitenanzeige: Klick blendet ein Eingabefeld ein,
   Enter springt zur eingegebenen Seite. */
const jumpInput = document.getElementById("jumpInput");
posLabel.addEventListener("click", () => {
  jumpInput.classList.remove("hidden");
  posLabel.classList.add("hidden");
  jumpInput.value = "";
  jumpInput.max = String(state.pages);
  jumpInput.focus();
});
function closeJump() { jumpInput.classList.add("hidden"); posLabel.classList.remove("hidden"); }
jumpInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { const v = parseInt(jumpInput.value, 10); closeJump(); if (!isNaN(v)) goToPage(v); }
  else if (e.key === "Escape") closeJump();
});
jumpInput.addEventListener("blur", closeJump);
document.addEventListener("keydown", (e) => {
  if (modal.classList.contains("open")) return;
  // nicht blättern, während man Deckel-Text bearbeitet
  if (document.activeElement && document.activeElement.isContentEditable) return;
  if (e.key === "ArrowRight") flip("next");
  if (e.key === "ArrowLeft")  flip("prev");
});
document.getElementById("addPageBtn").addEventListener("click", () => {
  state.pages += 2; normalize(); save(); render(); toast("Zwei Seiten hinzugefügt.");
});

/* ============================================================================
   COVER / CONTAIN
   ========================================================================== */
const fitCoverBtn = document.getElementById("fitCover");
const fitContainBtn = document.getElementById("fitContain");
function applyFitClass() {
  document.body.classList.toggle("fit-contain", state.fit === "contain");
  fitCoverBtn.classList.toggle("active", state.fit === "cover");
  fitContainBtn.classList.toggle("active", state.fit === "contain");
}
fitCoverBtn.addEventListener("click", () => { state.fit = "cover"; applyFitClass(); save(); });
fitContainBtn.addEventListener("click", () => { state.fit = "contain"; applyFitClass(); save(); });

/* ============================================================================
   MARKIER-MODUS (an/aus)
   ========================================================================== */
const markBtn = document.getElementById("markBtn");
markBtn.addEventListener("click", () => {
  markMode = !markMode;
  markBtn.classList.toggle("primary", markMode);
  markBtn.textContent = markMode ? "✓ Markieren: AN" : "✓ Markieren";
  render();
  toast(markMode
    ? "Markier-Modus an: grün = habe ich, rot = fehlt noch."
    : "Markier-Modus aus.");
});

/* ============================================================================
   GESAMTHINTERGRUND (hinter dem Ordner)
   ----------------------------------------------------------------------------
   null = Standard-Holzoptik (per CSS). Sonst überschreibt ein Bild den body.
   Der Reset-Button (↺) stellt die Holzoptik wieder her.
   ========================================================================== */
function applyAppBg() {
  if (state.appBg) {
    document.body.style.backgroundImage = `url(${state.appBg})`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
  } else {
    // zurück zur CSS-Standard-Holzoptik
    document.body.style.backgroundImage = "";
    document.body.style.backgroundSize = "";
    document.body.style.backgroundPosition = "";
  }
}

const appBgInput = document.getElementById("appBgFile");
const appBgBtn = document.getElementById("appBgBtn");
const appBgResetBtn = document.getElementById("appBgResetBtn");
appBgBtn.addEventListener("click", () => { appBgInput.value = ""; appBgInput.click(); });
appBgResetBtn.addEventListener("click", () => {
  if (!state.appBg) { toast("Hintergrund ist bereits der Standard."); return; }
  state.appBg = null; applyAppBg(); save();
  toast("Hintergrund auf Standard-Holz zurückgesetzt.");
});
appBgInput.addEventListener("change", async () => {
  const file = appBgInput.files[0]; if (!file) return;
  state.appBg = await compressImage(file, 1800, 0.82);
  applyAppBg(); save();
  toast("Hintergrund geändert.");
});

/* ============================================================================
   JSON EXPORT / IMPORT
   ========================================================================== */
document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "tcg-binder.json"; a.click();
  URL.revokeObjectURL(url);
  toast("Ordner als JSON exportiert.");
});
const importFileInput = document.getElementById("importFile");
document.getElementById("importBtn").addEventListener("click", () => { importFileInput.value = ""; importFileInput.click(); });
importFileInput.addEventListener("change", () => {
  const file = importFileInput.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data.slots)) throw new Error("Ungültige Datei");
      state = Object.assign({
        bench: new Array(BENCH_SIZE).fill(null), pageBg: {}, fit: "cover", owned: {}, appBg: null,
        coverTitle: "My Collection", coverSub: "Sammler-Ordner"
      }, data);
      state.spread = 0;
      normalize(); applyAppBg(); save(); render();
      toast("Ordner importiert.");
    } catch (e) { toast("Import fehlgeschlagen: keine gültige Binder-Datei."); console.warn(e); }
  };
  reader.readAsText(file);
});

/* ============================================================================
   BILD-EXPORT EINER 9er-SEITE  (1080×1080, immer gleiches Layout)
   ----------------------------------------------------------------------------
   Verwendet das Hintergrundbild GENAU DIESER Seite. So sieht der Export aus
   wie das, was man im Ordner sieht: Bild als Blatt-Hintergrund + 3x3-Raster.
   ========================================================================== */
function exportPageImage(pageIndex) {
  const SIZE = 1080;
  const canvas = document.createElement("canvas");
  canvas.width = SIZE; canvas.height = SIZE;
  const ctx = canvas.getContext("2d");

  const loadImg = (src) => new Promise((res) => {
    if (!src) return res(null);
    const i = new Image(); i.onload = () => res(i); i.onerror = () => res(null); i.src = src;
  });

  const PAD = 70, GAP = 24;
  const innerW = SIZE - PAD * 2;
  const cardW = (innerW - GAP * 2) / 3;
  const cardH = cardW * (8.8 / 6.3);
  const gridH = cardH * 3 + GAP * 2;
  const startY = (SIZE - gridH) / 2;

  const base = pageIndex * SLOTS_PER_PAGE;
  const sources = [];
  for (let i = 0; i < SLOTS_PER_PAGE; i++) sources.push(state.slots[base + i]);

  Promise.all([loadImg(state.pageBg[pageIndex]), ...sources.map(loadImg)]).then((imgs) => {
    const bgImg = imgs[0], cardImgs = imgs.slice(1);

    if (bgImg) {
      drawCover(ctx, bgImg, 0, 0, SIZE, SIZE);
      ctx.fillStyle = "rgba(0,0,0,0.22)"; ctx.fillRect(0, 0, SIZE, SIZE);
    } else {
      const g = ctx.createLinearGradient(0, 0, SIZE, SIZE);
      g.addColorStop(0, "#2c3340"); g.addColorStop(1, "#0d0f14");
      ctx.fillStyle = g; ctx.fillRect(0, 0, SIZE, SIZE);
    }

    for (let r = 0; r < 3; r++) for (let c = 0; c < 3; c++) {
      const idx = r * 3 + c;
      const x = PAD + c * (cardW + GAP), y = startY + r * (cardH + GAP);
      roundRect(ctx, x, y, cardW, cardH, 14);
      ctx.fillStyle = "rgba(255,255,255,0.10)"; ctx.fill();
      const ci = cardImgs[idx];
      if (ci) {
        ctx.save(); roundRect(ctx, x, y, cardW, cardH, 14); ctx.clip();
        (state.fit === "contain" ? drawContain : drawCover)(ctx, ci, x, y, cardW, cardH);
        ctx.restore();
      }
      roundRect(ctx, x, y, cardW, cardH, 14);
      ctx.lineWidth = 2; ctx.strokeStyle = "rgba(0,0,0,0.35)"; ctx.stroke();
    }

    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "binder-seite-" + (pageIndex + 1) + ".png"; a.click();
    toast("Seitenbild (1080×1080) exportiert.");
  });
}

function drawCover(ctx, img, x, y, w, h) {
  const ir = img.width / img.height, br = w / h; let sw, sh, sx, sy;
  if (ir > br) { sh = img.height; sw = sh * br; sx = (img.width - sw) / 2; sy = 0; }
  else         { sw = img.width;  sh = sw / br; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}
function drawContain(ctx, img, x, y, w, h) {
  const ir = img.width / img.height, br = w / h; let dw, dh;
  if (ir > br) { dw = w; dh = w / ir; } else { dh = h; dw = h * ir; }
  ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

/* ============================================================================
   TOAST
   ========================================================================== */
let toastTimer = null;
const toastEl = document.getElementById("toast");
function toast(msg) {
  toastEl.textContent = msg; toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2200);
}

/* ============================================================================
   START
   ========================================================================== */
load();
applyAppBg();
render();
</script>
