<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Binder</title>

<!--
  ============================================================================
  POKÉMON BINDER — Digitaler Karten-Ordner
  ----------------------------------------------------------------------------
  Eine eigenständige Single-Page-App. Einfach diese Datei im Browser öffnen.
  Kein Server, kein Internet, keine externen Bibliotheken nötig.

  Aufbau dieser Datei:
    1. <style>  — gesamtes Design (Ordner-Optik, Grids, Bank, Modals, Toolbar)
    2. <body>   — minimales HTML-Gerüst, der Inhalt wird per JS erzeugt
    3. <script> — die komplette Logik (State, Rendering, Drag&Drop, Export…)

  Wichtige Konzepte in dieser Version:
    - Jede Karten-Seite ist ein "A4-Blatt": Das Hintergrundbild liegt HINTER
      dem 3x3-Raster (nicht hinter dem ganzen Ordner). Pro Seite eigenes Bild.
    - Unter dem Ordner gibt es eine "Bank" mit 8 Ablageplätzen, um Karten
      zwischenzuparken und so bequem seitenübergreifend umzusortieren.
    - Karten werden über eine LOCATION-ID adressiert:
        "slot:<n>"  = Feld n im Ordner (durchgehend über alle Seiten)
        "bench:<n>" = Platz n auf der Bank
      Dadurch funktioniert Drag&Drop einheitlich in alle Richtungen.

  Speicherung:
    - Bei jeder Änderung wird der Zustand in localStorage gesichert.
    - "Exportieren" lädt alles (inkl. Bilder als Base64) als .json herunter.
    - "Importieren" stellt einen Ordner aus so einer .json wieder her.
  ============================================================================
-->

<style>
  /* ---------- Design-Tokens (Farben, Maße) ---------- */
  :root {
    --card-w: 156px;             /* Kartenbreite (Verhältnis 6,3:8,8), 50% größer */
    --card-h: 218px;             /* 156 * (8.8/6.3) ≈ 218 */
    --grid-gap: 12px;
    /* Quadratisches Blatt: Rasterhöhe = 3*218 + 2*12 = 678px -> Blatt 750x750 */
    --page-size: 750px;
    --page-pad: 22px;            /* (Restwert) */

    --leather-1: #23262f;
    --leather-2: #14161c;
    --page-bg: #f2f3f8;          /* heller "Papier"-Ton der Innenseite (wenn kein Bild) */
    --page-bg-2: #e4e6ee;
    --slot-empty: rgba(139,124,246,.10);
    --slot-border: rgba(139,124,246,.38);

    --gold: #8b7cf6;
    --accent: #f43f5e;           /* Akzentfarbe (Rose) */
    --ink: #1b1d29;
    --toolbar-bg: rgba(16,17,24,.82);
    --shadow: 0 18px 40px rgba(0,0,0,.45);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #e7e8f2;
    /* Moderner, dunkler Hintergrund hinter dem ganzen Ordner (Grid + sanftes Glühen) */
    background-color: #0b0d12;
    background-image:
      radial-gradient(1100px 560px at 12% -8%, rgba(139,124,246,.20), transparent 60%),
      radial-gradient(900px 480px at 100% 4%, rgba(34,211,201,.12), transparent 55%),
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(180deg, #12141d 0%, #0b0d12 100%);
    background-size: auto, auto, 42px 42px, 42px 42px, auto;
    background-repeat: no-repeat, no-repeat, repeat, repeat, no-repeat;
    overflow: hidden;
  }

  /* ---------- Obere Toolbar ---------- */
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--toolbar-bg);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,.06);
    z-index: 50;
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    font-weight: 700; letter-spacing: .3px; margin-right: 6px;
    white-space: nowrap;
  }
  /* TCG-Emblem: kleines goldgerahmtes Wappen mit Monogramm */
  .emblem {
    width: 22px; height: 22px; border-radius: 6px; flex: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; letter-spacing: .5px; color: #14121f;
    background: linear-gradient(160deg, #c4baff, #8b7cf6 55%, #5b4bd6);
    border: 1.5px solid rgba(0,0,0,.35);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.5);
  }
  .brand small { font-weight: 400; opacity: .6; }
  .spacer { flex: 1; }

  .btn {
    appearance: none; border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06); color: #e7e8f2;
    padding: 8px 12px; border-radius: 9px; font-size: 13px;
    cursor: pointer; white-space: nowrap; transition: .15s;
  }
  .btn:hover { background: rgba(255,255,255,.14); }
  .btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .btn.primary { background: var(--accent); border-color: transparent; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.08); }

  /* cover/contain Umschalter */
  .seg { display: inline-flex; border: 1px solid rgba(255,255,255,.14); border-radius: 9px; overflow: hidden; }
  .seg button { border: 0; background: transparent; color: #e7e8f2; padding: 8px 11px; font-size: 12px; cursor: pointer; }
  .seg button.active { background: var(--gold); color: #14121f; font-weight: 700; }

  /* Icon statt Text in Buttons (Toolbar-Icons, konsistente Strichzeichnungen) */
  .btn svg, .seg button svg { width: 16px; height: 16px; display: block; flex: none; }
  .btn.icon-only { padding: 8px; display: inline-flex; align-items: center; justify-content: center; }
  .seg.icon-seg button { padding: 8px 10px; display: inline-flex; align-items: center; justify-content: center; }
  .btn.with-icon { display: inline-flex; align-items: center; gap: 7px; }

  /* iOS-artiger Toggle-Switch für binäre Einstellungen (statt zweier Text-Buttons) */
  .icon-switch {
    appearance: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06); color: #e7e8f2;
    padding: 6px 10px 6px 9px; border-radius: 9px; font-size: 12px; transition: .15s;
  }
  .icon-switch:hover { background: rgba(255,255,255,.12); }
  .icon-switch svg { width: 15px; height: 15px; flex: none; }
  .switch-track {
    width: 30px; height: 17px; border-radius: 20px; background: rgba(255,255,255,.2);
    position: relative; flex: none; transition: background .2s;
  }
  .switch-thumb {
    position: absolute; top: 2px; left: 2px; width: 13px; height: 13px; border-radius: 50%;
    background: #fff; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .icon-switch.on { color: #e7e8f2; }
  .icon-switch.on .switch-track { background: var(--gold); }
  .icon-switch.on .switch-thumb { transform: translateX(13px); }

  /* Toolbar-Gruppen + Mehr-Menü */
  .toolbar-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .menu-wrap { position: relative; }
  .menu {
    position: absolute; top: calc(100% + 6px); right: 0; min-width: 230px;
    background: rgba(22,20,32,.98); border: 1px solid rgba(139,124,246,.35);
    border-radius: 10px; padding: 6px; z-index: 60;
    box-shadow: 0 12px 30px rgba(0,0,0,.5); display: none;
  }
  .menu.open { display: block; }
  .menu-item {
    display: block; width: 100%; text-align: left;
    background: transparent; border: 0; color: #e7e8f2;
    padding: 9px 12px; border-radius: 7px; font-size: 13px; cursor: pointer;
  }
  .menu-item:hover { background: rgba(255,255,255,.1); }
  .menu-sep { height: 1px; background: rgba(255,255,255,.1); margin: 5px 4px; }

  /* ---------- Bühne / Ordner ---------- */
  .stage {
    height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px;
    padding: 64px 156px 70px 24px;   /* rechts Platz für die Vorschau-Leiste */
    overflow: auto;
  }

  .binder {
    display: flex;
    perspective: 2600px;          /* für die Umblätter-Animation */
    position: relative;
    flex: none;
    /* Leder-Korpus, der etwas über die Seiten hinausragt (wie ein echter Ordner) */
    padding: 16px;
    border-radius: 16px;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.02) 0 3px, transparent 3px 7px),
      radial-gradient(140% 160% at 25% 15%, #2a2e3b, #1c1f29 55%, #12141b);
    box-shadow:
      var(--shadow),
      inset 0 0 0 2px rgba(0,0,0,.35),
      inset 0 0 0 3px rgba(139,124,246,.18);
  }
  /* umlaufende Ziernaht des Ledereinbands */
  .binder::before {
    content: ""; position: absolute; inset: 8px; border-radius: 12px;
    border: 2px dashed rgba(228,205,150,.35);
    pointer-events: none; z-index: 30;
  }

  /* Eine Ordnerhälfte (linke oder rechte Seite) — quadratisches Blatt */
  .side {
    width: var(--page-size);
    height: var(--page-size);
    min-height: var(--page-size);
    position: relative;
    transform-style: preserve-3d;
    display: flex; align-items: center; justify-content: center;  /* Raster mittig */
    /* cremefarbenes "Papier"; wird von .page-bg-layer überlagert, wenn ein Bild gesetzt ist */
    background:
      linear-gradient(160deg, #f2f3f8, #e4e6ee);
    overflow: hidden;
  }
  /* die Falz-Seite bekommt minimal mehr Rand für die Bindung */
  .side.right { padding-left: 10px; }
  .side.left  { padding-right: 10px; }
  .side.left  { border-radius: 10px 4px 4px 10px; box-shadow: inset -30px 0 42px -26px rgba(60,40,20,.6); }
  .side.right { border-radius: 4px 10px 10px 4px; box-shadow: inset  30px 0 42px -26px rgba(60,40,20,.6); }
  /* feiner Doppelrahmen auf den Seiten (wie im Referenzbild) */
  .side::before {
    content: ""; position: absolute; inset: 14px; z-index: 1;
    border: 1px solid rgba(120,90,50,.45);
    box-shadow: 0 0 0 3px rgba(120,90,50,.12);
    pointer-events: none; border-radius: 3px;
  }
  /* wenn ein Seiten-Hintergrundbild aktiv ist, Rahmen heller halten */
  .side.has-bg::before { border-color: rgba(255,255,255,.5); box-shadow: 0 0 0 3px rgba(255,255,255,.15); }

  /* gestanzte Lochreihe, durch die die Ringe greifen (am Falz-Rand der Seite) */
  .punch {
    position: absolute; top: 0; bottom: 0; width: 30px; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-around; padding: 30px 0; pointer-events: none;
  }
  .side.right .punch { left: 8px; }
  .side.left  .punch { right: 8px; }
  .hole {
    width: 14px; height: 14px; border-radius: 50%;
    /* gestanztes Loch: dunkle Mitte, leichter Prägerand */
    background: radial-gradient(circle at 50% 40%, #cbd0dc, #9aa1b0 70%, #6b7280);
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,.6),
      inset 0 -1px 1px rgba(255,255,255,.5),
      0 1px 0 rgba(255,255,255,.45);
  }

  /* Das Hintergrundbild EINER Seite (liegt hinter dem Raster, innerhalb des "Blatts") */
  .page-bg-layer {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    z-index: 0;
  }
  .page-bg-layer::after {  /* leichte Abdunklung für Kartenkontrast */
    content: ""; position: absolute; inset: 0; background: rgba(0,0,0,.18);
  }

  /* ===== Mittelfalz wie bei einem gebundenen Buch =====
     Dunkle, leicht eingesenkte Rille zwischen den Seiten mit weichem
     Schattenverlauf nach beiden Seiten. */
  .spine {
    width: 30px; flex: none; position: relative; z-index: 25;
    background:
      linear-gradient(90deg,
        rgba(0,0,0,.05) 0%,
        rgba(0,0,0,.35) 28%,
        rgba(0,0,0,.55) 50%,
        rgba(0,0,0,.35) 72%,
        rgba(0,0,0,.05) 100%);
  }
  /* feine Mittellinie der Bindung */
  .spine::before {
    content: ""; position: absolute; top: 0; bottom: 0; left: 50%;
    width: 2px; transform: translateX(-50%);
    background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,.5) 12%, rgba(0,0,0,.5) 88%, rgba(0,0,0,0));
  }

  /* Die Leder-Innenseite des Deckels (erste Ansicht, links) */
  .cover-inner {
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.018) 0 2px, transparent 2px 6px),
      radial-gradient(130% 150% at 28% 18%, #262a38, #191c26 55%, #101219);
    display: flex; align-items: center; justify-content: center;
    color: #cdc6ff;
    box-shadow: inset -26px 0 42px -22px rgba(0,0,0,.75);
  }
  .cover-inner.right { box-shadow: inset 26px 0 42px -22px rgba(0,0,0,.75); }
  /* auf dem Leder-Deckel keinen hellen Papier-Rahmen zeichnen */
  .cover-inner::before { border-color: rgba(228,205,150,.22); box-shadow: none; inset: 18px; }
  .cover-plate {
    text-align: center; padding: 30px;
    border: 1px solid rgba(139,124,246,.4);
    border-radius: 10px;
    background: rgba(0,0,0,.12);
    box-shadow: 0 0 0 6px rgba(139,124,246,.06);
    max-width: 80%;
  }
  .cover-plate .pb { width: 56px; height: 56px; margin: 0 auto 14px; font-size: 20px; border-radius: 12px; }
  .cover-plate h2 {
    margin: 0 0 6px; font-size: 22px; letter-spacing: 3px;
    color: var(--gold); text-transform: uppercase; outline: none;
    min-width: 40px;
  }
  .cover-plate p { margin: 0; font-size: 12px; opacity: .8; letter-spacing: 1px; outline: none; min-width: 40px; }
  /* editierbare Felder: dezenter Hinweis beim Hovern/Fokus */
  .editable:hover { background: rgba(139,124,246,.12); border-radius: 4px; }
  .editable:focus { background: rgba(139,124,246,.18); border-radius: 4px; }
  .cover-hint { margin-top: 16px; font-size: 10px; opacity: .45; letter-spacing: .5px; }
  .cover-plate .line { width: 60%; height: 1px; background: rgba(139,124,246,.4); margin: 14px auto; }

  /* ---------- 3x3 Grid ---------- */
  .grid {
    position: relative; z-index: 2;          /* über page-bg-layer (0) und Rahmen (1) */
    display: grid;
    grid-template-columns: repeat(var(--cols, 3), var(--card-w));
    grid-template-rows: repeat(var(--rows, 3), var(--card-h));
    gap: var(--grid-gap);
    justify-content: center;
  }
  .page-label {
    position: absolute; bottom: 6px; z-index: 1;
    font-size: 11px; color: #fff; opacity: .7; letter-spacing: .5px;
    text-shadow: 0 1px 3px rgba(0,0,0,.6);
  }
  .side.left  .page-label { left: 14px; }
  .side.right .page-label { right: 14px; }

  /* Einzelnes Kartenfeld */
  .slot {
    width: var(--card-w); height: var(--card-h);
    border-radius: 8px;
    background: var(--slot-empty);
    border: 1.5px dashed var(--slot-border);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden;
    transition: border-color .15s, transform .12s, box-shadow .15s;
  }
  .slot:hover { border-color: var(--gold); }
  .slot .plus { font-size: 26px; color: rgba(255,255,255,.55); font-weight: 300; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
  .slot.filled { border-style: solid; border-color: rgba(0,0,0,.25); cursor: grab; background: #14151b; }
  .slot.filled:active { cursor: grabbing; }
  .slot img {
    width: 100%; height: 100%; display: block;
    object-fit: cover;            /* Standard; per Umschalter -> contain */
    pointer-events: none;
  }
  body.fit-contain .slot img { object-fit: contain; }

  /* Drag-Zustände */
  .slot.dragover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(244,63,94,.35); transform: scale(1.02); }
  .slot.dragging { opacity: .35; }

  /* Lösch-Button (X) erscheint beim Hovern auf belegter Karte */
  .slot .del {
    position: absolute; top: 5px; right: 5px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,.62); color: #fff; border: 0;
    font-size: 14px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    pointer-events: auto; z-index: 4;
  }
  .slot.filled:hover .del { display: flex; }
  .slot .del:hover { background: var(--accent); }

  /* Duplizieren-Knopf (erscheint beim Hovern, neben dem X) */
  .slot .dup {
    position: absolute; top: 5px; right: 31px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,.62); color: #fff; border: 0;
    font-size: 13px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    pointer-events: auto; z-index: 4;
  }
  .slot.filled:hover .dup { display: flex; }
  .slot .dup:hover { background: var(--gold); color: #14121f; }

  /* Preis-Knopf (unten links, beim Hovern) */
  .slot .price-btn {
    position: absolute; bottom: 5px; left: 5px;
    min-width: 22px; height: 22px; padding: 0 6px; border-radius: 11px;
    background: rgba(0,0,0,.62); color: #fff; border: 0;
    font-size: 13px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    pointer-events: auto; z-index: 4;
  }
  .slot.filled:hover .price-btn { display: flex; }
  .slot .price-btn:hover { background: var(--gold); color: #14121f; }
  /* Preis-Badge (immer sichtbar, wenn Preis gesetzt) unten mittig */
  .slot .price-badge {
    position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.72); color: #6ee7b7; border: 1px solid rgba(139,124,246,.5);
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    z-index: 3; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  /* Seitensumme unten am Blatt */
  .page-sum {
    position: absolute; bottom: 6px; right: 12px; z-index: 3;
    background: rgba(16,17,24,.82); color: #6ee7b7;
    border: 1px solid rgba(139,124,246,.5);
    font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 10px;
    box-shadow: 0 1px 5px rgba(0,0,0,.4); letter-spacing: .3px;
  }

  /* ---------- Markier-Modus: farbige Ränder + Umschalt-Knopf ---------- */
  /* Nur sichtbar, wenn der Modus aktiv ist. Sonst KEINE Spuren am Design. */
  .slot.mark.mark-owned   { box-shadow: 0 0 0 3px #36b34a, 0 0 12px rgba(54,179,74,.5); border-color: #36b34a; }
  .slot.mark.mark-missing { box-shadow: 0 0 0 3px #e23b3b, 0 0 12px rgba(226,59,59,.5); border-color: #e23b3b; }
  .mark-toggle {
    position: absolute; top: 5px; left: 5px; z-index: 5;
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid #fff; cursor: pointer;
    font-size: 13px; line-height: 1; color: #fff; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  .mark-toggle.is-owned   { background: #36b34a; }
  .mark-toggle.is-missing { background: #e23b3b; }
  .mark-toggle:hover { transform: scale(1.1); }

  /* Seiten-Werkzeuge oben (Bild setzen / entfernen / als Bild exportieren) */
  .page-tools {
    position: absolute; top: 8px; z-index: 3;
    display: flex; gap: 6px; opacity: 0; transition: opacity .15s;
  }
  .side.left  .page-tools { left: 10px; }
  .side.right .page-tools { right: 10px; }
  .side:hover .page-tools { opacity: 1; }
  .page-tools button {
    font-size: 11px; background: rgba(0,0,0,.6); color: #fff; border: 0;
    padding: 5px 9px; border-radius: 7px; cursor: pointer;
  }
  .page-tools button:hover { background: var(--accent); }

  /* ---------- Ablage-Bank unter dem Ordner ---------- */
  .bench {
    flex: none;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    background: linear-gradient(180deg, rgba(32,34,47,.72), rgba(17,18,26,.72));
    border: 1px solid rgba(139,124,246,.22);
    border-radius: 16px;
    padding: 14px 20px 16px;
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 28px rgba(0,0,0,.35);
    max-width: min(90vw, 900px);
  }
  .bench-head { display: flex; align-items: center; gap: 10px; width: 100%; }
  .bench-title { font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; opacity: .65; font-weight: 700; }
  .bench-count {
    font-size: 11px; font-weight: 700; color: var(--gold);
    background: rgba(139,124,246,.14); border: 1px solid rgba(139,124,246,.32);
    border-radius: 20px; padding: 2px 9px; line-height: 1.4;
  }
  .bench-clear {
    margin-left: auto; appearance: none; cursor: pointer; transition: .15s;
    border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05);
    color: #e7e8f2; font-size: 11px; padding: 6px 11px; border-radius: 8px;
  }
  .bench-clear:hover:not(:disabled) { background: var(--accent); border-color: transparent; }
  .bench-clear:disabled { opacity: .3; cursor: not-allowed; }
  .bench-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  /* Bank-Plätze: gleiche Proportion wie Karten, etwas kleiner, mit modernem Hover-Lift */
  .bench .slot {
    width: 80px; height: 112px;   /* 80 * 8.8/6.3 ≈ 112 */
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,.3);
    transition: transform .15s, box-shadow .15s, border-color .15s;
  }
  .bench .slot:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(0,0,0,.4); }
  .bench .slot .plus { font-size: 22px; }

  /* ---------- Vorschau-Leiste aller Seiten (rechts) ---------- */
  .preview-rail {
    position: fixed; top: 56px; right: 0; bottom: 52px; width: 132px;
    background: rgba(16,17,24,.78); backdrop-filter: blur(10px);
    border-left: 1px solid rgba(255,255,255,.08);
    z-index: 46; display: flex; flex-direction: column;
  }
  .preview-rail-title {
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    opacity: .6; text-align: center; padding: 8px 0 6px;
  }
  .preview-list { flex: 1; overflow-y: auto; padding: 4px 10px 12px; }
  /* ein Doppelseiten-Vorschaupaar */
  .pv-spread {
    display: flex; gap: 3px; margin-bottom: 8px; cursor: pointer;
    border: 2px solid transparent; border-radius: 6px; padding: 3px;
    background: rgba(255,255,255,.04); transition: border-color .15s, background .15s;
  }
  .pv-spread:hover { background: rgba(255,255,255,.1); }
  .pv-spread.active { border-color: var(--gold); }
  .pv-spread.dragging { opacity: .4; }
  .pv-spread.dragover { border-color: var(--accent); }
  .pv-page {
    flex: 1; aspect-ratio: 1 / 1; border-radius: 3px;
    background-size: cover; background-position: center;
    display: grid; grid-template-columns: repeat(var(--cols,3),1fr); grid-template-rows: repeat(var(--rows,3),1fr);
    gap: 1px; padding: 3px; overflow: hidden;
  }
  .pv-page.cover { background: radial-gradient(120% 130% at 30% 20%, #262a38, #14121f); }
  .pv-cell { background: rgba(255,255,255,.12); border-radius: 1px; background-size: cover; background-position: center; }
  .pv-del {
    position: absolute; top: 2px; right: 2px; z-index: 5;
    width: 18px; height: 18px; border-radius: 50%; border: 0;
    background: rgba(0,0,0,.6); color: #fff; font-size: 11px; line-height: 1;
    cursor: pointer; display: none; align-items: center; justify-content: center;
  }
  .pv-page:hover .pv-del { display: flex; }
  .pv-del:hover { background: var(--accent); }
  .pv-label { font-size: 9px; opacity: .55; text-align: center; margin-top: -4px; margin-bottom: 6px; }

  /* ---------- Ordner-Frame + seitliche Blätter-Pfeile ---------- */
  .stage-inner { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .binder-frame { position: relative; display: inline-flex; }

  .side-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(16,17,24,.78); color: #e7e8f2;
    border: 1px solid rgba(139,124,246,.45);
    font-size: 24px; cursor: pointer; z-index: 45;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    transition: background .15s, transform .15s, opacity .15s;
    box-shadow: 0 6px 18px rgba(0,0,0,.4);
  }
  .side-nav:hover:not(:disabled) { background: var(--accent); transform: translateY(-50%) scale(1.08); }
  .side-nav:disabled { opacity: .25; cursor: not-allowed; }
  /* direkt am Ordnerrand (knapp außerhalb des Leder-Korpus) */
  .side-nav.prev { left: -26px; }
  .side-nav.next { right: -26px; }

  /* ---------- Pagination unten (fix) ---------- */
  .pager {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 12px; background: var(--toolbar-bg);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,.06); z-index: 50;
  }
  .pager .pos { font-size: 13px; opacity: .8; min-width: 150px; text-align: center; cursor: pointer; border-radius: 6px; padding: 4px 8px; }
  .pager .pos:hover { background: rgba(255,255,255,.1); opacity: 1; }
  .jump-input {
    width: 90px; padding: 7px 9px; border-radius: 8px;
    border: 1px solid var(--gold); background: rgba(255,255,255,.1);
    color: #e7e8f2; font-size: 13px; text-align: center;
  }
  .jump-input:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  .btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ---------- Umblätter-Animation ---------- */
  .flip {
    position: absolute; top: 0; height: 100%;
    width: calc(var(--card-w)*3 + var(--grid-gap)*2 + var(--page-pad)*2);
    background: linear-gradient(160deg, var(--page-bg), var(--page-bg-2));
    z-index: 20; pointer-events: none; backface-visibility: hidden;
  }
  .flip.next { right: 0; transform-origin: left center; border-radius: 0 14px 14px 0;
    animation: flipNext .55s ease-in forwards; box-shadow: -10px 0 30px rgba(0,0,0,.3); }
  .flip.prev { left: 0; transform-origin: right center; border-radius: 14px 0 0 14px;
    animation: flipPrev .55s ease-in forwards; box-shadow: 10px 0 30px rgba(0,0,0,.3); }
  @keyframes flipNext { from { transform: rotateY(0); } to { transform: rotateY(-180deg); } }
  @keyframes flipPrev { from { transform: rotateY(0); } to { transform: rotateY(180deg); } }

  /* ---------- Lightbox / Vorschau ---------- */
  .modal {
    position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.82);
    display: none; align-items: center; justify-content: center; padding: 30px;
  }
  .modal.open { display: flex; }
  .modal img { max-width: min(90vw, 520px); max-height: 88vh; border-radius: 14px; box-shadow: 0 30px 70px rgba(0,0,0,.6); }
  .modal .close {
    position: absolute; top: 18px; right: 22px; width: 40px; height: 40px;
    border-radius: 50%; background: rgba(255,255,255,.12); color: #fff; border: 0;
    font-size: 20px; cursor: pointer;
  }
  .modal .close:hover { background: rgba(255,255,255,.25); }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 70px; transform: translateX(-50%) translateY(20px);
    background: rgba(16,17,24,.95); color: #fff; padding: 10px 16px; border-radius: 10px;
    font-size: 13px; opacity: 0; pointer-events: none; transition: .25s; z-index: 200;
    border: 1px solid rgba(139,124,246,.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) { .flip { animation: none !important; display: none !important; } }
  .hidden { display: none; }
  /* ===================== WATCHLIST ===================== */
  .watchlist {
    position: fixed; inset: 0; z-index: 280;
    background: radial-gradient(120% 120% at 50% 0%, #171825 0%, #0e0f16 70%, #08090d 100%);
    display: none; flex-direction: column; padding: 20px 24px;
  }
  .watchlist.open { display: flex; }
  .wl-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .wl-title { font-size: 20px; font-weight: 800; }
  .wl-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .wl-total { font-size: 15px; color: #6ee7b7; font-weight: 700; margin-bottom: 14px; }
  .wl-tablewrap { flex: 1; overflow: auto; border: 1px solid rgba(255,255,255,.08); border-radius: 12px; }
  .wl-empty { padding: 40px; text-align: center; opacity: .5; font-style: italic; display: none; }
  .wl-table { border-collapse: collapse; width: 100%; font-size: 13px; }
  .wl-table th, .wl-table td { border: 1px solid rgba(255,255,255,.08); padding: 8px 10px; text-align: left; white-space: nowrap; }
  .wl-table th { background: rgba(0,0,0,.35); position: sticky; top: 0; font-size: 12px; letter-spacing: .3px; z-index: 1; }
  /* sortierbare Kopfzelle */
  .wl-th-sort { cursor: pointer; user-select: none; position: relative; }
  .wl-th-sort:hover { background: rgba(255,255,255,.08); }
  .wl-th-sort .wl-arrow { opacity: .8; margin-left: 4px; font-size: 10px; }
  /* Resize-Griff am rechten Rand einer Kopfzelle */
  .wl-th-wrap { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .wl-resizer {
    position: absolute; top: 0; right: -3px; width: 8px; height: 100%;
    cursor: col-resize; z-index: 2;
  }
  .wl-search {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14);
    color: #e7e8f2; border-radius: 8px; padding: 7px 10px; font-size: 13px; width: 180px;
  }
  .wl-search:focus { outline: 2px solid var(--gold); }
  /* Einzel- und Gesamtpreis untereinander in einer Zelle */
  .wl-total-line { font-size: 11px; opacity: .65; margin-top: 3px; }
  .wl-total-line b { color: #6ee7b7; font-weight: 700; }
  .wl-table tbody tr:hover { background: rgba(255,255,255,.04); }
  .wl-img { width: 40px; height: 56px; object-fit: cover; border-radius: 4px; display: block; cursor: pointer; transition: outline-color .15s; outline: 2px solid transparent; outline-offset: 1px; }
  .wl-img:hover { outline-color: var(--gold); }
  .wl-name-input, .wl-price-input {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14);
    color: #e7e8f2; border-radius: 6px; padding: 6px 8px; font-size: 13px;
  }
  .wl-name-input { width: 150px; }
  .wl-price-input { width: 82px; text-align: right; }
  .wl-lang-select {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14);
    color: #e7e8f2; border-radius: 6px; padding: 6px 8px; font-size: 13px;
  }
  .wl-lang-select option { background: #171825; }
  .wl-diff-pos { color: #4ade80; font-weight: 700; }
  .wl-diff-neg { color: #f87171; font-weight: 700; }
  .wl-diff-zero { opacity: .6; }
  .wl-check-date {
    background: transparent; border: 0; color: #6ee7b7; font-size: 11px; width: 96px; text-align: center;
  }
  .wl-colsum { font-weight: 700; color: #6ee7b7; }
  .wl-del-check { background: transparent; border: 0; color: #f87171; cursor: pointer; font-size: 11px; margin-left: 4px; }

  /* ===================== STARTSCREEN ===================== */
  .startscreen {
    position: fixed; inset: 0; z-index: 300;
    background:
      radial-gradient(120% 120% at 50% 0%, #1b1d29 0%, #101119 60%, #08090d 100%);
    display: flex; align-items: center; justify-content: center; padding: 30px;
    overflow-y: auto;
  }
  .startscreen.hidden { display: none; }
  .start-card {
    width: 100%; max-width: 680px;
    background: rgba(22,20,32,.7); border: 1px solid rgba(139,124,246,.3);
    border-radius: 18px; padding: 28px 30px;
    box-shadow: 0 30px 70px rgba(0,0,0,.6); margin: auto;
  }
  .start-brand { display: flex; align-items: center; gap: 12px; font-size: 26px; font-weight: 800; letter-spacing: .5px; }
  .start-brand .emblem { width: 34px; height: 34px; border-radius: 9px; font-size: 13px; }
  .start-sub { opacity: .65; margin: 8px 0 22px; font-size: 14px; }
  .start-section { margin-bottom: 22px; }
  .start-h { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: .6; margin-bottom: 12px; }

  .format-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 10px; }
  .format-opt {
    border: 2px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04);
    border-radius: 12px; padding: 12px; cursor: pointer; text-align: center;
    transition: border-color .15s, background .15s;
  }
  .format-opt:hover { background: rgba(255,255,255,.09); }
  .format-opt.active { border-color: var(--gold); background: rgba(139,124,246,.12); }
  .format-mini { display: grid; gap: 2px; width: 46px; margin: 0 auto 8px; }
  .format-mini span { background: rgba(255,255,255,.35); border-radius: 1px; aspect-ratio: 6.3/8.8; }
  .format-opt.active .format-mini span { background: var(--gold); }
  .format-label { font-size: 13px; font-weight: 700; }
  .format-cap { font-size: 10px; opacity: .55; margin-top: 2px; }

  .start-namerow { display: flex; gap: 10px; margin-top: 14px; }
  .start-input {
    flex: 1; padding: 10px 12px; border-radius: 9px;
    border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.06); color: #e7e8f2; font-size: 14px;
  }
  .start-input:focus { outline: 2px solid var(--gold); }

  .collection-list { display: flex; flex-direction: column; gap: 8px; }
  .collection-empty { opacity: .5; font-size: 13px; font-style: italic; }
  .collection-item {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: background .15s;
  }
  .collection-item:hover { background: rgba(255,255,255,.1); }
  .collection-item .ci-name { flex: 1; font-weight: 600; font-size: 14px; }
  .collection-item .ci-meta { font-size: 11px; opacity: .55; }
  .collection-item .ci-del {
    width: 28px; height: 28px; border-radius: 50%; border: 0;
    background: rgba(0,0,0,.4); color: #fff; cursor: pointer; font-size: 14px;
  }
  .collection-item .ci-del:hover { background: var(--accent); }

  /* Home-Button in der Toolbar */
  .home-btn { font-size: 16px; }

  /* ---------- Sammlungs-Statistik in der Toolbar ---------- */
  .stat-badge {
    font-size: 12px; font-weight: 700; padding: 6px 10px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05);
    white-space: nowrap;
  }
  .stat-owned   { color: #4ade80; border-color: rgba(74,222,128,.35); background: rgba(74,222,128,.1); }
  .stat-missing { color: #f87171; border-color: rgba(248,113,113,.35); background: rgba(248,113,113,.1); }
  .stat-value   { color: var(--gold); border-color: rgba(139,124,246,.35); background: rgba(139,124,246,.1); }

  /* ---------- Karten-Suche (Crosslink zur Watchlist) ---------- */
  .card-search-wrap { position: relative; }
  .card-search {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14);
    color: #e7e8f2; border-radius: 8px; padding: 7px 10px; font-size: 13px; width: 180px;
  }
  .card-search:focus { outline: 2px solid var(--gold); }
  .card-search-results {
    position: absolute; top: calc(100% + 6px); left: 0; width: 270px;
    background: rgba(22,20,32,.98); border: 1px solid rgba(139,124,246,.35);
    border-radius: 10px; padding: 6px; z-index: 60; display: none;
    box-shadow: 0 12px 30px rgba(0,0,0,.5); max-height: 340px; overflow-y: auto;
  }
  .card-search-results.open { display: block; }
  .csr-item { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 7px; cursor: pointer; }
  .csr-item:hover { background: rgba(255,255,255,.08); }
  .csr-item img { width: 30px; height: 42px; object-fit: cover; border-radius: 4px; flex: none; }
  .csr-item .csr-name { flex: 1; font-size: 13px; font-weight: 600; }
  .csr-item .csr-page { font-size: 11px; opacity: .55; white-space: nowrap; }
  .csr-empty { padding: 10px; font-size: 12px; opacity: .5; text-align: center; }

  /* Kurzes Aufleuchten der Zielkarte nach einem Sprung (Suche / Watchlist-Link) */
  @keyframes slotHighlightPulse {
    0%, 100% { box-shadow: 0 0 0 3px var(--gold), 0 0 22px rgba(139,124,246,.7); }
    50% { box-shadow: 0 0 0 3px var(--gold), 0 0 6px rgba(139,124,246,.25); }
  }
  .slot.search-highlight { animation: slotHighlightPulse 0.9s ease-in-out 3; }
</style>
</head>
<body>

  <!-- ===================== TOOLBAR ===================== -->
  <div class="toolbar">
    <div class="brand">
      <button class="btn icon-only home-btn" id="homeBtn" title="Startseite / neue Collection">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/></svg>
      </button>
      <span class="emblem">TCG</span>
      TCG&nbsp;Binder
    </div>

    <!-- Ansicht-/Umschalter (links gruppiert) -->
    <div class="toolbar-group">
      <div class="seg" title="Sprache / Language">
        <button id="langDE">DE</button>
        <button id="langEN">EN</button>
      </div>
      <div class="seg icon-seg" title="Wie Bilder ins Kartenfeld eingepasst werden">
        <button id="fitCover" class="active" title="Füllen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M21 16v3a2 2 0 0 1-2 2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
        <button id="fitContain" title="Ganz zeigen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        </button>
      </div>
      <div class="seg" title="Währung für Preise">

      <button class="icon-switch" id="markToggle" role="switch" aria-checked="false" title="Karten farbig markieren (grün = habe ich, rot = fehlt)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>
        <span class="switch-track"><span class="switch-thumb"></span></span>
      </button>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.5 15a2.5 2.5 0 0 0 2.5 2h.5a2.5 2.5 0 0 0 0-5h-1a2.5 2.5 0 0 1 0-5h.5a2.5 2.5 0 0 1 2.5 2"/><path d="M12 6v2m0 8v2"/></svg>
        <span class="switch-track"><span class="switch-thumb"></span></span>
      </button>
    </div>

    <div class="toolbar-group" id="statsGroup">
      <span class="stat-badge stat-owned" id="statOwned" title="Besessene Karten">✓ 0</span>
      <span class="stat-badge stat-missing" id="statMissing" title="Fehlende Karten">✕ 0</span>
      <span class="stat-badge stat-value" id="statValue" title="Gesamtwert">Σ 0,00 €</span>
    </div>

    <div class="card-search-wrap" id="cardSearchWrap">
      <input type="text" id="cardSearchInput" class="card-search" placeholder="Karte suchen…" autocomplete="off">
      <div class="card-search-results" id="cardSearchResults"></div>
    </div>

    <div class="spacer"></div>

    <!-- Aktionen (rechts) -->
    <div class="toolbar-group">
      <button class="btn icon-only" id="undoBtn" title="Rückgängig (Strg+Z)" disabled>↶</button>
      <button class="btn icon-only" id="watchBtn" title="Watchlist / Preisbeobachtung">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m23 6-9.5 9.5-5-5L1 18"/><path d="M17 6h6v6"/></svg>
      </button>
      <div class="menu-wrap">
        <button class="btn icon-only" id="moreBtn" title="Weitere Optionen">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>
        </button>
        <div class="menu" id="moreMenu">
          <button class="menu-item" id="appBgBtn">🌄 Hintergrund ändern</button>
          <button class="menu-item" id="appBgResetBtn">↺ Hintergrund zurücksetzen</button>

      <button class="btn primary with-icon" id="exportBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        <span id="exportBtnLabel">Exportieren</span>
      </button>

  </div>

  <input type="file" id="exportLogoFile" class="hidden" accept="image/*">

  <!-- ===================== BÜHNE ===================== -->
  <div class="stage">
    <div class="stage-inner" id="stageInner">
      <!-- Ordner mit direkt anliegenden Blätterpfeilen -->
      <div class="binder-frame" id="binderFrame">
        <button class="side-nav prev" id="sideNavPrev" title="Zurück blättern" aria-label="Zurück">‹</button>
        <div class="binder" id="binder"><!-- per JS --></div>
        <button class="side-nav next" id="sideNavNext" title="Vor blättern" aria-label="Vor">›</button>
      </div>

      <!-- Ablage-Bank -->
      <div class="bench" id="bench">
        <div class="bench-head">
          <div class="bench-title">Ablage</div>
          <div class="bench-count" id="benchCount"></div>
          <button class="bench-clear" id="benchClearBtn" title="Ablage leeren">Leeren</button>
        </div>
        <div class="bench-row" id="benchRow"><!-- per JS --></div>
      </div>
    </div>
  </div>

  <!-- Vorschau-Leiste aller Seiten (rechts, volle Höhe) -->
  <div class="preview-rail" id="previewRail">
    <div class="preview-rail-title">Seiten</div>
    <div class="preview-list" id="previewList"><!-- per JS --></div>
  </div>

  <!-- ===================== PAGINATION ===================== -->
  <div class="pager">

  return typeof v === "function" ? v(...args) : v;
}
function detectLang() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem("pokemon-binder-v2") || "{}").lang; } catch(e){ return null; } })();
  if (saved === "de" || saved === "en") return saved;
  const nav = (navigator.language || "en").toLowerCase();
  return nav.startsWith("de") ? "de" : "en";

/* ============================================================================

const BENCH_SIZE = 12;
const STORAGE_KEY = "pokemon-binder-v2";

  slots: [],
  bench: new Array(BENCH_SIZE).fill(null),
  pageBg: {},
  pages: 6,
  spread: 0,

  // Preis pro Ordner-Feld: { "<index>": 12.5 }. Nur gesetzte Preise werden gespeichert.

/* ============================================================================
   COLLECTION-VERWALTUNG (mehrere Ordner)
   ----------------------------------------------------------------------------
   - INDEX_KEY: Liste aller Collections [{id, name, format, updatedAt}]
   - COL_PREFIX + id: der vollständige Zustand einer Collection
   - LAST_KEY: id der zuletzt geöffneten Collection
   - LANG_KEY: zuletzt gewählte Sprache (global, collection-übergreifend)
   ========================================================================== */
const INDEX_KEY = "tcg-binder-collections";
const COL_PREFIX = "tcg-binder-col:";
const LAST_KEY = "tcg-binder-last";
const LANG_KEY = "tcg-binder-lang";
const LAST_EXPORT_KEY = "tcg-binder-last-export";
const BACKUP_REMINDER_DAYS = 7;

let currentId = null;   // id der aktuell geöffneten Collection (null = keine)

function loadIndex() {
  try { return JSON.parse(localStorage.getItem(INDEX_KEY) || "[]"); }
  catch (e) { return []; }
}
function saveIndex(list) { localStorage.setItem(INDEX_KEY, JSON.stringify(list)); }

function newId() { return "c" + Date.now() + Math.floor(Math.random() * 1000); }

/* Standardzustand für eine neue Collection mit gegebenem Format */
function freshState(cols, rows, name) {
  const per = cols * rows;
  return {
    slots: new Array(per * 6).fill(null),
    bench: new Array(BENCH_SIZE).fill(null),
    pageBg: {}, pages: 6, spread: 0, fit: "cover",
    coverTitle: "My Collection", coverSub: t("coverSubtitle"),
    owned: {}, appBg: null, prices: {}, currency: "EUR",
    showPricesInExport: false, exportLogo: null, exportName: "",
    lang: lang, cols: cols, rows: rows, name: name || "Collection", watch: {},
  };
}

/* Aktuelle Collection speichern (Zustand + Index aktualisieren) */
function save() {
  if (!currentId) return;
  try {
    state.lang = lang;
    localStorage.setItem(COL_PREFIX + currentId, JSON.stringify(state));
    localStorage.setItem(LAST_KEY, currentId);
    localStorage.setItem(LANG_KEY, lang);
    // Index aktualisieren
    const list = loadIndex();
    const entry = { id: currentId, name: state.name || "Collection",
                    format: (state.cols || 3) + "×" + (state.rows || 3),
                    updatedAt: Date.now() };
    const i = list.findIndex(c => c.id === currentId);
    if (i >= 0) list[i] = entry; else list.push(entry);
    saveIndex(list);
  } catch (e) { toast(t("storageFull")); console.warn(e); }
}

/* ============================================================================
   UNDO-SYSTEM
   ----------------------------------------------------------------------------
   Vor jeder verändernden Aktion (Löschen, Verschieben, Tauschen, Seite löschen)
   wird ein Snapshot der relevanten Zustandsteile abgelegt. Undo stellt den
   letzten Snapshot wieder her. Stack ist auf 30 Schritte begrenzt.
   ========================================================================== */
const UNDO_LIMIT = 30;
let undoStack = [];

function snapshot() {
  return JSON.stringify({
    slots: state.slots, bench: state.bench, pageBg: state.pageBg,
    prices: state.prices, owned: state.owned, pages: state.pages,
    spread: state.spread, cols: state.cols, rows: state.rows,
    watch: state.watch,
  });
}
function pushUndo() {
  undoStack.push(snapshot());
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  updateUndoBtn();
}
function doUndo() {
  if (!undoStack.length) return;
  const snap = JSON.parse(undoStack.pop());
  Object.assign(state, snap);
  normalize(); save(); render();
  toast(t("undone"));
  updateUndoBtn();
}
function updateUndoBtn() {
  const btn = document.getElementById("undoBtn");
  if (btn) btn.disabled = undoStack.length === 0;
}

/* ============================================================================
   WATCHLIST / PREISBEOBACHTUNG
   ----------------------------------------------------------------------------
   Enthält alle BESESSENEN Karten (grün / nicht "missing"). Verknüpfung mit dem
   Ordner über einen kurzen Hash des Bild-Strings (stabil gegen Verschieben).
   Eintrag: state.watch[key] = { name, lang, buyPrice, checks:[{date, price}] }
   Der jeweils NEUESTE Check-Preis wird automatisch als Ordnerpreis übernommen.
   ========================================================================== */
// Alter (grob gestreuter) Hash — nur noch für die einmalige Migration alter
// gespeicherter Watchlist-Einträge auf den neuen, kollisionssicheren imgKey().
function imgKeyLegacy(dataUrl) {
  let h = 5381;
  for (let i = 0; i < dataUrl.length; i += 7) h = ((h << 5) + h + dataUrl.charCodeAt(i)) >>> 0;
  return "k" + h.toString(36) + "_" + dataUrl.length;
}
function imgKey(dataUrl) {
  // Zwei unabhängige Hashes über den GESAMTEN String (nicht nur Stichproben),
  // damit unterschiedliche Bilder garantiert nicht fälschlich zusammengelegt werden.
  let h1 = 0x811c9dc5, h2 = 5381;
  for (let i = 0; i < dataUrl.length; i++) {
    const c = dataUrl.charCodeAt(i);
    h1 = Math.imul(h1 ^ c, 0x01000193) >>> 0;   // FNV-1a
    h2 = ((h2 << 5) + h2 + c) >>> 0;             // djb2
  }
  return "k" + h1.toString(36) + "_" + h2.toString(36) + "_" + dataUrl.length;
}
function ownedCards() {
  const map = new Map();   // key -> {key, img, slot (erster), count}
  const total = state.pages * SLOTS_PER_PAGE;
  for (let i = 0; i < total; i++) {
    const img = state.slots[i];
    if (!img) continue;
    if (state.owned[i] === "missing") continue;
    const key = imgKey(img);
    if (map.has(key)) { map.get(key).count++; }
    else map.set(key, { key, img, slot: i, count: 1 });
  }
  return [...map.values()];
}
function syncWatch() {
  ownedCards().forEach(c => {
    if (!state.watch[c.key]) state.watch[c.key] = { name: "", lang: "en", buyPrice: null, checks: [] };
  });
}
function latestCheckPrice(w) {
  if (!w || !Array.isArray(w.checks) || !w.checks.length) return null;
  for (let i = w.checks.length - 1; i >= 0; i--) {
    const p = w.checks[i].price;
    if (p != null && !isNaN(p)) return Number(p);
  }
  return null;
}
function applyWatchPricesToBinder() {
  const total = state.pages * SLOTS_PER_PAGE;
  for (let i = 0; i < total; i++) {
    const img = state.slots[i];
    if (!img) continue;
    const w = state.watch[imgKey(img)];
    if (!w) continue;
    const latest = latestCheckPrice(w);
    if (latest != null) state.prices[i] = latest;
  }
}

/* Eine Collection per id öffnen */
function openCollection(id) {
  try {
    const raw = localStorage.getItem(COL_PREFIX + id);
    if (!raw) { toast(t("importFail")); return false; }
    state = JSON.parse(raw);
    currentId = id;
    undoStack = [];
    normalize();
    if (state.lang === "de" || state.lang === "en") setLang(state.lang, false);
    hideStartScreen();
    applyAppBg(); applyCurrency(); applyExportPricesBtn(); applyMarkSeg();
    render();
    maybeShowBackupReminder();
    return true;
  } catch (e) { toast(t("importFail")); console.warn(e); return false; }
}

/* Sanfte Erinnerung, falls die Sammlung Karten enthält, aber lange kein JSON-Backup mehr erstellt wurde. */
function maybeShowBackupReminder() {
  if (!state.slots.some(Boolean)) return;
  const last = Number(localStorage.getItem(LAST_EXPORT_KEY) || 0);
  const days = (Date.now() - last) / (1000 * 60 * 60 * 24);
  if (!last || days >= BACKUP_REMINDER_DAYS) {
    setTimeout(() => toast(t("backupReminder")), 900);
  }
}

/* Neue Collection anlegen und öffnen */
function createCollection(cols, rows, name) {
  currentId = newId();
  state = freshState(cols, rows, name);
  undoStack = [];
  normalize();
  save();
  hideStartScreen();
  applyAppBg(); applyCurrency(); applyExportPricesBtn(); applyMarkSeg();
  render();
}

/* Eine Collection löschen */
function deleteCollection(id) {
  localStorage.removeItem(COL_PREFIX + id);
  const list = loadIndex().filter(c => c.id !== id);
  saveIndex(list);
  if (currentId === id) currentId = null;
}

function normalize() {
  if (!state.cols) state.cols = 3;
  if (!state.rows) state.rows = 3;
  SLOTS_PER_PAGE = state.cols * state.rows;   // global aktualisieren
  const per = SLOTS_PER_PAGE;
  const need = state.pages * per;
  while (state.slots.length < need) state.slots.push(null);
  state.slots.length = need;
  if (!Array.isArray(state.bench)) state.bench = [];
  while (state.bench.length < BENCH_SIZE) state.bench.push(null);
  state.bench.length = BENCH_SIZE;
  if (!state.pageBg || typeof state.pageBg !== "object") state.pageBg = {};
  if (!state.owned || typeof state.owned !== "object") state.owned = {};
  if (!state.watch || typeof state.watch !== "object") state.watch = {};
  if (!state.prices || typeof state.prices !== "object") state.prices = {};
  if (state.currency !== "USD" && state.currency !== "EUR") state.currency = "EUR";
  migrateWatchKeys();
}

/* Einmalige Migration: alte, grob-gehashte Watchlist-Keys (vor der Kollisionsfix)
   auf den neuen imgKey() umschlüsseln, damit Namen/Preise nicht verloren gehen. */
function migrateWatchKeys() {
  const allImgs = [...state.slots, ...state.bench].filter(Boolean);
  const seen = new Set();
  for (const img of allImgs) {
    const legacy = imgKeyLegacy(img);
    if (seen.has(legacy)) continue;
    seen.add(legacy);
    if (state.watch[legacy] && !state.watch[imgKey(img)]) {
      state.watch[imgKey(img)] = state.watch[legacy];
      delete state.watch[legacy];
    }
  }
}

/* ---- Karten-Zugriff über LOCATION-ID ---- */
function getCard(loc) {
  const [kind, n] = loc.split(":"); const i = +n;
  return kind === "bench" ? state.bench[i] : state.slots[i];
}
function setCard(loc, val) {
  const [kind, n] = loc.split(":"); const i = +n;
  if (kind === "bench") state.bench[i] = val; else state.slots[i] = val;
}

/* ---- Preis-Helfer ---- */
function currencySymbol() { return state.currency === "USD" ? "$" : "€"; }
function formatPrice(v) {
  if (v == null || isNaN(v)) return "";
  const s = Number(v).toLocaleString(state.currency === "USD" ? "en-US" : "de-DE",
    { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return state.currency === "USD" ? "$" + s : s + " €";
}
/* Summe aller Kartenpreise einer Karten-Seite */
function pageSum(pageIndex) {
  const base = pageIndex * SLOTS_PER_PAGE;
  let sum = 0, any = false;
  for (let i = 0; i < SLOTS_PER_PAGE; i++) {
    const p = state.prices[base + i];
    if (p != null && !isNaN(p)) { sum += Number(p); any = true; }
  }
  return any ? sum : null;
}

/* Preis einer Ordner-Karte eintragen/ändern (leer lässt den Preis löschen) */
function editPrice(slotIndex) {
  const cur = state.prices[slotIndex];
  const input = prompt(
    t("pricemsg", state.currency === "USD" ? "USD ($)" : "EUR (€)"),
    cur != null ? String(cur) : ""
  );
  if (input === null) return;                    // abgebrochen
  const trimmed = input.trim().replace(",", "."); // Komma als Dezimaltrennzeichen erlauben
  if (trimmed === "") { delete state.prices[slotIndex]; }
  else {
    const v = parseFloat(trimmed);
    if (isNaN(v) || v < 0) { toast(t("invalidPrice")); return; }
    state.prices[slotIndex] = Math.round(v * 100) / 100;
  }
  save(); render();
}

/* Karte duplizieren: kopiert das Bild in den nächsten freien Platz.
   Suchreihenfolge: Ordner-Felder ab der Quelle -> übrige Ordner-Felder ->
   Bank. Ist alles voll, werden zwei neue Seiten angehängt. */
function duplicateCard(loc) {
  const img = getCard(loc);
  if (!img) return;
  pushUndo();

  const total = state.pages * SLOTS_PER_PAGE;
  const startIdx = loc.startsWith("slot:") ? (+loc.split(":")[1] + 1) : 0;

  // 1) freier Ordner-Slot ab Quelle, dann umlaufend vom Anfang
  for (let k = 0; k < total; k++) {
    const idx = (startIdx + k) % total;
    if (!state.slots[idx]) { state.slots[idx] = img; save(); render(); toast(t("dupToast", Math.floor(idx / SLOTS_PER_PAGE) + 1)); return; }
  }
  // 2) freier Bank-Platz
  for (let i = 0; i < BENCH_SIZE; i++) {
    if (!state.bench[i]) { state.bench[i] = img; save(); render(); toast(t("dupBench")); return; }
  }
  // 3) alles voll -> zwei neue Seiten, Kopie auf erstes neues Feld
  const firstNew = total;
  state.pages += 2; normalize();
  state.slots[firstNew] = img;
  save(); render();
  toast(t("dupNewPage"));
}

/* ============================================================================
   BILD-KOMPRIMIERUNG (max. Breite, JPEG) — hält Speicher klein
   ========================================================================== */
function compressImage(file, maxW = 600, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject; img.src = reader.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

function leftPageIndexForSpread(spread)  { return spread === 0 ? -1 : spread * 2 - 1; }
function rightPageIndexForSpread(spread) { return spread === 0 ? 0  : spread * 2; }

function render() {
  normalize();
  applyFormatVars();
  binder.innerHTML = "";

  const leftPage  = leftPageIndexForSpread(state.spread);
  const rightPage = rightPageIndexForSpread(state.spread);

  // linke Hälfte
  binder.appendChild(leftPage === -1 ? makeCoverInner("left") : makePage(leftPage, "left"));
  // Mittelfalz wie bei einem gebundenen Buch (keine Ringe)

/* Kompakte Sammlungs-Statistik in der Toolbar (besessen / fehlend / Gesamtwert) */
function updateStats() {
  const total = state.pages * SLOTS_PER_PAGE;
  let owned = 0, missing = 0, value = 0;
  for (let i = 0; i < total; i++) {
    const img = state.slots[i];
    if (!img) continue;
    if (state.owned[i] === "missing") { missing++; continue; }
    owned++;
    const p = state.prices[i];
    if (p != null && !isNaN(p)) value += Number(p);
  }
  const so = document.getElementById("statOwned"), sm = document.getElementById("statMissing"), sv = document.getElementById("statValue");
  if (so) so.textContent = "✓ " + owned;
  if (sm) sm.textContent = "✕ " + missing;
  if (sv) sv.textContent = "Σ " + formatPrice(value);
}

/* Setzt CSS-Variablen für das aktuelle Rasterformat (Spalten/Zeilen) und
   berechnet die Kartengröße so, dass das Raster ins quadratische Blatt passt.
   Das Kartenseitenverhältnis (6,3:8,8) bleibt dabei immer erhalten. */
function applyFormatVars() {
  const cols = state.cols || 3, rows = state.rows || 3;
  const root = document.documentElement;
  root.style.setProperty("--cols", cols);
  root.style.setProperty("--rows", rows);

  const PAGE = 750;          // Blattgröße in px (entspricht --page-size)
  const PAD = 40;            // Rand ums Raster
  const GAP = 12;            // Lücke zwischen Karten
  const avail = PAGE - PAD * 2;
  const RATIO = 8.8 / 6.3;   // Höhe/Breite einer Karte
  // Kartenbreite, begrenzt durch Breite UND Höhe
  const wByWidth = (avail - GAP * (cols - 1)) / cols;
  const hByHeight = (avail - GAP * (rows - 1)) / rows;
  let cardW = Math.min(wByWidth, hByHeight / RATIO);
  let cardH = cardW * RATIO;
  root.style.setProperty("--card-w", cardW + "px");
  root.style.setProperty("--card-h", cardH + "px");
  root.style.setProperty("--grid-gap", GAP + "px");
}

/* Eine Karten-Seite (3x3) mit eigenem Hintergrundbild + Werkzeugen */
function makePage(pageIndex, sideClass) {
  const side = document.createElement("div");
  side.className = "side " + sideClass;

  // Hintergrundbild-Ebene (nur wenn für diese Seite eines gesetzt ist)
  const bg = state.pageBg[pageIndex];
  if (bg) {
    side.classList.add("has-bg");
    const layer = document.createElement("div");
    layer.className = "page-bg-layer";
    layer.style.backgroundImage = `url(${bg})`;
    side.appendChild(layer);
  }

  // gestanzte Lochreihe am Falz-Rand
  // gestanzte Lochreihe entfällt (Buchfalz statt Ringmechanik)

  // Werkzeuge: Seiten-Hintergrund setzen / entfernen / als Bild exportieren
  const tools = document.createElement("div");
  tools.className = "page-tools";

  const bgBtn = document.createElement("button");
  bgBtn.textContent = bg ? t("pageBgChange") : t("pageBg");
  bgBtn.title = t("pageBgTitle");
  bgBtn.addEventListener("click", (e) => { e.stopPropagation(); pickPageBg(pageIndex); });
  tools.appendChild(bgBtn);

  if (bg) {
    const clr = document.createElement("button");
    clr.textContent = t("pageBgClear");
    clr.title = t("pageBgClearTitle");
    clr.addEventListener("click", (e) => { e.stopPropagation(); delete state.pageBg[pageIndex]; save(); render(); });
    tools.appendChild(clr);
  }

  const snap = document.createElement("button");
  snap.textContent = t("pageExport");
  snap.title = t("pageExportTitle");
  snap.addEventListener("click", (e) => { e.stopPropagation(); exportPageImage(pageIndex); });
  tools.appendChild(snap);

  side.appendChild(tools);

  // Grid
  const grid = document.createElement("div");
  grid.className = "grid";
  const base = pageIndex * SLOTS_PER_PAGE;
  for (let i = 0; i < SLOTS_PER_PAGE; i++) grid.appendChild(makeSlot("slot:" + (base + i)));
  side.appendChild(grid);

  // Seitensumme (nur wenn mindestens ein Preis gesetzt ist)
  const sum = pageSum(pageIndex);
  if (sum != null) {
    const sumEl = document.createElement("div");
    sumEl.className = "page-sum";
    sumEl.textContent = t("pageSumPrefix") + formatPrice(sum);
    sumEl.title = t("pageSumTitle");
    side.appendChild(sumEl);
  }

  return side;
}
