/* ============================================================================
   WATCHLIST-RENDERING
   ========================================================================== */
function langOptions() {
  return [
    { v: "en", l: t("langEnglish") }, { v: "de", l: t("langGerman") },
    { v: "ja", l: t("langJapanese") }, { v: "ko", l: t("langKorean") },
    { v: "zh", l: t("langChinese") },
  ];
}
// Ansicht-Zustand der Watchlist (nicht gespeichert)
let wlSort = { by: null, dir: 1 };   // by: name|count|buy|check:<date> ; dir: 1 asc, -1 desc
let wlSearch = "";
let wlColWidths = {};   // Spaltenbreiten (px), keyed per Spalte, bleiben über renderWatchlist()-Aufrufe erhalten

// Alle unterschiedlichen Check-Daten über alle Karten (als Spalten)
function allCheckDates() {
  const set = new Set();
  Object.values(state.watch).forEach(w => (w.checks || []).forEach(c => set.add(c.date)));
  return [...set].sort();
}

function openWatchlist() {
  syncWatch();
  applyWatchPricesToBinder();
  save();
  renderWatchlist();
  document.getElementById("watchlist").classList.add("open");
}
function closeWatchlist() {
  document.getElementById("watchlist").classList.remove("open");
  render();   // Ordner mit ggf. aktualisierten Preisen neu zeichnen
}

function renderWatchlist() {
  const table = document.getElementById("wlTable");
  const empty = document.getElementById("wlEmpty");
  let cards = ownedCards();
  const dates = allCheckDates();

  // Suche nach Name (bzw. leerem Namen ignorieren)
  const q = (wlSearch || "").trim().toLowerCase();
  if (q) cards = cards.filter(c => ((state.watch[c.key].name || "").toLowerCase().includes(q)));

  if (!cards.length) {
    table.innerHTML = ""; empty.style.display = "block";
    empty.textContent = q ? "—" : t("wlEmpty");
    document.getElementById("wlTotal").textContent = "";
    return;
  }
  empty.style.display = "none";

  // Sortierung anwenden
  const val = (c, by) => {
    const w = state.watch[c.key];
    if (by === "name") return (w.name || "").toLowerCase();
    if (by === "count") return c.count;
    if (by === "buy") return w.buyPrice != null ? w.buyPrice : -Infinity;
    if (by && by.startsWith("check:")) {
      const d = by.slice(6);
      const ex = (w.checks || []).find(ch => ch.date === d);
      return ex && ex.price != null ? ex.price : -Infinity;
    }
    return 0;
  };
  cards.sort((a, b) => {
    const va = val(a, wlSort.by), vb = val(b, wlSort.by);
    if (va < vb) return -1 * wlSort.dir;
    if (va > vb) return 1 * wlSort.dir;
    return 0;
  });

  // Preiszelle mit Einzel- und Gesamtpreis (× Anzahl)
  const priceCell = (single, count) => {
    const wrap = document.createElement("div");
    if (single == null || isNaN(single)) return wrap;
    const total = document.createElement("div");
    total.className = "wl-total-line";
    total.innerHTML = "×" + count + " = <b>" + formatPrice(single * count) + "</b>";
    wrap.appendChild(total);
    return wrap;
  };

  // sortierbare Kopfzelle
  const arrow = (by) => wlSort.by === by ? (wlSort.dir === 1 ? " ▲" : " ▼") : "";
  const makeSortableTh = (label, by) => {
    const colKey = by;
    const th = document.createElement("th");
    th.className = "wl-th-sort";
    if (wlColWidths[colKey]) th.style.width = wlColWidths[colKey] + "px";
    const wrap = document.createElement("div"); wrap.className = "wl-th-wrap";
    const span = document.createElement("span"); span.textContent = label;
    const arr = document.createElement("span"); arr.className = "wl-arrow"; arr.textContent = arrow(by);
    wrap.appendChild(span); wrap.appendChild(arr);
    th.appendChild(wrap);
    th.addEventListener("click", (e) => {
      if (e.target.classList.contains("wl-resizer")) return;
      if (wlSort.by === by) wlSort.dir *= -1; else { wlSort.by = by; wlSort.dir = 1; }
      renderWatchlist();
    });
    addResizer(th, colKey);
    return th;
  };
  const makePlainTh = (label, colKey) => {
    const th = document.createElement("th");
    if (wlColWidths[colKey]) th.style.width = wlColWidths[colKey] + "px";
    const wrap = document.createElement("div"); wrap.className = "wl-th-wrap";
    const span = document.createElement("span"); span.textContent = label; wrap.appendChild(span);
    th.appendChild(wrap); addResizer(th, colKey); return th;
  };

  // Kopfzeile bauen
  const thead = document.createElement("thead");
  const htr = document.createElement("tr");
  htr.appendChild(makePlainTh(t("wlCard"), "card"));
  htr.appendChild(makeSortableTh(t("wlName"), "name"));
  htr.appendChild(makePlainTh(t("wlLang"), "lang"));
  htr.appendChild(makeSortableTh(t("wlQty"), "count"));
  htr.appendChild(makeSortableTh(t("wlBuy"), "buy"));
  dates.forEach(d => htr.appendChild(makeSortableTh(d, "check:" + d)));
  htr.appendChild(makePlainTh(t("wlDiff"), "diff"));
  thead.appendChild(htr);

  // Zeilen
  const tbody = document.createElement("tbody");
  let totalLatest = 0, totalBuy = 0;
  const colSums = {}; dates.forEach(d => colSums[d] = 0);
  let qtyTotal = 0;

  cards.forEach(c => {
    const w = state.watch[c.key];
    const tr = document.createElement("tr");
    qtyTotal += c.count;

    // Bild
    const tdImg = document.createElement("td");
    const im = document.createElement("img"); im.className = "wl-img"; im.src = c.img; im.title = t("wlJumpTitle");
    im.addEventListener("click", () => { closeWatchlist(); jumpToCardSlot(c.slot); });
    tdImg.appendChild(im);
    tr.appendChild(tdImg);

    // Name
    const tdName = document.createElement("td");
    const nameIn = document.createElement("input");
    nameIn.className = "wl-name-input"; nameIn.value = w.name || ""; nameIn.placeholder = t("wlNamePh");
    nameIn.addEventListener("change", () => { w.name = nameIn.value; save(); });
    tdName.appendChild(nameIn); tr.appendChild(tdName);

    // Sprache
    const tdLang = document.createElement("td");
    const sel = document.createElement("select"); sel.className = "wl-lang-select";
    langOptions().forEach(o => { const opt = document.createElement("option"); opt.value = o.v; opt.textContent = o.l; if (w.lang === o.v) opt.selected = true; sel.appendChild(opt); });
    sel.addEventListener("change", () => { w.lang = sel.value; save(); });
    tdLang.appendChild(sel); tr.appendChild(tdLang);

    // Anzahl
    const tdQty = document.createElement("td");
    tdQty.innerHTML = "<b>×" + c.count + "</b>";
    tr.appendChild(tdQty);

    // Einkaufspreis (Einzel + Gesamt)
    const tdBuy = document.createElement("td");
    const buyIn = document.createElement("input");
    buyIn.className = "wl-price-input"; buyIn.type = "text";
    buyIn.value = w.buyPrice != null ? w.buyPrice : "";
    buyIn.addEventListener("change", () => {
      const v = parseFloat((buyIn.value || "").replace(",", "."));
      w.buyPrice = isNaN(v) ? null : Math.round(v * 100) / 100;
      save(); renderWatchlist();
    });
    tdBuy.appendChild(buyIn);
    tdBuy.appendChild(priceCell(w.buyPrice, c.count));
    tr.appendChild(tdBuy);
    if (w.buyPrice != null) totalBuy += w.buyPrice * c.count;

    // Check-Spalten (Einzel + Gesamt)
    dates.forEach(d => {
      const td = document.createElement("td");
      const inp = document.createElement("input");
      inp.className = "wl-price-input"; inp.type = "text";
      const ex = (w.checks || []).find(ch => ch.date === d);
      inp.value = ex && ex.price != null ? ex.price : "";
      inp.addEventListener("change", () => {
        const v = parseFloat((inp.value || "").replace(",", "."));
        let arr = w.checks || (w.checks = []);
        const existing = arr.find(ch => ch.date === d);
        if (isNaN(v)) { if (existing) w.checks = arr.filter(ch => ch.date !== d); }
        else { if (existing) existing.price = Math.round(v * 100) / 100; else arr.push({ date: d, price: Math.round(v * 100) / 100 }); }
        applyWatchPricesToBinder(); save(); renderWatchlist();
      });
      td.appendChild(inp);
      const price = ex && ex.price != null ? Number(ex.price) : null;
      td.appendChild(priceCell(price, c.count));
      if (price != null) colSums[d] += price * c.count;
      tr.appendChild(td);
    });

    // Differenz (neuester Check vs Einkauf, pro Stück) + Gesamt
    const tdDiff = document.createElement("td");
    const latest = latestCheckPrice(w);
    if (latest != null) totalLatest += latest * c.count;
    if (latest != null && w.buyPrice != null) {
      const diff = latest - w.buyPrice;
      tdDiff.innerHTML = "<span class='" + (diff > 0 ? "wl-diff-pos" : diff < 0 ? "wl-diff-neg" : "wl-diff-zero") + "'>" +
        (diff >= 0 ? "+" : "") + formatPrice(diff) + "</span>" +
        "<div class='wl-total-line'>×" + c.count + " = <b>" + (diff >= 0 ? "+" : "") + formatPrice(diff * c.count) + "</b></div>";
    } else { tdDiff.textContent = "–"; tdDiff.className = "wl-diff-zero"; }
    tr.appendChild(tdDiff);

    tbody.appendChild(tr);
  });

  // Summenzeile
  const trSum = document.createElement("tr");
  let sumCells = "<td class='wl-colsum' colspan='3'>" + t("wlColSum") + "</td>";
  sumCells += "<td class='wl-colsum'>×" + qtyTotal + "</td>";
  sumCells += "<td class='wl-colsum'>" + formatPrice(totalBuy) + "</td>";
  dates.forEach(d => { sumCells += "<td class='wl-colsum'>" + formatPrice(colSums[d]) + "</td>"; });
  sumCells += "<td></td>";
  trSum.innerHTML = sumCells;
  tbody.appendChild(trSum);

  table.innerHTML = "";
  table.appendChild(thead);
  table.appendChild(tbody);

  document.getElementById("wlTotal").textContent = t("wlTotal") + formatPrice(totalLatest || totalBuy);
}

/* Spaltenbreite per Ziehen am rechten Rand einer Kopfzelle */
function addResizer(th, colKey) {
  const rz = document.createElement("div");
  rz.className = "wl-resizer";
  rz.addEventListener("mousedown", (e) => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX;
    const startW = th.offsetWidth;
    const move = (ev) => {
      const w = Math.max(48, startW + (ev.clientX - startX));
      th.style.width = w + "px";
      if (colKey) wlColWidths[colKey] = w;
    };
    const up = () => { document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); };
    document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
  });
  th.appendChild(rz);
}


/* ============================================================================
   VORSCHAU-LEISTE (rechts): Mini-Abbild jeder Doppelseiten-Ansicht.
   - Klick springt zur Ansicht.
   - Drag&Drop tauscht zwei komplette Doppelseiten (alle 18 Karten inkl.
     Hintergründe und Markierungen).
   ========================================================================== */
const previewList = document.getElementById("previewList");

// Karten-Seitenindizes, die ein bestimmter Spread anzeigt (ohne Deckel/Rückseite)
function pageIndicesForSpread(spread) {
  const left = leftPageIndexForSpread(spread);
  const right = rightPageIndexForSpread(spread);
  const arr = [];
  if (left >= 0 && left < state.pages) arr.push(left);
  if (right >= 0 && right < state.pages) arr.push(right);
  return arr;
}

function totalSpreads() {
  // höchster Spread, dessen linke/rechte Seite noch existiert
  let s = 0;
  while (pageIndicesForSpread(s + 1).length > 0) s++;
  return s; // 0..s
}

// Mini-Abbild einer Karten-Seite (mit Lösch-X beim Hovern)
function makePvPage(pageIndex) {
  const pg = document.createElement("div");
  pg.className = "pv-page";
  pg.style.position = "relative";
  const bg = state.pageBg[pageIndex];
  if (bg) pg.style.backgroundImage = `url(${bg})`;
  const base = pageIndex * SLOTS_PER_PAGE;
  for (let i = 0; i < SLOTS_PER_PAGE; i++) {
    const cell = document.createElement("div");
    cell.className = "pv-cell";
    const img = state.slots[base + i];
    if (img) cell.style.backgroundImage = `url(${img})`;
    pg.appendChild(cell);
  }
  // Lösch-X (nur sichtbar, wenn mehr als 1 Seite existiert)
  if (state.pages > 1) {
    const x = document.createElement("button");
    x.className = "pv-del"; x.textContent = "✕"; x.title = t("pageDeleted");
    x.addEventListener("click", (e) => {
      e.stopPropagation();
      if (confirm(t("pageDeleteConfirm"))) deletePage(pageIndex);
    });
    pg.appendChild(x);
  }
  return pg;
}

/* Eine einzelne Karten-Seite löschen (Karten, Hintergrund, Preise, Status).
   Alle nachfolgenden Seiten rücken auf. */
function deletePage(pageIndex) {
  pushUndo();
  const per = SLOTS_PER_PAGE;
  // Slots der Seite herausschneiden
  state.slots.splice(pageIndex * per, per);
  // pageBg / prices / owned reindizieren (alles ab pageIndex bzw. dessen Slots verschiebt sich)
  const remapObjBySlot = (obj) => {
    const out = {};
    for (const k in obj) {
      const gi = +k;
      const pg = Math.floor(gi / per);
      if (pg === pageIndex) continue;            // gelöschte Seite
      const newGi = pg > pageIndex ? gi - per : gi;
      out[newGi] = obj[k];
    }
    return out;
  };
  state.prices = remapObjBySlot(state.prices);
  state.owned = remapObjBySlot(state.owned);
  // pageBg ist nach Seitenindex (nicht Slot)
  const newBg = {};
  for (const k in state.pageBg) {
    const p = +k;
    if (p === pageIndex) continue;
    newBg[p > pageIndex ? p - 1 : p] = state.pageBg[k];
  }
  state.pageBg = newBg;
  state.pages = Math.max(1, state.pages - 1);
  // Spread in gültigen Bereich bringen
  const maxS = totalSpreads();
  if (state.spread > maxS) state.spread = maxS;
  normalize(); save(); render();
  toast(t("pageDeleted"));
}

function renderPreviewRail() {
  if (!previewList) return;
  previewList.innerHTML = "";
  const maxS = totalSpreads();
  for (let s = 0; s <= maxS; s++) {
    const row = document.createElement("div");
    row.className = "pv-spread" + (s === state.spread ? " active" : "");
    row.dataset.spread = s;

    // Deckel-Ansicht (spread 0): links Leder, rechts Seite 1
    if (s === 0) {
      const cover = document.createElement("div"); cover.className = "pv-page cover";
      row.appendChild(cover);
      row.appendChild(makePvPage(0));
    } else {
      const idx = pageIndicesForSpread(s);
      idx.forEach(pi => row.appendChild(makePvPage(pi)));
      // falls nur eine Seite (Rückseite), Platzhalter ergänzen
      if (idx.length === 1) { const e = document.createElement("div"); e.className = "pv-page cover"; row.appendChild(e); }
    }

    // Klick -> zu dieser Ansicht springen
    row.addEventListener("click", () => { state.spread = s; save(); render(); });

    // Drag&Drop: ganze Doppelseiten tauschen (Deckel-Ansicht ausgenommen)
    if (s >= 1) {
      row.setAttribute("draggable", "true");
      row.addEventListener("dragstart", (e) => { pvDragSpread = s; row.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", "spread:" + s); });
      row.addEventListener("dragend", () => { row.classList.remove("dragging"); pvDragSpread = null; document.querySelectorAll(".pv-spread.dragover").forEach(x => x.classList.remove("dragover")); });
      row.addEventListener("dragover", (e) => { if (pvDragSpread !== null) { e.preventDefault(); row.classList.add("dragover"); } });
      row.addEventListener("dragleave", () => row.classList.remove("dragover"));
      row.addEventListener("drop", (e) => {
        e.preventDefault(); row.classList.remove("dragover");
        if (pvDragSpread !== null && pvDragSpread !== s) swapSpreads(pvDragSpread, s);
      });
    }

    const wrap = document.createElement("div");
    wrap.appendChild(row);
    const lbl = document.createElement("div"); lbl.className = "pv-label";
    lbl.textContent = s === 0 ? t("page") + " 1" : pageIndicesForSpread(s).map(i => i + 1).join("–");
    wrap.appendChild(lbl);
    previewList.appendChild(wrap);
  }
}

let pvDragSpread = null;

/* Tauscht die kompletten Inhalte zweier Doppelseiten (Karten, Hintergründe,
   Markierungen). Arbeitet seitenweise über die Karten-Seitenindizes. */
function swapSpreads(a, b) {
  pushUndo();
  const ia = pageIndicesForSpread(a), ib = pageIndicesForSpread(b);
  // paarweise tauschen (linke<->linke, rechte<->rechte)
  const n = Math.max(ia.length, ib.length);
  for (let k = 0; k < n; k++) {
    if (ia[k] === undefined || ib[k] === undefined) continue;
    swapPages(ia[k], ib[k]);
  }
  save(); render();
  toast(t("spreadSwapped"));
}

/* Tauscht zwei einzelne Karten-Seiten komplett. */
function swapPages(p1, p2) {
  const b1 = p1 * SLOTS_PER_PAGE, b2 = p2 * SLOTS_PER_PAGE;
  for (let i = 0; i < SLOTS_PER_PAGE; i++) {
    const t = state.slots[b1 + i]; state.slots[b1 + i] = state.slots[b2 + i]; state.slots[b2 + i] = t;
    // Besitz-Status mitnehmen
    const o1 = state.owned[b1 + i], o2 = state.owned[b2 + i];
    if (o2 === "missing") state.owned[b1 + i] = "missing"; else delete state.owned[b1 + i];
    if (o1 === "missing") state.owned[b2 + i] = "missing"; else delete state.owned[b2 + i];
  }
  // Seiten-Hintergründe tauschen
  const bg1 = state.pageBg[p1], bg2 = state.pageBg[p2];
  if (bg2 !== undefined) state.pageBg[p1] = bg2; else delete state.pageBg[p1];
  if (bg1 !== undefined) state.pageBg[p2] = bg1; else delete state.pageBg[p2];
}

/* ============================================================================
   AUTO-SKALIERUNG: Ordner immer in den sichtbaren Bereich einpassen.
   Der Ordner hat eine feste Pixelgröße; wir skalieren ihn per transform so,
   dass er samt Rand in Stage-Breite/Höhe passt (nie größer als 1:1).
   ========================================================================== */
function fitBinder() {
  const frame = document.getElementById("binderFrame");
  const stageInner = document.getElementById("stageInner");
  if (!frame || !stageInner) return;
  frame.style.transform = "scale(1)";   // erst zurücksetzen, dann messen
  const availW = window.innerWidth - 156 - 24 - 60;   // Leiste + Paddings + Pfeile
  const availH = window.innerHeight - 56 - 52 - 70 - 150; // Toolbar, Pager, Bank, Abstände
  const rect = frame.getBoundingClientRect();
  const scale = Math.min(1, availW / rect.width, availH / rect.height);
  frame.style.transform = "scale(" + scale.toFixed(3) + ")";
  frame.style.transformOrigin = "top center";
  // Höhe nach Skalierung kompensieren, damit Bank nicht überlappt
  frame.style.marginBottom = (rect.height * (scale - 1)) + "px";
}
window.addEventListener("resize", fitBinder);

/* Ein Feld (Ordner ODER Bank) — adressiert über LOCATION-ID */
function makeSlot(loc) {
  const slot = document.createElement("div");
  slot.className = "slot";
  slot.dataset.loc = loc;

  const isBinderSlot = loc.startsWith("slot:");
  const slotIndex = isBinderSlot ? +loc.split(":")[1] : null;

  // Markier-Modus: nur Ordner-Felder bekommen einen farbigen Status-Rand.
  // Standard = "owned" (grün); explizit als "missing" markierte Felder = rot.
  if (markMode && isBinderSlot) {
    const status = state.owned[slotIndex] === "missing" ? "missing" : "owned";
    slot.classList.add("mark", status === "missing" ? "mark-missing" : "mark-owned");
  }

  const img = getCard(loc);

  if (img) {
    slot.classList.add("filled");
    slot.setAttribute("draggable", "true");

    const im = document.createElement("img"); im.src = img; slot.appendChild(im);

    const del = document.createElement("button");
    del.className = "del"; del.textContent = "✕"; del.title = t("delCard");
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      pushUndo();
      setCard(loc, null);
      if (isBinderSlot) { delete state.prices[slotIndex]; delete state.owned[slotIndex]; }
      save(); render();
    });
    slot.appendChild(del);

    // Duplizieren: kopiert die Karte in den nächsten freien Platz
    const dup = document.createElement("button");
    dup.className = "dup"; dup.textContent = "⧉"; dup.title = t("dupCard");
    dup.addEventListener("click", (e) => { e.stopPropagation(); duplicateCard(loc); });
    slot.appendChild(dup);

    // Preis setzen (nur Ordner-Karten): kleiner Knopf unten links
    if (isBinderSlot) {
      const priceBtn = document.createElement("button");
      priceBtn.className = "price-btn"; priceBtn.textContent = currencySymbol();
      priceBtn.title = t("setPrice");
      priceBtn.addEventListener("click", (e) => { e.stopPropagation(); editPrice(slotIndex); });
      slot.appendChild(priceBtn);

      // vorhandenen Preis als Badge unten anzeigen
      const pv = state.prices[slotIndex];
      if (pv != null && !isNaN(pv)) {
        const badge = document.createElement("div");
        badge.className = "price-badge"; badge.textContent = formatPrice(pv);
        slot.appendChild(badge);
      }
    }

    slot.addEventListener("click", () => openModal(img));
  } else {
    const plus = document.createElement("div"); plus.className = "plus"; plus.textContent = "+";
    slot.appendChild(plus);
    slot.addEventListener("click", () => triggerUpload(loc));
  }

  // Im Markier-Modus: kleiner Umschalt-Knopf auf Ordner-Feldern (grün <-> rot).
  // Erscheint NUR im Modus, damit das normale Design ungestört bleibt.
  if (markMode && isBinderSlot) {
    const toggle = document.createElement("button");
    const isMissing = state.owned[slotIndex] === "missing";
    toggle.className = "mark-toggle " + (isMissing ? "is-missing" : "is-owned");
    toggle.textContent = isMissing ? "✕" : "✓";
    toggle.title = isMissing ? t("markMissingTitle") : t("markOwnedTitle");
    toggle.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isMissing) delete state.owned[slotIndex];   // zurück zu owned (Standard)
      else state.owned[slotIndex] = "missing";
      save(); render();
    });
    slot.appendChild(toggle);
  }

  attachDragAndDrop(slot, loc);
  return slot;
}

/* ============================================================================
   DRAG & DROP  (einheitlich über LOCATION-IDs)
   ----------------------------------------------------------------------------
   - Datei vom Desktop auf ein Feld  -> Upload dorthin
   - Karte von loc A auf loc B        -> Plätze TAUSCHEN (Ordner<->Ordner,
                                          Ordner<->Bank, Bank<->Bank)
   ========================================================================== */
let dragSourceLoc = null;

function attachDragAndDrop(slot, loc) {
  slot.addEventListener("dragstart", (e) => {
    if (!getCard(loc)) return;
    dragSourceLoc = loc;
    slot.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", loc);
  });
  slot.addEventListener("dragend", () => {
    slot.classList.remove("dragging");
    dragSourceLoc = null;
    document.querySelectorAll(".slot.dragover").forEach(s => s.classList.remove("dragover"));
  });
  slot.addEventListener("dragover", (e) => { e.preventDefault(); slot.classList.add("dragover"); });
  slot.addEventListener("dragleave", () => slot.classList.remove("dragover"));

  slot.addEventListener("drop", async (e) => {
    e.preventDefault();
    slot.classList.remove("dragover");

    // Datei vom Desktop?
    if (e.dataTransfer.files && e.dataTransfer.files.length) {
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("image/")) {
        pushUndo();
        setCard(loc, await compressImage(file)); save(); render();
      }
      return;
    }
    // vorhandene Karte verschieben/tauschen
    const src = dragSourceLoc || e.dataTransfer.getData("text/plain");
    if (src && src !== loc) {
      pushUndo();
      const a = getCard(src), b = getCard(loc);
      setCard(loc, a); setCard(src, b);     // Bilder tauschen
      // Preise + Markierungen mittauschen, aber nur für Ordner-Felder
      // (Bank hat keine Preise/Status). meta(loc) liefert Index oder null.
      const si = src.startsWith("slot:") ? +src.split(":")[1] : null;
      const ti = loc.startsWith("slot:") ? +loc.split(":")[1] : null;
      swapMeta(si, ti);
      save(); render();
    }
  });
}

/* Tauscht Preis + Besitz-Status zwischen zwei Slot-Indizes.
   null = Bank-Platz (hat keine Meta) -> Zielmeta wird dann geleert/gesetzt. */
function swapMeta(i, j) {
  const get = (idx, obj) => idx == null ? undefined : obj[idx];
  const pI = get(i, state.prices), pJ = get(j, state.prices);
  const oI = get(i, state.owned),  oJ = get(j, state.owned);
  // Preise
  if (i != null) { if (pJ !== undefined) state.prices[i] = pJ; else delete state.prices[i]; }
  if (j != null) { if (pI !== undefined) state.prices[j] = pI; else delete state.prices[j]; }
  // Status
  if (i != null) { if (oJ !== undefined) state.owned[i] = oJ; else delete state.owned[i]; }
  if (j != null) { if (oI !== undefined) state.owned[j] = oI; else delete state.owned[j]; }
}

const modal = document.getElementById("modal");

/* ============================================================================
   PAGINATION (immer zwei Seiten, mit Animation)
   ========================================================================== */
const posLabel = document.getElementById("pos");
function updatePager() {
  const left = leftPageIndexForSpread(state.spread);
  const right = rightPageIndexForSpread(state.spread);
  let txt;
  if (state.spread === 0) txt = t("cover") + " · " + t("page") + " 1";
  else txt = t("page") + " " + (left + 1) + " · " + (right < state.pages ? t("page") + " " + (right + 1) : t("backside"));
  posLabel.textContent = txt;

  const atStart = state.spread === 0;
  const atEnd = leftPageIndexForSpread(state.spread + 1) >= state.pages;
  document.getElementById("prevBtn").disabled = atStart;
  document.getElementById("nextBtn").disabled = atEnd;
  // seitliche Pfeile spiegeln denselben Status
  const sp = document.getElementById("sideNavPrev"), sn = document.getElementById("sideNavNext");
  if (sp) sp.disabled = atStart;
  if (sn) sn.disabled = atEnd;
}

/* Direkt zu einer Seitenzahl springen (1-basiert). Wählt den Spread,
   in dem diese Seite sichtbar ist. */
function goToPage(pageNumber) {
  let p = Math.round(pageNumber);
  if (isNaN(p)) return;
  p = Math.max(1, Math.min(state.pages, p));     // in gültigen Bereich klemmen
  const idx = p - 1;                              // 0-basiert
  // spread 0 zeigt Seite 1 (idx 0). Ab da: linke Seite = 2*spread-1.
  const spread = idx === 0 ? 0 : Math.ceil(idx / 2);
  state.spread = spread;
  save(); render();
  toast(t("jumpTo", p));
}

/* Zu einer Karte im Ordner springen (Crosslink Watchlist <-> Suche) und sie kurz hervorheben. */
function jumpToCardSlot(slotIndex) {
  const pageNum = Math.floor(slotIndex / SLOTS_PER_PAGE) + 1;
  goToPage(pageNum);
  const el = document.querySelector('.slot[data-loc="slot:' + slotIndex + '"]');
  if (el) {
    el.classList.remove("search-highlight"); void el.offsetWidth; // Animation neu triggern
    el.classList.add("search-highlight");
    el.scrollIntoView({ behavior: "smooth", block: "center" });
    setTimeout(() => el.classList.remove("search-highlight"), 2800);
  }
}

/* Besessene Karten anhand des in der Watchlist eingetragenen Namens durchsuchen. */
function searchOwnedCards(query) {
  const q = (query || "").trim().toLowerCase();
  if (!q) return [];
  const total = state.pages * SLOTS_PER_PAGE;
  const results = [];
  const seenKeys = new Set();
  for (const key in state.watch) {
    const w = state.watch[key];
    if (!w.name || !w.name.toLowerCase().includes(q)) continue;
    if (seenKeys.has(key)) continue;
    for (let i = 0; i < total; i++) {
      const img = state.slots[i];
      if (!img) continue;
      if (state.owned[i] === "missing") continue;
      if (imgKey(img) === key) { results.push({ key, name: w.name, img, slot: i }); seenKeys.add(key); break; }
    }
  }
  return results.slice(0, 8);
}

const cardSearchInput = document.getElementById("cardSearchInput");
const cardSearchResults = document.getElementById("cardSearchResults");
const cardSearchWrap = document.getElementById("cardSearchWrap");
function renderCardSearchResults() {
  const q = cardSearchInput.value;
  cardSearchResults.innerHTML = "";
  if (!q.trim()) { cardSearchResults.classList.remove("open"); return; }
  const results = searchOwnedCards(q);
  if (!results.length) {
    const empty = document.createElement("div");
    empty.className = "csr-empty"; empty.textContent = t("searchNoMatch");
    cardSearchResults.appendChild(empty);
  } else {
    results.forEach(r => {
      const item = document.createElement("div"); item.className = "csr-item";
      const im = document.createElement("img"); im.src = r.img; item.appendChild(im);
      const name = document.createElement("div"); name.className = "csr-name"; name.textContent = r.name;
      item.appendChild(name);
      const page = document.createElement("div"); page.className = "csr-page";
      page.textContent = t("page") + " " + (Math.floor(r.slot / SLOTS_PER_PAGE) + 1);
      item.appendChild(page);
      item.addEventListener("click", () => {
        cardSearchResults.classList.remove("open");
        cardSearchInput.value = "";
        jumpToCardSlot(r.slot);
      });
      cardSearchResults.appendChild(item);
    });
  }
  cardSearchResults.classList.add("open");
}
cardSearchInput.addEventListener("input", renderCardSearchResults);
cardSearchInput.addEventListener("focus", renderCardSearchResults);
document.addEventListener("click", (e) => {
  if (!cardSearchWrap.contains(e.target)) cardSearchResults.classList.remove("open");
});
cardSearchInput.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { cardSearchInput.value = ""; cardSearchResults.classList.remove("open"); cardSearchInput.blur(); }
});

function flip(direction) {
  const target = direction === "next" ? state.spread + 1 : state.spread - 1;
  if (target < 0) return;
  if (direction === "next" && leftPageIndexForSpread(target) >= state.pages) return;

  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduce) { state.spread = target; save(); render(); return; }

  const flipEl = document.createElement("div");
  flipEl.className = "flip " + direction;
  binder.appendChild(flipEl);
  flipEl.addEventListener("animationend", () => { state.spread = target; save(); render(); }, { once: true });
}
document.getElementById("nextBtn").addEventListener("click", () => flip("next"));
document.getElementById("prevBtn").addEventListener("click", () => flip("prev"));
document.getElementById("sideNavNext").addEventListener("click", () => flip("next"));
document.getElementById("sideNavPrev").addEventListener("click", () => flip("prev"));

/* Anklickbare Seitenanzeige: Klick blendet ein Eingabefeld ein,
   Enter springt zur eingegebenen Seite. */
const jumpInput = document.getElementById("jumpInput");
posLabel.addEventListener("click", () => {
  jumpInput.classList.remove("hidden");
  posLabel.classList.add("hidden");
  jumpInput.value = "";
  jumpInput.max = String(state.pages);
  jumpInput.focus();
});
function closeJump() { jumpInput.classList.add("hidden"); posLabel.classList.remove("hidden"); }
jumpInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { const v = parseInt(jumpInput.value, 10); closeJump(); if (!isNaN(v)) goToPage(v); }
  else if (e.key === "Escape") closeJump();
});
jumpInput.addEventListener("blur", closeJump);

/* ============================================================================
   EINFÜGEN AUS ZWISCHENABLAGE (Strg+V) — z. B. Bild aus Word kopiert.
   Das Bild landet im ersten freien Bank-Platz; ist die Bank voll, im ersten
   freien Ordner-Feld. So lassen sich Bilder schnell aus Word übernehmen.
   ========================================================================== */
window.addEventListener("paste", async (e) => {
  if (document.activeElement && document.activeElement.isContentEditable) return;
  const items = (e.clipboardData && e.clipboardData.items) || [];
  for (const it of items) {
    if (it.type && it.type.startsWith("image/")) {
      const file = it.getAsFile();
      if (!file) continue;
      e.preventDefault();
      const data = await compressImage(file);
      let placedBench = false;
      for (let i = 0; i < BENCH_SIZE; i++) {
        if (!state.bench[i]) { state.bench[i] = data; placedBench = true; break; }
      }
      if (!placedBench) {
        const total = state.pages * SLOTS_PER_PAGE;
        let placedSlot = false;
        for (let i = 0; i < total; i++) { if (!state.slots[i]) { state.slots[i] = data; placedSlot = true; break; } }
        if (!placedSlot) { state.pages += 2; normalize(); state.slots[(state.pages - 2) * SLOTS_PER_PAGE] = data; }
        save(); render(); toast(placedSlot ? t("pasteSlot") : t("pasteNewPage"));
      } else {
        save(); render(); toast(t("pasteBench"));
      }
      return;
    }
  }
});

/* Logo komprimieren, aber als PNG (Transparenz erhalten) */
function compressLogo(file, maxW = 600) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/png"));
      };
      img.onerror = reject; img.src = reader.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

/* ============================================================================
   CSV-EXPORT DER WATCHLIST
   ========================================================================== */
function csvEscape(v) {
  const s = String(v == null ? "" : v);
  return /[";\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
document.getElementById("wlCsvBtn").addEventListener("click", () => {
  const cards = ownedCards();
  if (!cards.length) { toast(t("csvNoData")); return; }
  const dates = allCheckDates();
  const header = [t("wlName"), t("wlLang"), t("wlQty"), t("wlBuy"), ...dates, t("wlDiff")];
  const rows = [header];
  cards.forEach(c => {
    const w = state.watch[c.key];
    const latest = latestCheckPrice(w);
    const diff = (latest != null && w.buyPrice != null) ? (latest - w.buyPrice) : "";
    const row = [
      w.name || "", langOptions().find(o => o.v === w.lang)?.l || w.lang || "",
      c.count, w.buyPrice != null ? w.buyPrice : "",
      ...dates.map(d => { const ex = (w.checks || []).find(ch => ch.date === d); return ex && ex.price != null ? ex.price : ""; }),
      diff,
    ];
    rows.push(row);
  });
  const csv = rows.map(r => r.map(csvEscape).join(";")).join("\r\n");
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const name = (state.name || "watchlist").replace(/[^a-z0-9äöüß \-]/gi, "").trim().replace(/\s+/g, "-") || "watchlist";
  const a = document.createElement("a"); a.href = url; a.download = name + "-watchlist.csv"; a.click();
  URL.revokeObjectURL(url);
  toast(t("csvExported"));
});

/* ============================================================================
   BILD-EXPORT EINER 9er-SEITE  (1080×1080, immer gleiches Layout)
   ----------------------------------------------------------------------------
   Verwendet das Hintergrundbild GENAU DIESER Seite. So sieht der Export aus
   wie das, was man im Ordner sieht: Bild als Blatt-Hintergrund + 3x3-Raster.
   ========================================================================== */
function exportPageImage(pageIndex) {
  const W = 1080, H = 1350;                // Hochformat (Instagram-Portrait)
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  const loadImg = (src) => new Promise((res) => {
    if (!src) return res(null);
    const i = new Image(); i.onload = () => res(i); i.onerror = () => res(null); i.src = src;
  });

  const CARD_RATIO = 8.8 / 6.3;            // Höhe/Breite einer Karte
  const cols = state.cols || 3, rows = state.rows || 3;
  const MARGIN = Math.round(W * 0.06);     // seitlicher Grundrand
  const GAP = Math.round(W * 0.02);
  // feste Zonen oben (Logo) und unten (Summe)
  const topZone = Math.round(H * 0.1);     // Logo-Bereich
  const bottomZone = Math.round(H * 0.11); // Summen-Bereich
  // verfügbare Fläche fürs Raster
  const availGridH = H - topZone - bottomZone - MARGIN;
  const availGridW = W - MARGIN * 2;
  // Kartengröße: limitiert durch Breite UND Höhe, kleinerer Wert gewinnt
  const cardHByHeight = (availGridH - GAP * (rows - 1)) / rows;
  const cardWByWidth  = (availGridW - GAP * (cols - 1)) / cols;
  let cardW = Math.min(cardWByWidth, cardHByHeight / CARD_RATIO);
  let cardH = cardW * CARD_RATIO;
  const gridW = cardW * cols + GAP * (cols - 1);
  const gridH = cardH * rows + GAP * (rows - 1);
  const startX = (W - gridW) / 2;          // horizontal zentriert
  // Raster vertikal in der Zone zwischen Logo und Summe zentrieren
  const startY = topZone + ((H - topZone - bottomZone) - gridH) / 2;

  const base = pageIndex * SLOTS_PER_PAGE;
  const sources = [];
  for (let i = 0; i < SLOTS_PER_PAGE; i++) sources.push(state.slots[base + i]);

  Promise.all([loadImg(state.pageBg[pageIndex]), loadImg(state.exportLogo), ...sources.map(loadImg)]).then((imgs) => {
    const bgImg = imgs[0], logoImg = imgs[1], cardImgs = imgs.slice(2);

    // Hintergrund über die volle Fläche
    if (bgImg) {
      drawCover(ctx, bgImg, 0, 0, W, H);
      ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.fillRect(0, 0, W, H);
    } else {
      const g = ctx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0, "#f2f3f8"); g.addColorStop(1, "#e4e6ee");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    }

    // --- Logo/Name oben (Wasserzeichen), in der topZone zentriert ---
    const headerY = topZone / 2;
    if (logoImg) {
      const maxLogoH = W * 0.1, maxLogoW = W * 0.5;
      let lw = logoImg.width, lh = logoImg.height;
      const scale = Math.min(maxLogoW / lw, maxLogoH / lh);
      lw *= scale; lh *= scale;
      ctx.globalAlpha = 0.95;
      ctx.drawImage(logoImg, (W - lw) / 2, headerY - lh / 2, lw, lh);
      ctx.globalAlpha = 1;
    } else if (state.exportName && state.exportName.trim()) {
      ctx.font = "800 " + Math.round(W * 0.046) + "px system-ui, sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = bgImg ? "rgba(255,255,255,0.95)" : "rgba(40,28,16,0.92)";
      ctx.shadowColor = "rgba(0,0,0,0.35)"; ctx.shadowBlur = 6;
      ctx.fillText(state.exportName.trim(), W / 2, headerY);
      ctx.shadowBlur = 0;
    }

    const radius = Math.round(cardW * 0.06);
    const base = pageIndex * SLOTS_PER_PAGE;
    const showP = !!state.showPricesInExport;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      const idx = r * cols + c;
      const x = startX + c * (cardW + GAP), y = startY + r * (cardH + GAP);
      roundRect(ctx, x, y, cardW, cardH, radius);
      ctx.fillStyle = bgImg ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.05)"; ctx.fill();
      const ci = cardImgs[idx];
      if (ci) {
        ctx.save(); roundRect(ctx, x, y, cardW, cardH, radius); ctx.clip();
        (state.fit === "contain" ? drawContain : drawCover)(ctx, ci, x, y, cardW, cardH);
        ctx.restore();
      }
      roundRect(ctx, x, y, cardW, cardH, radius);
      ctx.lineWidth = 2; ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.stroke();

      // Preis-Badge auf der Karte (wenn aktiviert und Preis vorhanden)
      const price = state.prices[base + idx];
      if (showP && price != null && !isNaN(price) && ci) {
        const label = formatPrice(price);
        ctx.font = "700 " + Math.round(cardW * 0.13) + "px system-ui, sans-serif";
        const tw = ctx.measureText(label).width;
        const padX = cardW * 0.06, bh = cardW * 0.2;
        const bw = tw + padX * 2;
        const bx = x + (cardW - bw) / 2, by = y + cardH - bh - cardW * 0.06;
        roundRect(ctx, bx, by, bw, bh, bh / 2);
        ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fill();
        ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(139,124,246,0.7)"; ctx.stroke();
        ctx.fillStyle = "#6ee7b7"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(label, bx + bw / 2, by + bh / 2 + 1);
      }
    }

    // Gesamtsumme in der unteren Zone (unter dem Raster, ohne Überschneidung)
    const sum = pageSum(pageIndex);
    if (showP && sum != null) {
      const label = t("totalLabel") + formatPrice(sum);
      ctx.font = "800 " + Math.round(W * 0.045) + "px system-ui, sans-serif";
      const tw = ctx.measureText(label).width;
      const padX = W * 0.035, bh = W * 0.09, bw = tw + padX * 2;
      const bx = (W - bw) / 2;
      // vertikal in der bottomZone zentrieren
      const by = (H - bottomZone) + (bottomZone - bh) / 2;
      roundRect(ctx, bx, by, bw, bh, bh / 2);
      ctx.fillStyle = "rgba(16,17,24,0.88)"; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = "rgba(139,124,246,0.8)"; ctx.stroke();
      ctx.fillStyle = "#6ee7b7"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(label, W / 2, by + bh / 2 + 1);
    }

    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    const safeName = (state.name || "binder").replace(/[^a-z0-9äöüß \-]/gi, "").trim().replace(/\s+/g, "-") || "binder";
    a.download = safeName + "-page-" + (pageIndex + 1) + ".png"; a.click();
    toast(t("exportImg"));
  });
}

function drawCover(ctx, img, x, y, w, h) {
  const ir = img.width / img.height, br = w / h; let sw, sh, sx, sy;
  if (ir > br) { sh = img.height; sw = sh * br; sx = (img.width - sw) / 2; sy = 0; }
  else         { sw = img.width;  sh = sw / br; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}
function drawContain(ctx, img, x, y, w, h) {
  const ir = img.width / img.height, br = w / h; let dw, dh;
  if (ir > br) { dw = w; dh = w / ir; } else { dh = h; dw = h * ir; }
  ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

/* ============================================================================
   TOAST
   ========================================================================== */
let toastTimer = null;
const toastEl = document.getElementById("toast");
function toast(msg) {
  toastEl.textContent = msg; toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2200);
}

/* ============================================================================
   STARTSCREEN / COLLECTION-AUSWAHL
   ========================================================================== */
const FORMATS = [
  { cols: 2, rows: 2 }, { cols: 3, rows: 3 },
  { cols: 4, rows: 3 }, { cols: 3, rows: 4 }, { cols: 4, rows: 4 },
];
let selectedFormat = { cols: 3, rows: 3 };

const startScreen = document.getElementById("startScreen");
function showStartScreen() {
  renderFormatGrid();
  renderCollectionList();
  startScreen.classList.remove("hidden");
}
function hideStartScreen() { startScreen.classList.add("hidden"); }

function renderFormatGrid() {
  const grid = document.getElementById("formatGrid");
  grid.innerHTML = "";
  FORMATS.forEach(f => {
    const opt = document.createElement("div");
    opt.className = "format-opt" + (f.cols === selectedFormat.cols && f.rows === selectedFormat.rows ? " active" : "");
    const mini = document.createElement("div");
    mini.className = "format-mini";
    mini.style.gridTemplateColumns = "repeat(" + f.cols + ",1fr)";
    for (let i = 0; i < f.cols * f.rows; i++) { const s = document.createElement("span"); mini.appendChild(s); }
    opt.appendChild(mini);
    const lbl = document.createElement("div"); lbl.className = "format-label"; lbl.textContent = f.cols + "×" + f.rows;
    opt.appendChild(lbl);
    const cap = document.createElement("div"); cap.className = "format-cap"; cap.textContent = t("formatCap", f.cols * f.rows);
    opt.appendChild(cap);
    opt.addEventListener("click", () => { selectedFormat = { cols: f.cols, rows: f.rows }; renderFormatGrid(); });
    grid.appendChild(opt);
  });
}

function renderCollectionList() {
  const list = document.getElementById("collectionList");
  list.innerHTML = "";
  const cols = loadIndex().sort((a, b) => b.updatedAt - a.updatedAt);
  if (!cols.length) {
    const e = document.createElement("div"); e.className = "collection-empty"; e.textContent = t("noCollections");
    list.appendChild(e); return;
  }
  cols.forEach(c => {
    const item = document.createElement("div"); item.className = "collection-item";
    const name = document.createElement("div"); name.className = "ci-name"; name.textContent = c.name || "Collection";
    item.appendChild(name);
    const meta = document.createElement("div"); meta.className = "ci-meta";
    meta.textContent = c.format + " · " + new Date(c.updatedAt).toLocaleDateString();
    item.appendChild(meta);
    const del = document.createElement("button"); del.className = "ci-del"; del.textContent = "✕";
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      if (confirm(t("deleteColConfirm", c.name || "Collection"))) { deleteCollection(c.id); renderCollectionList(); }
    });
    item.appendChild(del);
    item.addEventListener("click", () => openCollection(c.id));
    list.appendChild(item);
  });
}

document.getElementById("startCreateBtn").addEventListener("click", () => {
  const nameInput = document.getElementById("newColName");
  const name = (nameInput.value || "").trim() || t("defaultColName");
  createCollection(selectedFormat.cols, selectedFormat.rows, name);
  nameInput.value = "";
});
document.getElementById("startImportBtn").addEventListener("click", () => {
  importFileInput.value = ""; importFileInput.click();
});
document.getElementById("homeBtn").addEventListener("click", () => {
  if (currentId) { save(); }
  if (confirm(t("homeConfirm"))) showStartScreen();
});

/* ============================================================================
   START / BOOT
   ========================================================================== */
function boot() {
  lang = detectLang();
  applyLang();
  applyCurrency(); applyExportPricesBtn(); applyMarkSeg();
  const lastId = localStorage.getItem(LAST_KEY);
  const idx = loadIndex();
  if (lastId && idx.find(c => c.id === lastId)) {
    openCollection(lastId);
  } else if (idx.length) {
    // es gibt Collections, aber keine zuletzt geöffnete -> Startscreen
    showStartScreen();
  } else {
    showStartScreen();
  }
}
boot();
