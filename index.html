<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Binder</title>

<!--
  ============================================================================
  POKÉMON BINDER — Digitaler Karten-Ordner
  ----------------------------------------------------------------------------
  Eine eigenständige Single-Page-App. Einfach diese Datei im Browser öffnen.
  Kein Server, kein Internet, keine externen Bibliotheken nötig.

  Aufbau dieser Datei:
    1. <style>  — gesamtes Design (Ordner-Optik, Grids, Bank, Modals, Toolbar)
    2. <body>   — minimales HTML-Gerüst, der Inhalt wird per JS erzeugt
    3. <script> — die komplette Logik (State, Rendering, Drag&Drop, Export…)

  Wichtige Konzepte in dieser Version:
    - Jede Karten-Seite ist ein "A4-Blatt": Das Hintergrundbild liegt HINTER
      dem 3x3-Raster (nicht hinter dem ganzen Ordner). Pro Seite eigenes Bild.
    - Unter dem Ordner gibt es eine "Bank" mit 8 Ablageplätzen, um Karten
      zwischenzuparken und so bequem seitenübergreifend umzusortieren.
    - Karten werden über eine LOCATION-ID adressiert:
        "slot:<n>"  = Feld n im Ordner (durchgehend über alle Seiten)
        "bench:<n>" = Platz n auf der Bank
      Dadurch funktioniert Drag&Drop einheitlich in alle Richtungen.

  Speicherung:
    - Bei jeder Änderung wird der Zustand in localStorage gesichert.
    - "Exportieren" lädt alles (inkl. Bilder als Base64) als .json herunter.
    - "Importieren" stellt einen Ordner aus so einer .json wieder her.
  ============================================================================
-->

<style>
  /* ---------- Design-Tokens (Farben, Maße) ---------- */
  :root {
    --card-w: 156px;             /* Kartenbreite (Verhältnis 6,3:8,8), 50% größer */
    --card-h: 218px;             /* 156 * (8.8/6.3) ≈ 218 */
    --grid-gap: 12px;
    /* Quadratisches Blatt: Rasterhöhe = 3*218 + 2*12 = 678px -> Blatt 750x750 */
    --page-size: 750px;
    --page-pad: 22px;            /* (Restwert) */

    --leather-1: #3a2a1d;
    --leather-2: #241710;
    --page-bg: #efe7d6;          /* heller "Papier"-Ton der Innenseite (wenn kein Bild) */
    --page-bg-2: #e4d8c1;
    --slot-empty: rgba(255,255,255,.14);
    --slot-border: rgba(255,255,255,.35);

    --gold: #c9a24b;
    --accent: #d23b3b;           /* Akzentfarbe (Rot) */
    --ink: #2a2018;
    --toolbar-bg: rgba(20,14,9,.82);
    --shadow: 0 18px 40px rgba(0,0,0,.45);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #f4eede;
    /* Holztisch-Optik hinter dem ganzen Ordner */
    background-color: #6b4a2f;
    background-image:
      repeating-linear-gradient(92deg,
        rgba(0,0,0,.06) 0px, rgba(0,0,0,.06) 2px,
        rgba(255,255,255,.03) 2px, rgba(255,255,255,.03) 4px,
        transparent 4px, transparent 26px),
      repeating-linear-gradient(89deg,
        rgba(0,0,0,.04) 0px, rgba(0,0,0,.04) 3px, transparent 3px, transparent 60px),
      repeating-linear-gradient(0deg,
        rgba(0,0,0,.14) 0px, rgba(0,0,0,.14) 2px, transparent 2px, transparent 140px),
      radial-gradient(120% 100% at 50% 20%, #835835 0%, #6b4a2f 45%, #4a3220 100%);
    overflow: hidden;
  }

  /* ---------- Obere Toolbar ---------- */
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--toolbar-bg);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,.06);
    z-index: 50;
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    font-weight: 700; letter-spacing: .3px; margin-right: 6px;
    white-space: nowrap;
  }
  /* TCG-Emblem: kleines goldgerahmtes Wappen mit Monogramm */
  .emblem {
    width: 22px; height: 22px; border-radius: 6px; flex: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; letter-spacing: .5px; color: #1a130a;
    background: linear-gradient(160deg, #e7c976, #c9a24b 55%, #a07e2f);
    border: 1.5px solid rgba(0,0,0,.35);
    box-shadow: inset 0 1px 1px rgba(255,255,255,.5);
  }
  .brand small { font-weight: 400; opacity: .6; }
  .spacer { flex: 1; }

  .btn {
    appearance: none; border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06); color: #f4eede;
    padding: 8px 12px; border-radius: 9px; font-size: 13px;
    cursor: pointer; white-space: nowrap; transition: .15s;
  }
  .btn:hover { background: rgba(255,255,255,.14); }
  .btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .btn.primary { background: var(--accent); border-color: transparent; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.08); }

  /* cover/contain Umschalter */
  .seg { display: inline-flex; border: 1px solid rgba(255,255,255,.14); border-radius: 9px; overflow: hidden; }
  .seg button { border: 0; background: transparent; color: #f4eede; padding: 8px 11px; font-size: 12px; cursor: pointer; }
  .seg button.active { background: var(--gold); color: #1a130a; font-weight: 700; }

  /* Toolbar-Gruppen + Mehr-Menü */
  .toolbar-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .menu-wrap { position: relative; }
  .menu {
    position: absolute; top: calc(100% + 6px); right: 0; min-width: 230px;
    background: rgba(28,20,12,.98); border: 1px solid rgba(201,162,75,.35);
    border-radius: 10px; padding: 6px; z-index: 60;
    box-shadow: 0 12px 30px rgba(0,0,0,.5); display: none;
  }
  .menu.open { display: block; }
  .menu-item {
    display: block; width: 100%; text-align: left;
    background: transparent; border: 0; color: #f4eede;
    padding: 9px 12px; border-radius: 7px; font-size: 13px; cursor: pointer;
  }
  .menu-item:hover { background: rgba(255,255,255,.1); }
  .menu-sep { height: 1px; background: rgba(255,255,255,.1); margin: 5px 4px; }

  /* ---------- Bühne / Ordner ---------- */
  .stage {
    height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px;
    padding: 64px 156px 70px 24px;   /* rechts Platz für die Vorschau-Leiste */
    overflow: auto;
  }

  .binder {
    display: flex;
    perspective: 2600px;          /* für die Umblätter-Animation */
    position: relative;
    flex: none;
    /* Leder-Korpus, der etwas über die Seiten hinausragt (wie ein echter Ordner) */
    padding: 16px;
    border-radius: 16px;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.02) 0 3px, transparent 3px 7px),
      radial-gradient(140% 160% at 25% 15%, #7a4a2a, #5e3719 55%, #3f240f);
    box-shadow:
      var(--shadow),
      inset 0 0 0 2px rgba(0,0,0,.35),
      inset 0 0 0 3px rgba(201,162,75,.18);
  }
  /* umlaufende Ziernaht des Ledereinbands */
  .binder::before {
    content: ""; position: absolute; inset: 8px; border-radius: 12px;
    border: 2px dashed rgba(228,205,150,.35);
    pointer-events: none; z-index: 30;
  }

  /* Eine Ordnerhälfte (linke oder rechte Seite) — quadratisches Blatt */
  .side {
    width: var(--page-size);
    height: var(--page-size);
    min-height: var(--page-size);
    position: relative;
    transform-style: preserve-3d;
    display: flex; align-items: center; justify-content: center;  /* Raster mittig */
    /* cremefarbenes "Papier"; wird von .page-bg-layer überlagert, wenn ein Bild gesetzt ist */
    background:
      linear-gradient(160deg, #fbf6ea, #f0e7d2);
    overflow: hidden;
  }
  /* die Falz-Seite bekommt minimal mehr Rand für die Bindung */
  .side.right { padding-left: 10px; }
  .side.left  { padding-right: 10px; }
  .side.left  { border-radius: 10px 4px 4px 10px; box-shadow: inset -30px 0 42px -26px rgba(60,40,20,.6); }
  .side.right { border-radius: 4px 10px 10px 4px; box-shadow: inset  30px 0 42px -26px rgba(60,40,20,.6); }
  /* feiner Doppelrahmen auf den Seiten (wie im Referenzbild) */
  .side::before {
    content: ""; position: absolute; inset: 14px; z-index: 1;
    border: 1px solid rgba(120,90,50,.45);
    box-shadow: 0 0 0 3px rgba(120,90,50,.12);
    pointer-events: none; border-radius: 3px;
  }
  /* wenn ein Seiten-Hintergrundbild aktiv ist, Rahmen heller halten */
  .side.has-bg::before { border-color: rgba(255,255,255,.5); box-shadow: 0 0 0 3px rgba(255,255,255,.15); }

  /* gestanzte Lochreihe, durch die die Ringe greifen (am Falz-Rand der Seite) */
  .punch {
    position: absolute; top: 0; bottom: 0; width: 30px; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-around; padding: 30px 0; pointer-events: none;
  }
  .side.right .punch { left: 8px; }
  .side.left  .punch { right: 8px; }
  .hole {
    width: 14px; height: 14px; border-radius: 50%;
    /* gestanztes Loch: dunkle Mitte, leichter Prägerand */
    background: radial-gradient(circle at 50% 40%, #cfc3a8, #ad9f7f 70%, #87795c);
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,.6),
      inset 0 -1px 1px rgba(255,255,255,.5),
      0 1px 0 rgba(255,255,255,.45);
  }

  /* Das Hintergrundbild EINER Seite (liegt hinter dem Raster, innerhalb des "Blatts") */
  .page-bg-layer {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    z-index: 0;
  }
  .page-bg-layer::after {  /* leichte Abdunklung für Kartenkontrast */
    content: ""; position: absolute; inset: 0; background: rgba(0,0,0,.18);
  }

  /* ===== Mittelfalz wie bei einem gebundenen Buch =====
     Dunkle, leicht eingesenkte Rille zwischen den Seiten mit weichem
     Schattenverlauf nach beiden Seiten. */
  .spine {
    width: 30px; flex: none; position: relative; z-index: 25;
    background:
      linear-gradient(90deg,
        rgba(0,0,0,.05) 0%,
        rgba(0,0,0,.35) 28%,
        rgba(0,0,0,.55) 50%,
        rgba(0,0,0,.35) 72%,
        rgba(0,0,0,.05) 100%);
  }
  /* feine Mittellinie der Bindung */
  .spine::before {
    content: ""; position: absolute; top: 0; bottom: 0; left: 50%;
    width: 2px; transform: translateX(-50%);
    background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,.5) 12%, rgba(0,0,0,.5) 88%, rgba(0,0,0,0));
  }

  /* Die Leder-Innenseite des Deckels (erste Ansicht, links) */
  .cover-inner {
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.018) 0 2px, transparent 2px 6px),
      radial-gradient(130% 150% at 28% 18%, #6a4324, #4a2f17 55%, #321f0d);
    display: flex; align-items: center; justify-content: center;
    color: #e4cd96;
    box-shadow: inset -26px 0 42px -22px rgba(0,0,0,.75);
  }
  .cover-inner.right { box-shadow: inset 26px 0 42px -22px rgba(0,0,0,.75); }
  /* auf dem Leder-Deckel keinen hellen Papier-Rahmen zeichnen */
  .cover-inner::before { border-color: rgba(228,205,150,.22); box-shadow: none; inset: 18px; }
  .cover-plate {
    text-align: center; padding: 30px;
    border: 1px solid rgba(201,162,75,.4);
    border-radius: 10px;
    background: rgba(0,0,0,.12);
    box-shadow: 0 0 0 6px rgba(201,162,75,.06);
    max-width: 80%;
  }
  .cover-plate .pb { width: 56px; height: 56px; margin: 0 auto 14px; font-size: 20px; border-radius: 12px; }
  .cover-plate h2 {
    margin: 0 0 6px; font-size: 22px; letter-spacing: 3px;
    color: var(--gold); text-transform: uppercase; outline: none;
    min-width: 40px;
  }
  .cover-plate p { margin: 0; font-size: 12px; opacity: .8; letter-spacing: 1px; outline: none; min-width: 40px; }
  /* editierbare Felder: dezenter Hinweis beim Hovern/Fokus */
  .editable:hover { background: rgba(201,162,75,.12); border-radius: 4px; }
  .editable:focus { background: rgba(201,162,75,.18); border-radius: 4px; }
  .cover-hint { margin-top: 16px; font-size: 10px; opacity: .45; letter-spacing: .5px; }
  .cover-plate .line { width: 60%; height: 1px; background: rgba(201,162,75,.4); margin: 14px auto; }

  /* ---------- 3x3 Grid ---------- */
  .grid {
    position: relative; z-index: 2;          /* über page-bg-layer (0) und Rahmen (1) */
    display: grid;
    grid-template-columns: repeat(var(--cols, 3), var(--card-w));
    grid-template-rows: repeat(var(--rows, 3), var(--card-h));
    gap: var(--grid-gap);
    justify-content: center;
  }
  .page-label {
    position: absolute; bottom: 6px; z-index: 1;
    font-size: 11px; color: #fff; opacity: .7; letter-spacing: .5px;
    text-shadow: 0 1px 3px rgba(0,0,0,.6);
  }
  .side.left  .page-label { left: 14px; }
  .side.right .page-label { right: 14px; }

  /* Einzelnes Kartenfeld */
  .slot {
    width: var(--card-w); height: var(--card-h);
    border-radius: 8px;
    background: var(--slot-empty);
    border: 1.5px dashed var(--slot-border);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden;
    transition: border-color .15s, transform .12s, box-shadow .15s;
  }
  .slot:hover { border-color: var(--gold); }
  .slot .plus { font-size: 26px; color: rgba(255,255,255,.55); font-weight: 300; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
  .slot.filled { border-style: solid; border-color: rgba(0,0,0,.25); cursor: grab; background: #1a1a1a; }
  .slot.filled:active { cursor: grabbing; }
  .slot img {
    width: 100%; height: 100%; display: block;
    object-fit: cover;            /* Standard; per Umschalter -> contain */
    pointer-events: none;
  }
  body.fit-contain .slot img { object-fit: contain; }

  /* Drag-Zustände */
  .slot.dragover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(210,59,59,.35); transform: scale(1.02); }
  .slot.dragging { opacity: .35; }

  /* Lösch-Button (X) erscheint beim Hovern auf belegter Karte */
  .slot .del {
    position: absolute; top: 5px; right: 5px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,.62); color: #fff; border: 0;
    font-size: 14px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    pointer-events: auto; z-index: 4;
  }
  .slot.filled:hover .del { display: flex; }
  .slot .del:hover { background: var(--accent); }

  /* Duplizieren-Knopf (erscheint beim Hovern, neben dem X) */
  .slot .dup {
    position: absolute; top: 5px; right: 31px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,.62); color: #fff; border: 0;
    font-size: 13px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    pointer-events: auto; z-index: 4;
  }
  .slot.filled:hover .dup { display: flex; }
  .slot .dup:hover { background: var(--gold); color: #1a130a; }

  /* Preis-Knopf (unten links, beim Hovern) */
  .slot .price-btn {
    position: absolute; bottom: 5px; left: 5px;
    min-width: 22px; height: 22px; padding: 0 6px; border-radius: 11px;
    background: rgba(0,0,0,.62); color: #fff; border: 0;
    font-size: 13px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    pointer-events: auto; z-index: 4;
  }
  .slot.filled:hover .price-btn { display: flex; }
  .slot .price-btn:hover { background: var(--gold); color: #1a130a; }
  /* Preis-Badge (immer sichtbar, wenn Preis gesetzt) unten mittig */
  .slot .price-badge {
    position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.72); color: #ffe9a8; border: 1px solid rgba(201,162,75,.5);
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    z-index: 3; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  /* Seitensumme unten am Blatt */
  .page-sum {
    position: absolute; bottom: 6px; right: 12px; z-index: 3;
    background: rgba(20,14,9,.82); color: #ffe9a8;
    border: 1px solid rgba(201,162,75,.5);
    font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 10px;
    box-shadow: 0 1px 5px rgba(0,0,0,.4); letter-spacing: .3px;
  }

  /* ---------- Markier-Modus: farbige Ränder + Umschalt-Knopf ---------- */
  /* Nur sichtbar, wenn der Modus aktiv ist. Sonst KEINE Spuren am Design. */
  .slot.mark.mark-owned   { box-shadow: 0 0 0 3px #36b34a, 0 0 12px rgba(54,179,74,.5); border-color: #36b34a; }
  .slot.mark.mark-missing { box-shadow: 0 0 0 3px #e23b3b, 0 0 12px rgba(226,59,59,.5); border-color: #e23b3b; }
  .mark-toggle {
    position: absolute; top: 5px; left: 5px; z-index: 5;
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid #fff; cursor: pointer;
    font-size: 13px; line-height: 1; color: #fff; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  .mark-toggle.is-owned   { background: #36b34a; }
  .mark-toggle.is-missing { background: #e23b3b; }
  .mark-toggle:hover { transform: scale(1.1); }

  /* Seiten-Werkzeuge oben (Bild setzen / entfernen / als Bild exportieren) */
  .page-tools {
    position: absolute; top: 8px; z-index: 3;
    display: flex; gap: 6px; opacity: 0; transition: opacity .15s;
  }
  .side.left  .page-tools { left: 10px; }
  .side.right .page-tools { right: 10px; }
  .side:hover .page-tools { opacity: 1; }
  .page-tools button {
    font-size: 11px; background: rgba(0,0,0,.6); color: #fff; border: 0;
    padding: 5px 9px; border-radius: 7px; cursor: pointer;
  }
  .page-tools button:hover { background: var(--accent); }

  /* ---------- Ablage-Bank unter dem Ordner ---------- */
  .bench {
    flex: none;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    background: rgba(20,14,9,.55);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px;
    padding: 12px 16px;
    backdrop-filter: blur(6px);
  }
  .bench-title { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; opacity: .6; }
  .bench-row { display: flex; gap: 10px; }
  /* Bank-Plätze: gleiche Proportion wie Karten, aber kleiner */
  .bench .slot {
    width: 72px; height: 100px;   /* 72 * 8.8/6.3 ≈ 100 */
  }
  .bench .slot .plus { font-size: 20px; }

  /* ---------- Vorschau-Leiste aller Seiten (rechts) ---------- */
  .preview-rail {
    position: fixed; top: 56px; right: 0; bottom: 52px; width: 132px;
    background: rgba(20,14,9,.78); backdrop-filter: blur(10px);
    border-left: 1px solid rgba(255,255,255,.08);
    z-index: 46; display: flex; flex-direction: column;
  }
  .preview-rail-title {
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    opacity: .6; text-align: center; padding: 8px 0 6px;
  }
  .preview-list { flex: 1; overflow-y: auto; padding: 4px 10px 12px; }
  /* ein Doppelseiten-Vorschaupaar */
  .pv-spread {
    display: flex; gap: 3px; margin-bottom: 8px; cursor: pointer;
    border: 2px solid transparent; border-radius: 6px; padding: 3px;
    background: rgba(255,255,255,.04); transition: border-color .15s, background .15s;
  }
  .pv-spread:hover { background: rgba(255,255,255,.1); }
  .pv-spread.active { border-color: var(--gold); }
  .pv-spread.dragging { opacity: .4; }
  .pv-spread.dragover { border-color: var(--accent); }
  .pv-page {
    flex: 1; aspect-ratio: 1 / 1; border-radius: 3px;
    background-size: cover; background-position: center;
    display: grid; grid-template-columns: repeat(var(--cols,3),1fr); grid-template-rows: repeat(var(--rows,3),1fr);
    gap: 1px; padding: 3px; overflow: hidden;
  }
  .pv-page.cover { background: radial-gradient(120% 130% at 30% 20%, #6a4324, #3a230f); }
  .pv-cell { background: rgba(255,255,255,.12); border-radius: 1px; background-size: cover; background-position: center; }
  .pv-del {
    position: absolute; top: 2px; right: 2px; z-index: 5;
    width: 18px; height: 18px; border-radius: 50%; border: 0;
    background: rgba(0,0,0,.6); color: #fff; font-size: 11px; line-height: 1;
    cursor: pointer; display: none; align-items: center; justify-content: center;
  }
  .pv-page:hover .pv-del { display: flex; }
  .pv-del:hover { background: var(--accent); }
  .pv-label { font-size: 9px; opacity: .55; text-align: center; margin-top: -4px; margin-bottom: 6px; }

  /* ---------- Ordner-Frame + seitliche Blätter-Pfeile ---------- */
  .stage-inner { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .binder-frame { position: relative; display: inline-flex; }

  .side-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(20,14,9,.78); color: #f4eede;
    border: 1px solid rgba(201,162,75,.45);
    font-size: 24px; cursor: pointer; z-index: 45;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    transition: background .15s, transform .15s, opacity .15s;
    box-shadow: 0 6px 18px rgba(0,0,0,.4);
  }
  .side-nav:hover:not(:disabled) { background: var(--accent); transform: translateY(-50%) scale(1.08); }

function t(key, ...args) {
  const v = (TEXTS[lang] && TEXTS[lang][key]) ?? (TEXTS.de[key]);
  return typeof v === "function" ? v(...args) : v;
}
function detectLang() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem("pokemon-binder-v2") || "{}").lang; } catch(e){ return null; } })();
  if (saved === "de" || saved === "en") return saved;
  const nav = (navigator.language || "en").toLowerCase();
  return nav.startsWith("de") ? "de" : "en";
}

   ----------------------------------------------------------------------------
   - INDEX_KEY: Liste aller Collections [{id, name, format, updatedAt}]

   - LAST_KEY: id der zuletzt geöffneten Collection
   - LANG_KEY: zuletzt gewählte Sprache (global, collection-übergreifend)
   ========================================================================== */
const INDEX_KEY = "tcg-binder-collections";
const COL_PREFIX = "tcg-binder-col:";
const LAST_KEY = "tcg-binder-last";
const LANG_KEY = "tcg-binder-lang";

function loadIndex() {
  try { return JSON.parse(localStorage.getItem(INDEX_KEY) || "[]"); }
  catch (e) { return []; }
}
function saveIndex(list) { localStorage.setItem(INDEX_KEY, JSON.stringify(list)); }

function newId() { return "c" + Date.now() + Math.floor(Math.random() * 1000); }

/* Standardzustand für eine neue Collection mit gegebenem Format */
function freshState(cols, rows, name) {
  const per = cols * rows;
  return {
    slots: new Array(per * 6).fill(null),
    bench: new Array(BENCH_SIZE).fill(null),
    pageBg: {}, pages: 6, spread: 0, fit: "cover",
    coverTitle: "My Collection", coverSub: t("coverSubtitle"),
    owned: {}, appBg: null, prices: {}, currency: "EUR",
    showPricesInExport: false, exportLogo: null, exportName: "",
    lang: lang, cols: cols, rows: rows, name: name || "Collection",
  };
}

/* Aktuelle Collection speichern (Zustand + Index aktualisieren) */
function save() {
  if (!currentId) return;
  try {
    state.lang = lang;
    localStorage.setItem(COL_PREFIX + currentId, JSON.stringify(state));
    localStorage.setItem(LAST_KEY, currentId);
    localStorage.setItem(LANG_KEY, lang);
    // Index aktualisieren
    const list = loadIndex();
    const entry = { id: currentId, name: state.name || "Collection",
                    format: (state.cols || 3) + "×" + (state.rows || 3),
                    updatedAt: Date.now() };
    const i = list.findIndex(c => c.id === currentId);
    if (i >= 0) list[i] = entry; else list.push(entry);
    saveIndex(list);
  } catch (e) { toast(t("storageFull")); console.warn(e); }
}

/* Eine Collection per id öffnen */
function openCollection(id) {
  try {
    const raw = localStorage.getItem(COL_PREFIX + id);
    if (!raw) { toast(t("importFail")); return false; }
    state = JSON.parse(raw);
    currentId = id;
    normalize();
    if (state.lang === "de" || state.lang === "en") setLang(state.lang, false);
    hideStartScreen();
    applyAppBg(); applyCurrency(); applyExportPricesBtn(); applyMarkSeg();
    render();
    return true;
  } catch (e) { toast(t("importFail")); console.warn(e); return false; }
}

/* Neue Collection anlegen und öffnen */
function createCollection(cols, rows, name) {
  currentId = newId();
  state = freshState(cols, rows, name);
  normalize();
  save();
  hideStartScreen();
  applyAppBg(); applyCurrency(); applyExportPricesBtn(); applyMarkSeg();
  render();
}

/* Eine Collection löschen */
function deleteCollection(id) {
  localStorage.removeItem(COL_PREFIX + id);
  const list = loadIndex().filter(c => c.id !== id);
  saveIndex(list);
  if (currentId === id) currentId = null;
}

function normalize() {
  if (!state.cols) state.cols = 3;
  if (!state.rows) state.rows = 3;
  SLOTS_PER_PAGE = state.cols * state.rows;   // global aktualisieren
  const per = SLOTS_PER_PAGE;
  const need = state.pages * per;
  while (state.slots.length < need) state.slots.push(null);
  state.slots.length = need;
  if (!Array.isArray(state.bench)) state.bench = [];
  while (state.bench.length < BENCH_SIZE) state.bench.push(null);
  state.bench.length = BENCH_SIZE;
  if (!state.pageBg || typeof state.pageBg !== "object") state.pageBg = {};
  if (!state.owned || typeof state.owned !== "object") state.owned = {};
  if (!state.prices || typeof state.prices !== "object") state.prices = {};
  if (state.currency !== "USD" && state.currency !== "EUR") state.currency = "EUR";
}

/* ---- Karten-Zugriff über LOCATION-ID ---- */
function getCard(loc) {
  const [kind, n] = loc.split(":"); const i = +n;
  return kind === "bench" ? state.bench[i] : state.slots[i];
}
function setCard(loc, val) {
  const [kind, n] = loc.split(":"); const i = +n;
  if (kind === "bench") state.bench[i] = val; else state.slots[i] = val;
}

/* ---- Preis-Helfer ---- */
function currencySymbol() { return state.currency === "USD" ? "$" : "€"; }
function formatPrice(v) {
  if (v == null || isNaN(v)) return "";
  const s = Number(v).toLocaleString(state.currency === "USD" ? "en-US" : "de-DE",
    { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return state.currency === "USD" ? "$" + s : s + " €";
}
/* Summe aller Kartenpreise einer Karten-Seite */
function pageSum(pageIndex) {
  const base = pageIndex * SLOTS_PER_PAGE;
  let sum = 0, any = false;
  for (let i = 0; i < SLOTS_PER_PAGE; i++) {
    const p = state.prices[base + i];
    if (p != null && !isNaN(p)) { sum += Number(p); any = true; }
  }
  return any ? sum : null;
}

/* Preis einer Ordner-Karte eintragen/ändern (leer lässt den Preis löschen) */
function editPrice(slotIndex) {
  const cur = state.prices[slotIndex];
  const input = prompt(
    t("pricemsg", state.currency === "USD" ? "USD ($)" : "EUR (€)"),
    cur != null ? String(cur) : ""
  );
  if (input === null) return;                    // abgebrochen
  const trimmed = input.trim().replace(",", "."); // Komma als Dezimaltrennzeichen erlauben
  if (trimmed === "") { delete state.prices[slotIndex]; }
  else {
    const v = parseFloat(trimmed);
    if (isNaN(v) || v < 0) { toast(t("invalidPrice")); return; }
    state.prices[slotIndex] = Math.round(v * 100) / 100;
  }
  save(); render();
}

/* Karte duplizieren: kopiert das Bild in den nächsten freien Platz.
   Suchreihenfolge: Ordner-Felder ab der Quelle -> übrige Ordner-Felder ->
   Bank. Ist alles voll, werden zwei neue Seiten angehängt. */
function duplicateCard(loc) {
  const img = getCard(loc);
  if (!img) return;

  const total = state.pages * SLOTS_PER_PAGE;
  const startIdx = loc.startsWith("slot:") ? (+loc.split(":")[1] + 1) : 0;

  // 1) freier Ordner-Slot ab Quelle, dann umlaufend vom Anfang
  for (let k = 0; k < total; k++) {
    const idx = (startIdx + k) % total;
    if (!state.slots[idx]) { state.slots[idx] = img; save(); render(); toast(t("dupToast", Math.floor(idx / SLOTS_PER_PAGE) + 1)); return; }
  }
  // 2) freier Bank-Platz
  for (let i = 0; i < BENCH_SIZE; i++) {
    if (!state.bench[i]) { state.bench[i] = img; save(); render(); toast(t("dupBench")); return; }
  }
  // 3) alles voll -> zwei neue Seiten, Kopie auf erstes neues Feld
  const firstNew = total;
  state.pages += 2; normalize();
  state.slots[firstNew] = img;
  save(); render();
  toast(t("dupNewPage"));
}

/* ============================================================================
   BILD-KOMPRIMIERUNG (max. Breite, JPEG) — hält Speicher klein
   ========================================================================== */
function compressImage(file, maxW = 600, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject; img.src = reader.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

/* ============================================================================
   RENDERING
   ========================================================================== */
const binder = document.getElementById("binder");
const benchRow = document.getElementById("benchRow");

function leftPageIndexForSpread(spread)  { return spread === 0 ? -1 : spread * 2 - 1; }
function rightPageIndexForSpread(spread) { return spread === 0 ? 0  : spread * 2; }

function render() {
  normalize();
  applyFormatVars();
  binder.innerHTML = "";

  const leftPage  = leftPageIndexForSpread(state.spread);
  const rightPage = rightPageIndexForSpread(state.spread);

  // linke Hälfte
  binder.appendChild(leftPage === -1 ? makeCoverInner("left") : makePage(leftPage, "left"));
  // Mittelfalz wie bei einem gebundenen Buch (keine Ringe)
  const spine = document.createElement("div"); spine.className = "spine";
  binder.appendChild(spine);
  // rechte Hälfte
  binder.appendChild(rightPage < state.pages ? makePage(rightPage, "right") : makeCoverInner("right"));

  renderBench();
  renderPreviewRail();
  updatePager();
  applyFitClass();
  fitBinder();
}

/* Setzt CSS-Variablen für das aktuelle Rasterformat (Spalten/Zeilen) und
   berechnet die Kartengröße so, dass das Raster ins quadratische Blatt passt.
   Das Kartenseitenverhältnis (6,3:8,8) bleibt dabei immer erhalten. */
function applyFormatVars() {
  const cols = state.cols || 3, rows = state.rows || 3;
  const root = document.documentElement;
  root.style.setProperty("--cols", cols);
  root.style.setProperty("--rows", rows);

  const PAGE = 750;          // Blattgröße in px (entspricht --page-size)
  const PAD = 40;            // Rand ums Raster
  const GAP = 12;            // Lücke zwischen Karten
  const avail = PAGE - PAD * 2;
  const RATIO = 8.8 / 6.3;   // Höhe/Breite einer Karte
  // Kartenbreite, begrenzt durch Breite UND Höhe
  const wByWidth = (avail - GAP * (cols - 1)) / cols;
  const hByHeight = (avail - GAP * (rows - 1)) / rows;
  let cardW = Math.min(wByWidth, hByHeight / RATIO);
  let cardH = cardW * RATIO;
  root.style.setProperty("--card-w", cardW + "px");
  root.style.setProperty("--card-h", cardH + "px");
  root.style.setProperty("--grid-gap", GAP + "px");
}

/* Leder-Innenseite des Deckels mit editierbarem Text */
function makeCoverInner(sideClass) {
  const el = document.createElement("div");
  el.className = "side " + sideClass + " cover-inner";

  // Nur der LINKE Deckel (spread 0) trägt den editierbaren Text.
  if (sideClass === "left") {
    const plate = document.createElement("div");
    plate.className = "cover-plate";

    const pb = document.createElement("div"); pb.className = "emblem pb"; pb.textContent = "TCG"; plate.appendChild(pb);

    const h2 = document.createElement("h2");
    h2.className = "editable"; h2.contentEditable = "true"; h2.spellcheck = false;
    h2.textContent = state.coverTitle || "";
    h2.title = t("editHint");
    h2.addEventListener("blur", () => { state.coverTitle = h2.textContent.trim() || "My Collection"; save(); });
    h2.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); h2.blur(); } });
    plate.appendChild(h2);

    const line = document.createElement("div"); line.className = "line"; plate.appendChild(line);

    const p = document.createElement("p");
    p.className = "editable"; p.contentEditable = "true"; p.spellcheck = false;
    p.textContent = state.coverSub || "";
    p.title = t("editHint");
    p.addEventListener("blur", () => { state.coverSub = p.textContent.trim(); save(); });
    p.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); p.blur(); } });
    plate.appendChild(p);

    const hint = document.createElement("div");
    hint.className = "cover-hint"; hint.textContent = t("coverHint");
    plate.appendChild(hint);

    el.appendChild(plate);
  }
  return el;
}

/* Lochreihe (6 gestanzte Löcher) am Falz-Rand einer Seite */
function makePunchStrip() {
  const strip = document.createElement("div");
  strip.className = "punch";
  for (let i = 0; i < 6; i++) {
    const h = document.createElement("div"); h.className = "hole";
    strip.appendChild(h);
  }
  return strip;
}

/* Eine Karten-Seite (3x3) mit eigenem Hintergrundbild + Werkzeugen */
function makePage(pageIndex, sideClass) {
  const side = document.createElement("div");
  side.className = "side " + sideClass;

  // Hintergrundbild-Ebene (nur wenn für diese Seite eines gesetzt ist)
  const bg = state.pageBg[pageIndex];
  if (bg) {
    side.classList.add("has-bg");
    const layer = document.createElement("div");
    layer.className = "page-bg-layer";
    layer.style.backgroundImage = `url(${bg})`;
    side.appendChild(layer);
  }

  // gestanzte Lochreihe am Falz-Rand
  // gestanzte Lochreihe entfällt (Buchfalz statt Ringmechanik)

  // Werkzeuge: Seiten-Hintergrund setzen / entfernen / als Bild exportieren
  const tools = document.createElement("div");
  tools.className = "page-tools";

  const bgBtn = document.createElement("button");
  bgBtn.textContent = bg ? t("pageBgChange") : t("pageBg");
  bgBtn.title = t("pageBgTitle");
  bgBtn.addEventListener("click", (e) => { e.stopPropagation(); pickPageBg(pageIndex); });
  tools.appendChild(bgBtn);

  if (bg) {
    const clr = document.createElement("button");
    clr.textContent = t("pageBgClear");
    clr.title = t("pageBgClearTitle");
    clr.addEventListener("click", (e) => { e.stopPropagation(); delete state.pageBg[pageIndex]; save(); render(); });
    tools.appendChild(clr);
  }

  const snap = document.createElement("button");
  snap.textContent = t("pageExport");
  snap.title = t("pageExportTitle");
  snap.addEventListener("click", (e) => { e.stopPropagation(); exportPageImage(pageIndex); });
  tools.appendChild(snap);

  side.appendChild(tools);

  // Grid
  const grid = document.createElement("div");
  grid.className = "grid";
  const base = pageIndex * SLOTS_PER_PAGE;
  for (let i = 0; i < SLOTS_PER_PAGE; i++) grid.appendChild(makeSlot("slot:" + (base + i)));
  side.appendChild(grid);

  // Seitensumme (nur wenn mindestens ein Preis gesetzt ist)
  const sum = pageSum(pageIndex);
  if (sum != null) {
    const sumEl = document.createElement("div");
    sumEl.className = "page-sum";
    sumEl.textContent = t("pageSumPrefix") + formatPrice(sum);
    sumEl.title = t("pageSumTitle");
    side.appendChild(sumEl);
  }

  return side;
}

/* Bank rendern */
function renderBench() {
  benchRow.innerHTML = "";
  for (let i = 0; i < BENCH_SIZE; i++) benchRow.appendChild(makeSlot("bench:" + i));
}

/* ============================================================================
   VORSCHAU-LEISTE (rechts): Mini-Abbild jeder Doppelseiten-Ansicht.
   - Klick springt zur Ansicht.
   - Drag&Drop tauscht zwei komplette Doppelseiten (alle 18 Karten inkl.
     Hintergründe und Markierungen).
   ========================================================================== */
const previewList = document.getElementById("previewList");

// Karten-Seitenindizes, die ein bestimmter Spread anzeigt (ohne Deckel/Rückseite)
function pageIndicesForSpread(spread) {
  const left = leftPageIndexForSpread(spread);
  const right = rightPageIndexForSpread(spread);
  const arr = [];
  if (left >= 0 && left < state.pages) arr.push(left);
  if (right >= 0 && right < state.pages) arr.push(right);
  return arr;
}

function totalSpreads() {
  // höchster Spread, dessen linke/rechte Seite noch existiert
  let s = 0;
  while (pageIndicesForSpread(s + 1).length > 0) s++;
  return s; // 0..s
}

// Mini-Abbild einer Karten-Seite (mit Lösch-X beim Hovern)
function makePvPage(pageIndex) {
  const pg = document.createElement("div");
  pg.className = "pv-page";
  pg.style.position = "relative";
  const bg = state.pageBg[pageIndex];
  if (bg) pg.style.backgroundImage = `url(${bg})`;
  const base = pageIndex * SLOTS_PER_PAGE;
  for (let i = 0; i < SLOTS_PER_PAGE; i++) {
    const cell = document.createElement("div");
    cell.className = "pv-cell";
    const img = state.slots[base + i];
    if (img) cell.style.backgroundImage = `url(${img})`;
    pg.appendChild(cell);
  }
  // Lösch-X (nur sichtbar, wenn mehr als 1 Seite existiert)
  if (state.pages > 1) {
    const x = document.createElement("button");
    x.className = "pv-del"; x.textContent = "✕"; x.title = t("pageDeleted");
    x.addEventListener("click", (e) => {
      e.stopPropagation();
      if (confirm(t("pageDeleteConfirm"))) deletePage(pageIndex);
    });
    pg.appendChild(x);
  }
  return pg;
}

/* Eine einzelne Karten-Seite löschen (Karten, Hintergrund, Preise, Status).
   Alle nachfolgenden Seiten rücken auf. */
function deletePage(pageIndex) {
  const per = SLOTS_PER_PAGE;
  // Slots der Seite herausschneiden
  state.slots.splice(pageIndex * per, per);
  // pageBg / prices / owned reindizieren (alles ab pageIndex bzw. dessen Slots verschiebt sich)
  const remapObjBySlot = (obj) => {
    const out = {};
    for (const k in obj) {
      const gi = +k;
      const pg = Math.floor(gi / per);
      if (pg === pageIndex) continue;            // gelöschte Seite
      const newGi = pg > pageIndex ? gi - per : gi;
      out[newGi] = obj[k];
    }
    return out;
  };
  state.prices = remapObjBySlot(state.prices);
  state.owned = remapObjBySlot(state.owned);
  // pageBg ist nach Seitenindex (nicht Slot)
  const newBg = {};
  for (const k in state.pageBg) {
    const p = +k;
    if (p === pageIndex) continue;
    newBg[p > pageIndex ? p - 1 : p] = state.pageBg[k];
  }
  state.pageBg = newBg;
  state.pages = Math.max(1, state.pages - 1);
  // Spread in gültigen Bereich bringen
  const maxS = totalSpreads();
  if (state.spread > maxS) state.spread = maxS;
  normalize(); save(); render();
  toast(t("pageDeleted"));
}

function renderPreviewRail() {
  if (!previewList) return;
  previewList.innerHTML = "";
  const maxS = totalSpreads();
  for (let s = 0; s <= maxS; s++) {
    const row = document.createElement("div");
    row.className = "pv-spread" + (s === state.spread ? " active" : "");
    row.dataset.spread = s;

    // Deckel-Ansicht (spread 0): links Leder, rechts Seite 1
    if (s === 0) {
      const cover = document.createElement("div"); cover.className = "pv-page cover";
      row.appendChild(cover);
      row.appendChild(makePvPage(0));
    } else {
      const idx = pageIndicesForSpread(s);
      idx.forEach(pi => row.appendChild(makePvPage(pi)));
      // falls nur eine Seite (Rückseite), Platzhalter ergänzen
      if (idx.length === 1) { const e = document.createElement("div"); e.className = "pv-page cover"; row.appendChild(e); }
    }

    // Klick -> zu dieser Ansicht springen
    row.addEventListener("click", () => { state.spread = s; save(); render(); });

    // Drag&Drop: ganze Doppelseiten tauschen (Deckel-Ansicht ausgenommen)
    if (s >= 1) {
      row.setAttribute("draggable", "true");
      row.addEventListener("dragstart", (e) => { pvDragSpread = s; row.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", "spread:" + s); });
      row.addEventListener("dragend", () => { row.classList.remove("dragging"); pvDragSpread = null; document.querySelectorAll(".pv-spread.dragover").forEach(x => x.classList.remove("dragover")); });
      row.addEventListener("dragover", (e) => { if (pvDragSpread !== null) { e.preventDefault(); row.classList.add("dragover"); } });
      row.addEventListener("dragleave", () => row.classList.remove("dragover"));
      row.addEventListener("drop", (e) => {
        e.preventDefault(); row.classList.remove("dragover");
        if (pvDragSpread !== null && pvDragSpread !== s) swapSpreads(pvDragSpread, s);
      });
    }

    const wrap = document.createElement("div");
    wrap.appendChild(row);
    const lbl = document.createElement("div"); lbl.className = "pv-label";
    lbl.textContent = s === 0 ? t("page") + " 1" : pageIndicesForSpread(s).map(i => i + 1).join("–");
    wrap.appendChild(lbl);
    previewList.appendChild(wrap);
  }
}

let pvDragSpread = null;

/* Tauscht die kompletten Inhalte zweier Doppelseiten (Karten, Hintergründe,
   Markierungen). Arbeitet seitenweise über die Karten-Seitenindizes. */
function swapSpreads(a, b) {
  const ia = pageIndicesForSpread(a), ib = pageIndicesForSpread(b);
  // paarweise tauschen (linke<->linke, rechte<->rechte)
  const n = Math.max(ia.length, ib.length);
  for (let k = 0; k < n; k++) {
    if (ia[k] === undefined || ib[k] === undefined) continue;
    swapPages(ia[k], ib[k]);
  }
  save(); render();
  toast(t("spreadSwapped"));
}

/* Tauscht zwei einzelne Karten-Seiten komplett. */
function swapPages(p1, p2) {
  const b1 = p1 * SLOTS_PER_PAGE, b2 = p2 * SLOTS_PER_PAGE;
  for (let i = 0; i < SLOTS_PER_PAGE; i++) {
    const t = state.slots[b1 + i]; state.slots[b1 + i] = state.slots[b2 + i]; state.slots[b2 + i] = t;
    // Besitz-Status mitnehmen
    const o1 = state.owned[b1 + i], o2 = state.owned[b2 + i];
    if (o2 === "missing") state.owned[b1 + i] = "missing"; else delete state.owned[b1 + i];
    if (o1 === "missing") state.owned[b2 + i] = "missing"; else delete state.owned[b2 + i];
  }
  // Seiten-Hintergründe tauschen
  const bg1 = state.pageBg[p1], bg2 = state.pageBg[p2];
  if (bg2 !== undefined) state.pageBg[p1] = bg2; else delete state.pageBg[p1];
  if (bg1 !== undefined) state.pageBg[p2] = bg1; else delete state.pageBg[p2];
}

/* ============================================================================
   AUTO-SKALIERUNG: Ordner immer in den sichtbaren Bereich einpassen.
   Der Ordner hat eine feste Pixelgröße; wir skalieren ihn per transform so,
   dass er samt Rand in Stage-Breite/Höhe passt (nie größer als 1:1).
   ========================================================================== */
function fitBinder() {
  const frame = document.getElementById("binderFrame");
  const stageInner = document.getElementById("stageInner");
  if (!frame || !stageInner) return;
  frame.style.transform = "scale(1)";   // erst zurücksetzen, dann messen
  const availW = window.innerWidth - 156 - 24 - 60;   // Leiste + Paddings + Pfeile
  const availH = window.innerHeight - 56 - 52 - 70 - 150; // Toolbar, Pager, Bank, Abstände
  const rect = frame.getBoundingClientRect();
  const scale = Math.min(1, availW / rect.width, availH / rect.height);
  frame.style.transform = "scale(" + scale.toFixed(3) + ")";
  frame.style.transformOrigin = "top center";
  // Höhe nach Skalierung kompensieren, damit Bank nicht überlappt
  frame.style.marginBottom = (rect.height * (scale - 1)) + "px";
}
window.addEventListener("resize", fitBinder);

/* Ein Feld (Ordner ODER Bank) — adressiert über LOCATION-ID */
function makeSlot(loc) {
  const slot = document.createElement("div");
  slot.className = "slot";
  slot.dataset.loc = loc;

  const isBinderSlot = loc.startsWith("slot:");
  const slotIndex = isBinderSlot ? +loc.split(":")[1] : null;

  // Markier-Modus: nur Ordner-Felder bekommen einen farbigen Status-Rand.
  // Standard = "owned" (grün); explizit als "missing" markierte Felder = rot.
  if (markMode && isBinderSlot) {
    const status = state.owned[slotIndex] === "missing" ? "missing" : "owned";
    slot.classList.add("mark", status === "missing" ? "mark-missing" : "mark-owned");
  }

  const img = getCard(loc);

  if (img) {
    slot.classList.add("filled");
    slot.setAttribute("draggable", "true");

    const im = document.createElement("img"); im.src = img; slot.appendChild(im);

    const del = document.createElement("button");
    del.className = "del"; del.textContent = "✕"; del.title = t("delCard");
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      setCard(loc, null);
      if (isBinderSlot) { delete state.prices[slotIndex]; delete state.owned[slotIndex]; }
      save(); render();
    });
    slot.appendChild(del);

    // Duplizieren: kopiert die Karte in den nächsten freien Platz
    const dup = document.createElement("button");
    dup.className = "dup"; dup.textContent = "⧉"; dup.title = t("dupCard");
    dup.addEventListener("click", (e) => { e.stopPropagation(); duplicateCard(loc); });
    slot.appendChild(dup);

    // Preis setzen (nur Ordner-Karten): kleiner Knopf unten links
    if (isBinderSlot) {
      const priceBtn = document.createElement("button");
      priceBtn.className = "price-btn"; priceBtn.textContent = currencySymbol();
      priceBtn.title = t("setPrice");
      priceBtn.addEventListener("click", (e) => { e.stopPropagation(); editPrice(slotIndex); });
      slot.appendChild(priceBtn);

      // vorhandenen Preis als Badge unten anzeigen
      const pv = state.prices[slotIndex];
      if (pv != null && !isNaN(pv)) {
        const badge = document.createElement("div");
        badge.className = "price-badge"; badge.textContent = formatPrice(pv);
        slot.appendChild(badge);
      }
    }

    slot.addEventListener("click", () => openModal(img));
  } else {
    const plus = document.createElement("div"); plus.className = "plus"; plus.textContent = "+";
    slot.appendChild(plus);
    slot.addEventListener("click", () => triggerUpload(loc));
  }

  // Im Markier-Modus: kleiner Umschalt-Knopf auf Ordner-Feldern (grün <-> rot).
  // Erscheint NUR im Modus, damit das normale Design ungestört bleibt.
  if (markMode && isBinderSlot) {
    const toggle = document.createElement("button");
    const isMissing = state.owned[slotIndex] === "missing";
    toggle.className = "mark-toggle " + (isMissing ? "is-missing" : "is-owned");
    toggle.textContent = isMissing ? "✕" : "✓";
    toggle.title = isMissing ? t("markMissingTitle") : t("markOwnedTitle");
    toggle.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isMissing) delete state.owned[slotIndex];   // zurück zu owned (Standard)
      else state.owned[slotIndex] = "missing";
      save(); render();
    });
    slot.appendChild(toggle);
  }

  attachDragAndDrop(slot, loc);
  return slot;
}

/* ============================================================================
   DRAG & DROP  (einheitlich über LOCATION-IDs)
   ----------------------------------------------------------------------------
   - Datei vom Desktop auf ein Feld  -> Upload dorthin
   - Karte von loc A auf loc B        -> Plätze TAUSCHEN (Ordner<->Ordner,
                                          Ordner<->Bank, Bank<->Bank)
   ========================================================================== */
let dragSourceLoc = null;

function attachDragAndDrop(slot, loc) {
  slot.addEventListener("dragstart", (e) => {
    if (!getCard(loc)) return;
    dragSourceLoc = loc;
    slot.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", loc);
  });
  slot.addEventListener("dragend", () => {
    slot.classList.remove("dragging");
    dragSourceLoc = null;
    document.querySelectorAll(".slot.dragover").forEach(s => s.classList.remove("dragover"));
  });
  slot.addEventListener("dragover", (e) => { e.preventDefault(); slot.classList.add("dragover"); });
  slot.addEventListener("dragleave", () => slot.classList.remove("dragover"));

  slot.addEventListener("drop", async (e) => {
    e.preventDefault();
    slot.classList.remove("dragover");

    // Datei vom Desktop?
    if (e.dataTransfer.files && e.dataTransfer.files.length) {
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("image/")) {
        setCard(loc, await compressImage(file)); save(); render();
      }
      return;
    }
    // vorhandene Karte verschieben/tauschen
    const src = dragSourceLoc || e.dataTransfer.getData("text/plain");
    if (src && src !== loc) {
      const a = getCard(src), b = getCard(loc);
      setCard(loc, a); setCard(src, b);     // Bilder tauschen
      // Preise + Markierungen mittauschen, aber nur für Ordner-Felder
      // (Bank hat keine Preise/Status). meta(loc) liefert Index oder null.
      const si = src.startsWith("slot:") ? +src.split(":")[1] : null;
      const ti = loc.startsWith("slot:") ? +loc.split(":")[1] : null;
      swapMeta(si, ti);
      save(); render();
    }
  });
}

/* Tauscht Preis + Besitz-Status zwischen zwei Slot-Indizes.
   null = Bank-Platz (hat keine Meta) -> Zielmeta wird dann geleert/gesetzt. */
function swapMeta(i, j) {
  const get = (idx, obj) => idx == null ? undefined : obj[idx];
  const pI = get(i, state.prices), pJ = get(j, state.prices);
  const oI = get(i, state.owned),  oJ = get(j, state.owned);
  // Preise
  if (i != null) { if (pJ !== undefined) state.prices[i] = pJ; else delete state.prices[i]; }
  if (j != null) { if (pI !== undefined) state.prices[j] = pI; else delete state.prices[j]; }
  // Status
  if (i != null) { if (oJ !== undefined) state.owned[i] = oJ; else delete state.owned[i]; }
  if (j != null) { if (oI !== undefined) state.owned[j] = oI; else delete state.owned[j]; }
}

   PAGINATION (immer zwei Seiten, mit Animation)
   ========================================================================== */
const posLabel = document.getElementById("pos");
function updatePager() {
  const left = leftPageIndexForSpread(state.spread);
  const right = rightPageIndexForSpread(state.spread);
  let txt;
  if (state.spread === 0) txt = t("cover") + " · " + t("page") + " 1";
  else txt = t("page") + " " + (left + 1) + " · " + (right < state.pages ? t("page") + " " + (right + 1) : t("backside"));
  posLabel.textContent = txt;

  const atStart = state.spread === 0;
  const atEnd = leftPageIndexForSpread(state.spread + 1) >= state.pages;
  document.getElementById("prevBtn").disabled = atStart;
  document.getElementById("nextBtn").disabled = atEnd;
  // seitliche Pfeile spiegeln denselben Status
  const sp = document.getElementById("sideNavPrev"), sn = document.getElementById("sideNavNext");
  if (sp) sp.disabled = atStart;
  if (sn) sn.disabled = atEnd;
}

/* Direkt zu einer Seitenzahl springen (1-basiert). Wählt den Spread,
   in dem diese Seite sichtbar ist. */
function goToPage(pageNumber) {
  let p = Math.round(pageNumber);
  if (isNaN(p)) return;
  p = Math.max(1, Math.min(state.pages, p));     // in gültigen Bereich klemmen
  const idx = p - 1;                              // 0-basiert
  // spread 0 zeigt Seite 1 (idx 0). Ab da: linke Seite = 2*spread-1.
  const spread = idx === 0 ? 0 : Math.ceil(idx / 2);
  state.spread = spread;
  save(); render();
  toast(t("jumpTo", p));
}

function flip(direction) {
  const target = direction === "next" ? state.spread + 1 : state.spread - 1;
  if (target < 0) return;
  if (direction === "next" && leftPageIndexForSpread(target) >= state.pages) return;

  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduce) { state.spread = target; save(); render(); return; }

  const flipEl = document.createElement("div");
  flipEl.className = "flip " + direction;
  binder.appendChild(flipEl);
  flipEl.addEventListener("animationend", () => { state.spread = target; save(); render(); }, { once: true });
}

/* ============================================================================
   EINFÜGEN AUS ZWISCHENABLAGE (Strg+V) — z. B. Bild aus Word kopiert.
   Das Bild landet im ersten freien Bank-Platz; ist die Bank voll, im ersten
   freien Ordner-Feld. So lassen sich Bilder schnell aus Word übernehmen.
   ========================================================================== */
window.addEventListener("paste", async (e) => {
  if (document.activeElement && document.activeElement.isContentEditable) return;
  const items = (e.clipboardData && e.clipboardData.items) || [];
  for (const it of items) {
    if (it.type && it.type.startsWith("image/")) {
      const file = it.getAsFile();
      if (!file) continue;
      e.preventDefault();
      const data = await compressImage(file);
      let placedBench = false;
      for (let i = 0; i < BENCH_SIZE; i++) {
        if (!state.bench[i]) { state.bench[i] = data; placedBench = true; break; }
      }
      if (!placedBench) {
        const total = state.pages * SLOTS_PER_PAGE;
        let placedSlot = false;
        for (let i = 0; i < total; i++) { if (!state.slots[i]) { state.slots[i] = data; placedSlot = true; break; } }
        if (!placedSlot) { state.pages += 2; normalize(); state.slots[(state.pages - 2) * SLOTS_PER_PAGE] = data; }
        save(); render(); toast(placedSlot ? t("pasteSlot") : t("pasteNewPage"));
      } else {
        save(); render(); toast(t("pasteBench"));
      }
      return;
    }
  }
});
document.addEventListener("keydown", (e) => {
  if (modal.classList.contains("open")) return;
  // nicht blättern, während man Deckel-Text bearbeitet
  if (document.activeElement && document.activeElement.isContentEditable) return;
  if (e.key === "ArrowRight") flip("next");
  if (e.key === "ArrowLeft")  flip("prev");
});

  state.pages += 2; normalize(); save(); render(); toast(t("pagesAdded"));
});

/* Logo komprimieren, aber als PNG (Transparenz erhalten) */
function compressLogo(file, maxW = 600) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/png"));
      };
      img.onerror = reject; img.src = reader.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

/* ============================================================================
   BILD-EXPORT EINER 9er-SEITE  (1080×1080, immer gleiches Layout)
   ----------------------------------------------------------------------------
   Verwendet das Hintergrundbild GENAU DIESER Seite. So sieht der Export aus
   wie das, was man im Ordner sieht: Bild als Blatt-Hintergrund + 3x3-Raster.
   ========================================================================== */
function exportPageImage(pageIndex) {
  const W = 1080, H = 1350;                // Hochformat (Instagram-Portrait)
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  const loadImg = (src) => new Promise((res) => {
    if (!src) return res(null);
    const i = new Image(); i.onload = () => res(i); i.onerror = () => res(null); i.src = src;
  });

  const CARD_RATIO = 8.8 / 6.3;            // Höhe/Breite einer Karte
  const cols = state.cols || 3, rows = state.rows || 3;
  const MARGIN = Math.round(W * 0.06);     // seitlicher Grundrand
  const GAP = Math.round(W * 0.02);
  // feste Zonen oben (Logo) und unten (Summe)
  const topZone = Math.round(H * 0.1);     // Logo-Bereich
  const bottomZone = Math.round(H * 0.11); // Summen-Bereich
  // verfügbare Fläche fürs Raster
  const availGridH = H - topZone - bottomZone - MARGIN;
  const availGridW = W - MARGIN * 2;
  // Kartengröße: limitiert durch Breite UND Höhe, kleinerer Wert gewinnt
  const cardHByHeight = (availGridH - GAP * (rows - 1)) / rows;
  const cardWByWidth  = (availGridW - GAP * (cols - 1)) / cols;
  let cardW = Math.min(cardWByWidth, cardHByHeight / CARD_RATIO);
  let cardH = cardW * CARD_RATIO;
  const gridW = cardW * cols + GAP * (cols - 1);
  const gridH = cardH * rows + GAP * (rows - 1);
  const startX = (W - gridW) / 2;          // horizontal zentriert
  // Raster vertikal in der Zone zwischen Logo und Summe zentrieren
  const startY = topZone + ((H - topZone - bottomZone) - gridH) / 2;

  const base = pageIndex * SLOTS_PER_PAGE;
  const sources = [];
  for (let i = 0; i < SLOTS_PER_PAGE; i++) sources.push(state.slots[base + i]);

  Promise.all([loadImg(state.pageBg[pageIndex]), loadImg(state.exportLogo), ...sources.map(loadImg)]).then((imgs) => {
    const bgImg = imgs[0], logoImg = imgs[1], cardImgs = imgs.slice(2);

    // Hintergrund über die volle Fläche
    if (bgImg) {
      drawCover(ctx, bgImg, 0, 0, W, H);
      ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.fillRect(0, 0, W, H);
    } else {
      const g = ctx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0, "#fbf6ea"); g.addColorStop(1, "#e9dcc2");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    }

    // --- Logo/Name oben (Wasserzeichen), in der topZone zentriert ---
    const headerY = topZone / 2;
    if (logoImg) {
      const maxLogoH = W * 0.1, maxLogoW = W * 0.5;
      let lw = logoImg.width, lh = logoImg.height;
      const scale = Math.min(maxLogoW / lw, maxLogoH / lh);
      lw *= scale; lh *= scale;
      ctx.globalAlpha = 0.95;
      ctx.drawImage(logoImg, (W - lw) / 2, headerY - lh / 2, lw, lh);
      ctx.globalAlpha = 1;
    } else if (state.exportName && state.exportName.trim()) {
      ctx.font = "800 " + Math.round(W * 0.046) + "px system-ui, sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = bgImg ? "rgba(255,255,255,0.95)" : "rgba(40,28,16,0.92)";
      ctx.shadowColor = "rgba(0,0,0,0.35)"; ctx.shadowBlur = 6;
      ctx.fillText(state.exportName.trim(), W / 2, headerY);
      ctx.shadowBlur = 0;
    }

    const radius = Math.round(cardW * 0.06);
    const base = pageIndex * SLOTS_PER_PAGE;
    const showP = !!state.showPricesInExport;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      const idx = r * cols + c;
      const x = startX + c * (cardW + GAP), y = startY + r * (cardH + GAP);
      roundRect(ctx, x, y, cardW, cardH, radius);
      ctx.fillStyle = bgImg ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.05)"; ctx.fill();
      const ci = cardImgs[idx];
      if (ci) {
        ctx.save(); roundRect(ctx, x, y, cardW, cardH, radius); ctx.clip();
        (state.fit === "contain" ? drawContain : drawCover)(ctx, ci, x, y, cardW, cardH);
        ctx.restore();
      }
      roundRect(ctx, x, y, cardW, cardH, radius);
      ctx.lineWidth = 2; ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.stroke();

      // Preis-Badge auf der Karte (wenn aktiviert und Preis vorhanden)
      const price = state.prices[base + idx];
      if (showP && price != null && !isNaN(price) && ci) {
        const label = formatPrice(price);
        ctx.font = "700 " + Math.round(cardW * 0.13) + "px system-ui, sans-serif";
        const tw = ctx.measureText(label).width;
        const padX = cardW * 0.06, bh = cardW * 0.2;
        const bw = tw + padX * 2;
        const bx = x + (cardW - bw) / 2, by = y + cardH - bh - cardW * 0.06;
        roundRect(ctx, bx, by, bw, bh, bh / 2);
        ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fill();
        ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(201,162,75,0.7)"; ctx.stroke();
        ctx.fillStyle = "#ffe9a8"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(label, bx + bw / 2, by + bh / 2 + 1);
      }
    }

    // Gesamtsumme in der unteren Zone (unter dem Raster, ohne Überschneidung)
    const sum = pageSum(pageIndex);
    if (showP && sum != null) {
      const label = t("totalLabel") + formatPrice(sum);
      ctx.font = "800 " + Math.round(W * 0.045) + "px system-ui, sans-serif";
      const tw = ctx.measureText(label).width;
      const padX = W * 0.035, bh = W * 0.09, bw = tw + padX * 2;
      const bx = (W - bw) / 2;
      // vertikal in der bottomZone zentrieren
      const by = (H - bottomZone) + (bottomZone - bh) / 2;
      roundRect(ctx, bx, by, bw, bh, bh / 2);
      ctx.fillStyle = "rgba(20,14,9,0.88)"; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = "rgba(201,162,75,0.8)"; ctx.stroke();
      ctx.fillStyle = "#ffe9a8"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(label, W / 2, by + bh / 2 + 1);
    }

    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    const safeName = (state.name || "binder").replace(/[^a-z0-9äöüß \-]/gi, "").trim().replace(/\s+/g, "-") || "binder";
    a.download = safeName + "-page-" + (pageIndex + 1) + ".png"; a.click();
    toast(t("exportImg"));
  });
}

function drawCover(ctx, img, x, y, w, h) {
  const ir = img.width / img.height, br = w / h; let sw, sh, sx, sy;
  if (ir > br) { sh = img.height; sw = sh * br; sx = (img.width - sw) / 2; sy = 0; }
  else         { sw = img.width;  sh = sw / br; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}
function drawContain(ctx, img, x, y, w, h) {
  const ir = img.width / img.height, br = w / h; let dw, dh;
  if (ir > br) { dw = w; dh = w / ir; } else { dh = h; dw = h * ir; }
  ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

/* ============================================================================
   TOAST
   ========================================================================== */
let toastTimer = null;
const toastEl = document.getElementById("toast");
function toast(msg) {
  toastEl.textContent = msg; toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2200);
}

/* ============================================================================
   STARTSCREEN / COLLECTION-AUSWAHL
   ========================================================================== */
const FORMATS = [
  { cols: 2, rows: 2 }, { cols: 3, rows: 3 },
  { cols: 4, rows: 3 }, { cols: 3, rows: 4 }, { cols: 4, rows: 4 },
];
let selectedFormat = { cols: 3, rows: 3 };

const startScreen = document.getElementById("startScreen");
function showStartScreen() {
  renderFormatGrid();
  renderCollectionList();
  startScreen.classList.remove("hidden");
}
function hideStartScreen() { startScreen.classList.add("hidden"); }

function renderFormatGrid() {
  const grid = document.getElementById("formatGrid");
  grid.innerHTML = "";
  FORMATS.forEach(f => {
    const opt = document.createElement("div");
    opt.className = "format-opt" + (f.cols === selectedFormat.cols && f.rows === selectedFormat.rows ? " active" : "");
    const mini = document.createElement("div");
    mini.className = "format-mini";
    mini.style.gridTemplateColumns = "repeat(" + f.cols + ",1fr)";
    for (let i = 0; i < f.cols * f.rows; i++) { const s = document.createElement("span"); mini.appendChild(s); }
    opt.appendChild(mini);
    const lbl = document.createElement("div"); lbl.className = "format-label"; lbl.textContent = f.cols + "×" + f.rows;
    opt.appendChild(lbl);
    const cap = document.createElement("div"); cap.className = "format-cap"; cap.textContent = t("formatCap", f.cols * f.rows);
    opt.appendChild(cap);
    opt.addEventListener("click", () => { selectedFormat = { cols: f.cols, rows: f.rows }; renderFormatGrid(); });
    grid.appendChild(opt);
  });
}

function renderCollectionList() {
  const list = document.getElementById("collectionList");
  list.innerHTML = "";
  const cols = loadIndex().sort((a, b) => b.updatedAt - a.updatedAt);
  if (!cols.length) {
    const e = document.createElement("div"); e.className = "collection-empty"; e.textContent = t("noCollections");
    list.appendChild(e); return;
  }
  cols.forEach(c => {
    const item = document.createElement("div"); item.className = "collection-item";
    const name = document.createElement("div"); name.className = "ci-name"; name.textContent = c.name || "Collection";
    item.appendChild(name);
    const meta = document.createElement("div"); meta.className = "ci-meta";
    meta.textContent = c.format + " · " + new Date(c.updatedAt).toLocaleDateString();
    item.appendChild(meta);
    const del = document.createElement("button"); del.className = "ci-del"; del.textContent = "✕";
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      if (confirm(t("deleteColConfirm", c.name || "Collection"))) { deleteCollection(c.id); renderCollectionList(); }
    });
    item.appendChild(del);
    item.addEventListener("click", () => openCollection(c.id));
    list.appendChild(item);
  });
}

document.getElementById("startCreateBtn").addEventListener("click", () => {
  const nameInput = document.getElementById("newColName");
  const name = (nameInput.value || "").trim() || t("defaultColName");
  createCollection(selectedFormat.cols, selectedFormat.rows, name);
  nameInput.value = "";
});
document.getElementById("startImportBtn").addEventListener("click", () => {
  importFileInput.value = ""; importFileInput.click();
});
document.getElementById("homeBtn").addEventListener("click", () => {
  if (currentId) { save(); }
  if (confirm(t("homeConfirm"))) showStartScreen();
});

/* ============================================================================
   START / BOOT
   ========================================================================== */
function boot() {
  lang = detectLang();
  applyLang();
  applyCurrency(); applyExportPricesBtn(); applyMarkSeg();
  const lastId = localStorage.getItem(LAST_KEY);
  const idx = loadIndex();
  if (lastId && idx.find(c => c.id === lastId)) {
    openCollection(lastId);
  } else if (idx.length) {
    // es gibt Collections, aber keine zuletzt geöffnete -> Startscreen
    showStartScreen();
  } else {
    showStartScreen();
  }
}
boot();
